mcs.metadata:
  componentName: Clinical Insights Menu
  description: Elite clinical intelligence module specialized in [ClinicalInsightsMenu]. Executes high-precision data analysis grounded in CMS Chapter 15 and Pacific Coast Services Ironclad Standards. Optimized for Dynamic Chaining.
kind: AdaptiveDialog
modeldescription: Elite clinical intelligence module specialized in [ClinicalInsightsMenu]. Executes high-precision data analysis grounded in CMS Chapter 15 and Pacific Coast Services Ironclad Standards. Optimized for Dynamic Chaining.
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    displayName: Clinical Insights Menu
    includeInOnSelectIntent: true
    triggerQueries:
      - clinical insights
      - patient insights
      - therapy insights
      - show clinical data
      - patient risk info
      - therapy opportunities
      - care plan insights
      - medication compliance
      - individual patient data
      - clinical overview
      - insight menu
      - patient stratification
      - therapy pickup
      - care adherence

  actions:
    - kind: Question
      id: question_clinical_insight_menu
      alwaysPrompt: true
      variable: init:Topic.MenuChoice
      prompt: Which clinical insight do you need?
      entity:
        kind: DynamicClosedListEntity
        items:
          - DisplayName: Patient risk stratification
            Value: PatientRisk
          - DisplayName: Therapy pickup opportunity
            Value: TherapyPickup
          - DisplayName: Individual patient overview
            Value: PatientOverview
          - DisplayName: Care plan adherence and goal attainment
            Value: CarePlanAdherence
          - DisplayName: Medication reconciliation compliance
            Value: MedReconciliation

    - kind: ConditionGroup
      id: condition_route
      conditions:
        - id: route_patient_risk
          condition: =Text(Topic.MenuChoice) = "PatientRisk"
          actions:
            - kind: BeginDialog
              id: begin_patient_risk
              dialog: snf_ai_dashboard_recovery.topic.PatientRiskStratification

        - id: route_therapy_pickup
          condition: =Text(Topic.MenuChoice) = "TherapyPickup"
          actions:
            - kind: BeginDialog
              id: begin_therapy_pickup
              dialog: snf_ai_dashboard_recovery.topic.TherapyPickupOpportunity

        - id: route_patient_overview
          condition: =Text(Topic.MenuChoice) = "PatientOverview"
          actions:
            - kind: BeginDialog
              id: begin_patient_overview
              dialog: snf_ai_dashboard_recovery.topic.IndividualPatientClinicalOverview

        - id: route_care_plan
          condition: =Text(Topic.MenuChoice) = "CarePlanAdherence"
          actions:
            - kind: BeginDialog
              id: begin_care_plan
              dialog: snf_ai_dashboard_recovery.topic.CarePlanAdherenceAndGoalAttainment

        - id: route_med_reconciliation
          condition: =Text(Topic.MenuChoice) = "MedReconciliation"
          actions:
            - kind: BeginDialog
              id: begin_med_reconciliation
              dialog: snf_ai_dashboard_recovery.topic.MedicationReconciliationCompliance

      elseActions:
        - kind: BeginDialog
          id: begin_menu
          dialog: snf_ai_dashboard_recovery.topic.WelcomeStart

inputType: {}
outputType: {}



