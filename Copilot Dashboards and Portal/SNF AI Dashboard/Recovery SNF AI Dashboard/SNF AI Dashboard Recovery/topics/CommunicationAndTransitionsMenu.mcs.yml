mcs.metadata:
  componentName: Communication And Transitions Menu
  description: Elite clinical intelligence module specialized in [CommunicationAndTransitionsMenu]. Executes high-precision data analysis grounded in CMS Chapter 15 and Ensign Services Ironclad Standards. Optimized for Dynamic Chaining.
kind: AdaptiveDialog
modeldescription: Elite clinical intelligence module specialized in [CommunicationAndTransitionsMenu]. Executes high-precision data analysis grounded in CMS Chapter 15 and Ensign Services Ironclad Standards. Optimized for Dynamic Chaining.
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    displayName: Communication And Transitions Menu
    includeInOnSelectIntent: true
    triggerQueries:
      - communication menu
      - transition menu
      - care transitions

  actions:
    - kind: Question
      id: question_transition_menu
      alwaysPrompt: true
      variable: init:Topic.MenuChoice
      prompt: Which communication or transition workflow do you need?
      entity:
        kind: DynamicClosedListEntity
        items:
          - DisplayName: Family communication and satisfaction
            Value: FamilyCommunication
          - DisplayName: Rehabilitation discharge planning
            Value: DischargePlanning
          - DisplayName: Advance care planning documentation
            Value: AdvanceCarePlanning
          - DisplayName: End-of-life and hospice coordination
            Value: EndOfLifeHospice

    - kind: ConditionGroup
      id: condition_route
      conditions:
        - id: route_family
          condition: =Text(Topic.MenuChoice) = "FamilyCommunication"
          actions:
            - kind: BeginDialog
              id: begin_family
              dialog: snf_ai_dashboard_recovery.topic.FamilyCommunicationAndSatisfaction

        - id: route_discharge
          condition: =Text(Topic.MenuChoice) = "DischargePlanning"
          actions:
            - kind: BeginDialog
              id: begin_discharge
              dialog: snf_ai_dashboard_recovery.topic.RehabilitationDischargePlanning

        - id: route_advance_care_planning
          condition: =Text(Topic.MenuChoice) = "AdvanceCarePlanning"
          actions:
            - kind: BeginDialog
              id: begin_advance_care_planning
              dialog: snf_ai_dashboard_recovery.topic.AdvanceCarePlanningDocumentation

        - id: route_end_of_life
          condition: =Text(Topic.MenuChoice) = "EndOfLifeHospice"
          actions:
            - kind: BeginDialog
              id: begin_end_of_life
              dialog: snf_ai_dashboard_recovery.topic.EndOfLifeAndHospiceCoordination

      elseActions:
        - kind: BeginDialog
          id: begin_menu
          dialog: snf_ai_dashboard_recovery.topic.WelcomeStart

inputType: {}
outputType: {}


