mcs.metadata:
  componentName: Regulatory Compliance Tracking
  description: Elite clinical intelligence module specialized in [RegulatoryComplianceTracking]. Executes high-precision data analysis grounded in CMS Chapter 15 and Ensign Services Ironclad Standards. Optimized for Dynamic Chaining.
kind: AdaptiveDialog
modeldescription: Elite clinical intelligence module specialized in [RegulatoryComplianceTracking]. Executes high-precision data analysis grounded in CMS Chapter 15 and Ensign Services Ironclad Standards. Optimized for Dynamic Chaining.
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    displayName: Regulatory Compliance Tracking
    includeInOnSelectIntent: true
    triggerQueries:
      - regulatory compliance
      - citation tracking
      - survey tracking
      - state requirement tracking
      - federal requirement tracking

  actions:
    - kind: Question
      id: question_review_focus
      alwaysPrompt: true
      variable: init:Topic.ReviewFocusChoice
      prompt: What should I focus on?
      entity:
        kind: DynamicClosedListEntity
        items:
          - DisplayName: Survey readiness
            Value: SurveyReadiness
          - DisplayName: Open citations or deficiencies
            Value: Citations
          - DisplayName: Regulatory due dates
            Value: DueDates
          - DisplayName: Facility compliance summary
            Value: FacilitySummary

    - kind: Question
      id: question_scope
      alwaysPrompt: true
      variable: init:Topic.ScopeChoice
      prompt: What scope should I use?
      entity:
        kind: DynamicClosedListEntity
        items:
          - DisplayName: Facility-wide
            Value: Facility
          - DisplayName: One unit or service
            Value: Unit
          - DisplayName: One requirement set
            Value: RequirementSet

    - kind: Question
      id: question_timeframe
      alwaysPrompt: true
      variable: init:Topic.TimeframeChoice
      prompt: What timeframe should I use?
      entity:
        kind: DynamicClosedListEntity
        items:
          - DisplayName: Current status
            Value: CurrentStatus
          - DisplayName: Next 7 days
            Value: Next7Days
          - DisplayName: Next 30 days
            Value: Next30Days
          - DisplayName: Last survey cycle
            Value: LastSurveyCycle

    - kind: SendActivity
      id: send_regulatory_summary
      activity: =Concatenate("I have the intake for ", Topic.ReviewFocusChoice.DisplayName, " with ", Topic.ScopeChoice.DisplayName, " scope and ", Topic.TimeframeChoice.DisplayName, " timeframe.")

    - kind: SendActivity
      id: send_manual_reporting_next_step
      activity: Use the intake above to guide manual compliance review with the regulatory or survey owner. This topic stays in structured intake mode until a validated live reporting backend is connected.

inputType: {}
outputType: {}


