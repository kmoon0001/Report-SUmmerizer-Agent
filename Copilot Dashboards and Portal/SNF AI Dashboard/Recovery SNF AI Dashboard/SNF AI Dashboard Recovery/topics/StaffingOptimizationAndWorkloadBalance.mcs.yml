mcs.metadata:
  componentName: Staffing Optimization And Workload Balance
  description: Elite clinical intelligence module specialized in [StaffingOptimizationAndWorkloadBalance]. Executes high-precision data analysis grounded in CMS Chapter 15 and Ensign Services Ironclad Standards. Optimized for Dynamic Chaining.
kind: AdaptiveDialog
modeldescription: Elite clinical intelligence module specialized in [StaffingOptimizationAndWorkloadBalance]. Executes high-precision data analysis grounded in CMS Chapter 15 and Ensign Services Ironclad Standards. Optimized for Dynamic Chaining.
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    displayName: Staffing Optimization And Workload Balance
    includeInOnSelectIntent: true
    triggerQueries:
      - staffing review
      - workload review
      - coverage review
      - staffing pressure
      - assignment imbalance

  actions:
    - kind: Question
      id: question_scope
      alwaysPrompt: true
      variable: init:Topic.ScopeChoice
      prompt: What scope should I review?
      entity:
        kind: DynamicClosedListEntity
        items:
          - DisplayName: One unit
            Value: Unit
          - DisplayName: Facility-wide
            Value: Facility
          - DisplayName: One shift or handoff window
            Value: Shift

    - kind: Question
      id: question_shift
      alwaysPrompt: true
      variable: init:Topic.ShiftChoice
      prompt: Which shift or work period should I use?
      entity:
        kind: DynamicClosedListEntity
        items:
          - DisplayName: Current shift
            Value: CurrentShift
          - DisplayName: Day shift
            Value: Day
          - DisplayName: Evening shift
            Value: Evening
          - DisplayName: Night shift
            Value: Night
          - DisplayName: Last 24 hours
            Value: Last24Hours

    - kind: Question
      id: question_focus
      alwaysPrompt: true
      variable: init:Topic.FocusChoice
      prompt: What is the main staffing concern?
      entity:
        kind: DynamicClosedListEntity
        items:
          - DisplayName: Coverage gap
            Value: CoverageGap
          - DisplayName: Workload imbalance
            Value: WorkloadImbalance
          - DisplayName: Call-off or shortage impact
            Value: ShortageImpact
          - DisplayName: Assignment acuity mismatch
            Value: AcuityMismatch

    - kind: SendActivity
      id: send_staffing_summary
      activity: =Concatenate("I have the intake for ", Topic.ScopeChoice.DisplayName, ", ", Topic.ShiftChoice.DisplayName, ", and ", Topic.FocusChoice.DisplayName, ".")

    - kind: SendActivity
      id: send_manual_reporting_next_step
      activity: Use the intake above to guide manual staffing review with the operations or staffing owner. This topic stays in structured intake mode until a validated live reporting backend is connected.

inputType: {}
outputType: {}


