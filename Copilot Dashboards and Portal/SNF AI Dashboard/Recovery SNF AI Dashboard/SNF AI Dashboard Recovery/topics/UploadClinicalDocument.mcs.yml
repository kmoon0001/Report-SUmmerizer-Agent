mcs.metadata:
  componentName: Upload Clinical Document
description: Elite clinical intelligence module specialized in [UploadClinicalDocument]. Executes high-precision data analysis grounded in CMS Chapter 15 and Pacific Coast Services Ironclad Standards. Optimized for Dynamic Chaining.
kind: AdaptiveDialog
modeldescription: Elite clinical intelligence module specialized in [UploadClinicalDocument]. Executes high-precision data analysis grounded in CMS Chapter 15 and Pacific Coast Services Ironclad Standards. Optimized for Dynamic Chaining.
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    displayName: Upload Clinical Document
    includeInOnSelectIntent: true
    triggerQueries:
      - upload document
      - upload csv
      - upload pdf
      - pcc export
      - nethealth export

  actions:
    - kind: Question
      id: question_document_type
      alwaysPrompt: true
      variable: init:Topic.DocumentTypeChoice
      prompt: What kind of document or export is this?
      entity:
        kind: DynamicClosedListEntity
        items:
          - DisplayName: PCC or NetHealth export
            Value: EHRExport
          - DisplayName: Policy or procedure PDF
            Value: PolicyPdf
          - DisplayName: Survey, audit, or quality packet
            Value: SurveyAudit
          - DisplayName: Family or care summary source
            Value: SummarySource

    - kind: Question
      id: question_intended_use
      alwaysPrompt: true
      variable: init:Topic.IntendedUseChoice
      prompt: What should happen after the upload is reviewed?
      entity:
        kind: DynamicClosedListEntity
        items:
          - DisplayName: Route to command center review
            Value: CommandCenterReview
          - DisplayName: Support documentation or summary work
            Value: DocumentationSupport
          - DisplayName: Support quality or compliance review
            Value: QualityCompliance
          - DisplayName: Not sure yet
            Value: NotSure

    - kind: Question
      id: question_minimum_necessary
      alwaysPrompt: true
      variable: init:Topic.MinimumNecessaryChoice
      prompt: Is the file already limited to the minimum necessary content for this task?
      entity:
        kind: DynamicClosedListEntity
        items:
          - DisplayName: Yes, minimum necessary only
            Value: Yes
          - DisplayName: Not sure, I should confirm
            Value: Unsure
          - DisplayName: No, I need guidance first
            Value: No

    - kind: ConditionGroup
      id: condition_minimum_necessary
      conditions:
        - id: route_to_guidance
          condition: =Or(Text(Topic.MinimumNecessaryChoice) = "Unsure", Text(Topic.MinimumNecessaryChoice) = "No")
          actions:
            - kind: SendActivity
              id: send_minimum_necessary_notice
              activity: Pause the upload and confirm the file is limited to the current task. Use the upload guidance, then come back once the file is scoped correctly.

            - kind: BeginDialog
              id: begin_guidance
              dialog: snf_ai_dashboard_recovery.topic.FileAndImageUploadGuidance

      elseActions:
        - kind: SendActivity
          id: send_document_notice
          activity: I have the governed intake for a clinical document upload. The next step is file triage and recommended routing, not direct clinical interpretation.

        - kind: SendActivity
          id: send_manual_file_triage_next_step
          activity: Upload the file only through the approved Copilot Studio file path and route it for manual governed triage until a validated live file-intake backend is connected.

inputType: {}
outputType: {}



