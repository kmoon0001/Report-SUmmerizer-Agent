mcs.metadata:
  componentName: Upload Clinical Image
description: Elite clinical intelligence module specialized in [UploadClinicalImage]. Executes high-precision data analysis grounded in CMS Chapter 15 and Pacific Coast Services Ironclad Standards. Optimized for Dynamic Chaining.
kind: AdaptiveDialog
modeldescription: Elite clinical intelligence module specialized in [UploadClinicalImage]. Executes high-precision data analysis grounded in CMS Chapter 15 and Pacific Coast Services Ironclad Standards. Optimized for Dynamic Chaining.
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    displayName: Upload Clinical Image
    includeInOnSelectIntent: true
    triggerQueries:
      - upload clinical image
      - upload wound photo
      - upload safety photo
      - upload medication image
      - image review

  actions:
    - kind: Question
      id: question_image_type
      alwaysPrompt: true
      variable: init:Topic.ImageTypeChoice
      prompt: What kind of image are you handling?
      entity:
        kind: DynamicClosedListEntity
        items:
          - DisplayName: Wound or skin image
            Value: WoundSkin
          - DisplayName: Environmental safety image
            Value: EnvironmentalSafety
          - DisplayName: Medication label or package image
            Value: MedicationLabel
          - DisplayName: Mobility, transfer, or equipment image
            Value: MobilityEquipment

    - kind: Question
      id: question_image_use
      alwaysPrompt: true
      variable: init:Topic.ImageUseChoice
      prompt: What is the main reason for this image review?
      entity:
        kind: DynamicClosedListEntity
        items:
          - DisplayName: Support escalation or safety review
            Value: EscalationSafety
          - DisplayName: Support documentation follow-up
            Value: DocumentationFollowUp
          - DisplayName: Support workflow routing
            Value: WorkflowRouting
          - DisplayName: Not sure yet
            Value: NotSure

    - kind: Question
      id: question_approval
      alwaysPrompt: true
      variable: init:Topic.ApprovalChoice
      prompt: Is this image approved for clinical use under current consent and facility policy?
      entity:
        kind: DynamicClosedListEntity
        items:
          - DisplayName: Yes, approved and appropriate
            Value: Approved
          - DisplayName: I need to confirm first
            Value: ConfirmFirst

    - kind: ConditionGroup
      id: condition_image_approval
      conditions:
        - id: route_approval_guidance
          condition: =Text(Topic.ApprovalChoice) = "ConfirmFirst"
          actions:
            - kind: SendActivity
              id: send_approval_notice
              activity: Confirm consent, approved capture, and minimum-necessary use before uploading the image. Use the upload guidance, then come back once the image is cleared for review.

            - kind: BeginDialog
              id: begin_image_guidance
              dialog: snf_ai_dashboard.topic.FileAndImageUploadGuidance

      elseActions:
        - kind: SendActivity
          id: send_image_notice
          activity: I have the governed intake for a clinical image review. The next step is image triage and routing support, not a stand-alone diagnosis or treatment decision.

        - kind: SendActivity
          id: send_manual_image_triage_next_step
          activity: Upload the image only through the approved Copilot Studio file path and route it for manual governed triage until a validated live image-review backend is connected.

inputType: {}
outputType: {}






