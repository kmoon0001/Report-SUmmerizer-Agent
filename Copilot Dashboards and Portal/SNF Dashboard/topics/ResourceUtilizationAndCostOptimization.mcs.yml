mcs.metadata:
  componentName: Resource Utilization And Cost Optimization
  description: Elite clinical intelligence module specialized in [ResourceUtilizationAndCostOptimization]. Executes high-precision data analysis grounded in CMS Chapter 15 and Pacific Coast Services Ironclad Standards. Optimized for Dynamic Chaining.
kind: AdaptiveDialog
modeldescription: Elite clinical intelligence module specialized in [ResourceUtilizationAndCostOptimization]. Executes high-precision data analysis grounded in CMS Chapter 15 and Pacific Coast Services Ironclad Standards. Optimized for Dynamic Chaining.
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    displayName: Resource Utilization And Cost Optimization
    includeInOnSelectIntent: true
    triggerQueries:
      - resource utilization
      - cost optimization
      - supply utilization
      - staffing cost review
      - operational efficiency

  actions:
    - kind: Question
      id: question_resource_type
      alwaysPrompt: true
      variable: init:Topic.ResourceTypeChoice
      prompt: Which resource area should I review?
      entity:
        kind: DynamicClosedListEntity
        items:
          - DisplayName: Staffing coverage
            Value: Staffing
          - DisplayName: Therapy minutes and caseload
            Value: Therapy
          - DisplayName: Supplies or equipment
            Value: SuppliesEquipment
          - DisplayName: Combined utilization summary
            Value: CombinedSummary

    - kind: Question
      id: question_scope
      alwaysPrompt: true
      variable: init:Topic.ScopeChoice
      prompt: What scope should I use?
      entity:
        kind: DynamicClosedListEntity
        items:
          - DisplayName: Facility-wide
            Value: Facility
          - DisplayName: One unit
            Value: Unit
          - DisplayName: One department
            Value: Department

    - kind: Question
      id: question_timeframe
      alwaysPrompt: true
      variable: init:Topic.TimeframeChoice
      prompt: What timeframe should I use?
      entity:
        kind: DynamicClosedListEntity
        items:
          - DisplayName: Current week
            Value: CurrentWeek
          - DisplayName: Last 30 days
            Value: Last30Days
          - DisplayName: Last quarter
            Value: LastQuarter
          - DisplayName: Year to date
            Value: YearToDate

    - kind: SendActivity


      id: send_utilization_summary


      activity:


        attachments:


          - contentType: application/vnd.microsoft.card.adaptive


            content:


              type: AdaptiveCard


              version: "1.3"


              body:


                - type: Container


                  items:


                    - type: TextBlock


                      text: "?? WORKFLOW INTAKE OVERVIEW"


                      weight: Bolder


                      size: Large


                    - type: TextBlock


                      text: "Grounded AI Insight: Automated Handoff Mode"


                      isSubtle: true


                      spacing: None


                - type: Container


                  items:


                    - type: TextBlock


                      text: =Concatenate("I have the intake for ", Topic.ResourceTypeChoice.DisplayName, " with ", Topic.ScopeChoice.DisplayName, " scope and ", Topic.TimeframeChoice.DisplayName, " timeframe.")


                      wrap: true


                      size: Medium


                - type: TextBlock


                  text: "?? This is a structured intake summary. The automated backend is currently in validation mode."


                  wrap: true


                  fontType: Monospace


                  size: Small


                  color: Warning


                  spacing: Medium


              $schema: "http://adaptivecards.io/schemas/adaptive-card.json"

    - kind: SendActivity
      id: send_manual_reporting_next_step
      activity: Use the intake above to guide manual utilization review with the operations or finance owner. This topic stays in structured intake mode until a validated live reporting backend is connected.

inputType: {}
outputType: {}






