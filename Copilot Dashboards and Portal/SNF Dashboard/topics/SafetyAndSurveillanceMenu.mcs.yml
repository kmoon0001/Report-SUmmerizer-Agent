mcs.metadata:
  componentName: Safety And Surveillance Menu
  description: Elite clinical intelligence module specialized in [SafetyAndSurveillanceMenu]. Executes high-precision data analysis grounded in CMS Chapter 15 and Ensign Services Ironclad Standards. Optimized for Dynamic Chaining.
kind: AdaptiveDialog
modeldescription: Elite clinical intelligence module specialized in [SafetyAndSurveillanceMenu]. Executes high-precision data analysis grounded in CMS Chapter 15 and Ensign Services Ironclad Standards. Optimized for Dynamic Chaining.
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    displayName: Safety And Surveillance Menu
    includeInOnSelectIntent: true
    triggerQueries:
      - safety menu
      - surveillance menu
      - safety workflows

  actions:
    - kind: Question
      id: question_safety_menu
      alwaysPrompt: true
      variable: init:Topic.SafetyMenuChoice
      prompt:
        attachments:
          - contentType: application/vnd.microsoft.card.adaptive
            content:
              type: AdaptiveCard
              version: "1.3"
              body:
                - type: Container
                  items:
                    - type: TextBlock
                      text: "🛡️ SAFETY & SURVEILLANCE MENU"
                      weight: Bolder
                      size: Large
                    - type: TextBlock
                      text: "Which safety or surveillance workflow do you need?"
                      isSubtle: true
                      spacing: None
              $schema: "http://adaptivecards.io/schemas/adaptive-card.json"
      entity:
        kind: DynamicClosedListEntity
        items:
          - DisplayName: Medication safety review
            Value: MedicationSafety
          - DisplayName: Infection control surveillance
            Value: InfectionSurveillance
          - DisplayName: Infection outbreak detection and response
            Value: InfectionOutbreak
          - DisplayName: Environmental safety assessment
            Value: EnvironmentalSafety
          - DisplayName: Potential abuse or neglect reporting
            Value: AbuseNeglect

    - kind: ConditionGroup
      id: condition_route
      conditions:
        - id: route_med_safety
          condition: =Text(Topic.SafetyMenuChoice) = "MedicationSafety"
          actions:
            - kind: BeginDialog
              id: begin_med_safety
              dialog: snf_ai_dashboard.topic.MedicationSafetyReview

        - id: route_infection_surveillance
          condition: =Text(Topic.SafetyMenuChoice) = "InfectionSurveillance"
          actions:
            - kind: BeginDialog
              id: begin_infection_surveillance
              dialog: snf_ai_dashboard.topic.InfectionControlSurveillance

        - id: route_outbreak
          condition: =Text(Topic.SafetyMenuChoice) = "InfectionOutbreak"
          actions:
            - kind: BeginDialog
              id: begin_outbreak
              dialog: snf_ai_dashboard.topic.InfectionOutbreakDetectionAndResponse

        - id: route_environmental_safety
          condition: =Text(Topic.SafetyMenuChoice) = "EnvironmentalSafety"
          actions:
            - kind: BeginDialog
              id: begin_environmental_safety
              dialog: snf_ai_dashboard.topic.EnvironmentalSafetyAssessment

        - id: route_abuse_neglect
          condition: =Text(Topic.SafetyMenuChoice) = "AbuseNeglect"
          actions:
            - kind: BeginDialog
              id: begin_abuse_neglect
              dialog: snf_ai_dashboard.topic.PotentialAbuseOrNeglectReporting

      elseActions:
        - kind: BeginDialog
          id: begin_menu
          dialog: snf_ai_dashboard.topic.WelcomeStart

inputType: {}
outputType: {}





