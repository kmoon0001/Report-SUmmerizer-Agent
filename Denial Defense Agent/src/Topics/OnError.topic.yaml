# Microsoft Learn Platinum Standard Instructions:
# **Grounding**: System Recovery & Forensic Integrity.
# **Patterns**: Self-Healing.

mcs.metadata:
  componentName: OnError
  description: Platinum Error Recovery Hub. Intercepts forensic audit errors and provides graceful fallback to clinical supervision.
kind: AdaptiveDialog
beginDialog:
  kind: OnError
  id: main
  actions:
    - kind: SendActivity
      id: send_error
      activity: |-
        ⚠️ **Denial Defense — Forensic Recovery Mode**
        The audit engine encountered a processing error.

        **Safety Guardrail**: We have paused the automated rebuttal generation to prevent inaccurate regulatory citations.
        **Action**: Please manually paste the clinical note again or contact compliance support.

    - kind: BeginDialog
      id: recover
      dialog: pcca_agent.topic.DenialDefenseWorker
