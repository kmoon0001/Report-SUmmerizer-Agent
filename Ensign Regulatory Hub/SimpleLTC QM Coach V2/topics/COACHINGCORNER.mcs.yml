mcs.metadata:
  componentName: COACHING CORNER
  description: Elite clinical intelligence module specialized in [COACHINGCORNER]. Executes high-precision data analysis grounded in CMS Chapter 15 and Ensign Services Ironclad Standards. Optimized for Dynamic Chaining.
kind: AdaptiveDialog
modeldescription: Elite clinical intelligence module specialized in [COACHINGCORNER]. Executes high-precision data analysis grounded in CMS Chapter 15 and Ensign Services Ironclad Standards. Optimized for Dynamic Chaining.
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    triggerQueries:
      - coaching corner
      - need coaching advice
      - help with coaching
      - tips for coaches
      - how to be a better coach
      - coaching resources
      - coach support
      - improve my coaching skills
      - coaching questions
      - guidance for coaches

  actions:
    - kind: SendActivity
      id: SendActivity_Ps6Z8I
      activity: "Welcome to Coaching Corner. What type of coaching would you like today: Process, Team, or Systems?"

    - kind: Question
      id: Question_dmq0nL
      variable: Topic.CoachingCategory
      prompt: "Choose a category: Process, Team, or Systems."
      entity:
        kind: EmbeddedEntity
        definition:
          kind: ClosedListEntity
          optionSetName: CoachingCategoryOptions
          items:
            - id: Process
              displayName: Process

            - id: Team
              displayName: Team

            - id: Systems
              displayName: Systems

    - kind: ConditionGroup
      id: ConditionGroup_y5xIRu
      conditions:
        - id: ConditionItem_dwuT4y
          condition: =Topic.CoachingCategory = CoachingCategoryOptions.Process
          actions:
            - kind: Question
              id: question_KRhhPt
              interruptionPolicy:
                allowInterruption: true

              variable: Topic.SpecificCoachingNeed
              prompt: Can you tell me more about the specific process change you are considering?
              entity:
                kind: StringPrebuiltEntity
                sensitivityLevel: None

        - id: ConditionItem_pDFdgC
          condition: =Topic.CoachingCategory = CoachingCategoryOptions.Team
          actions:
            - kind: Question
              id: question_ZvETVf
              interruptionPolicy:
                allowInterruption: true

              variable: Topic.SpecificCoachingNeed
              prompt: What specific team behavior are you looking to strengthen?
              entity:
                kind: StringPrebuiltEntity
                sensitivityLevel: None

        - id: ConditionItem_BrGCqN
          condition: =Topic.CoachingCategory = CoachingCategoryOptions.Systems
          actions:
            - kind: Question
              id: question_ZwNzpT
              interruptionPolicy:
                allowInterruption: true

              variable: Topic.SpecificCoachingNeed
              prompt: What specific system or workflow are you trying to improve?
              entity:
                kind: StringPrebuiltEntity
                sensitivityLevel: None

      elseActions:
        - kind: Question
          id: question_hWUPhB
          interruptionPolicy:
            allowInterruption: true

          variable: Topic.SpecificCoachingNeed
          prompt: How can I help you with clinical coaching today?
          entity:
            kind: StringPrebuiltEntity
            sensitivityLevel: None

    - kind: ConditionGroup
      id: conditionGroup_coachingGuard
      conditions:
        - id: conditionItem_hasNeed
          condition: =!IsBlank(Topic.SpecificCoachingNeed)
          actions:
            - kind: SearchAndSummarizeContent
              id: eIWTjc
              userInput: "=Concatenate(\"Category: \", Text(Topic.CoachingCategory), \". Specific need: \", Topic.SpecificCoachingNeed, \". Provide a clinical coaching script and actionable steps using the SimpleLTC protocols and CMS standards.\")"
              additionalInstructions: "You are a Senior Clinical Coach. Generate a structured, regulatory-aligned coaching script. Include: 1) Root cause framing, 2) Coaching talking points for the clinician, 3) RACI-aligned action steps, 4) Documentation guidance. Reference CMS Ch.15, Jimmo standards, and ONE Clinical protocols where applicable."

            - kind: SendActivity
              id: sendActivity_coachingResults
              activity: "Here is your coaching script and action plan:"

            - kind: BeginDialog
              id: 52jbsv
              input:
                binding:
                  QMDomain: Global.QMDomain

              dialog: cr917_agentu92bPc.topic.DoRSUMMARYEMAIL
              output:
                binding:
                  QMDomain: Topic.QMDomain

      elseActions:
        - kind: SendActivity
          id: sendActivity_coachingNoInput
          activity: I need more detail about your coaching need to generate a useful script. Please try again with a specific clinical or workflow concern.

inputType: {}
outputType: {}

