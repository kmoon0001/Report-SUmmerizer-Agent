mcs.metadata:
  componentName: LATEST RESIDENT SUBMISSION ROUTER
  description: Elite clinical intelligence module specialized in [LATESTRESIDENTSUBMISSION]. Executes high-precision data analysis grounded in CMS Chapter 15 and Ensign Services Ironclad Standards. Optimized for Dynamic Chaining.
kind: AdaptiveDialog
modeldescription: Elite clinical intelligence module specialized in [LATESTRESIDENTSUBMISSION]. Executes high-precision data analysis grounded in CMS Chapter 15 and Ensign Services Ironclad Standards. Optimized for Dynamic Chaining.
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    triggerQueries:
      - use latest resident insight submission
      - load latest resident qm submission
      - use the latest resident submission
      - load the latest resident insight submission

  actions:
    - kind: SendActivity
      id: sendActivity_latestResidentSubmissionNotice
      activity: I can use the latest approved resident insight submission once the facility is confirmed.

    - kind: ConditionGroup
      id: conditionGroup_prepareLatestResidentFacility
      conditions:
        - id: conditionItem_existingLatestResidentFacility
          condition: =!IsBlank(Global.SelectedFacility)

        - id: conditionItem_seacliffLatestResidentFacility
          condition: ="sea cliff" in Lower(System.Activity.Text)
          actions:
            - kind: SetVariable
              id: setVariable_seacliffLatestResidentFacility
              variable: Global.SelectedFacility
              value: ="Sea Cliff"

        - id: conditionItem_palmterraceLatestResidentFacility
          condition: ="palm terrace" in Lower(System.Activity.Text)
          actions:
            - kind: SetVariable
              id: setVariable_palmterraceLatestResidentFacility
              variable: Global.SelectedFacility
              value: ="Palm Terrace"

        - id: conditionItem_victoriaLatestResidentFacility
          condition: ="victoria" in Lower(System.Activity.Text)
          actions:
            - kind: SetVariable
              id: setVariable_victoriaLatestResidentFacility
              variable: Global.SelectedFacility
              value: ="Victoria"

        - id: conditionItem_stcatherineLatestResidentFacility
          condition: ="st. catherine" in Lower(System.Activity.Text) || "st catherine" in Lower(System.Activity.Text)
          actions:
            - kind: SetVariable
              id: setVariable_stcatherineLatestResidentFacility
              variable: Global.SelectedFacility
              value: ="St. Catherine"

        - id: conditionItem_stelizabethLatestResidentFacility
          condition: ="st. elizabeth" in Lower(System.Activity.Text) || "st elizabeth" in Lower(System.Activity.Text)
          actions:
            - kind: SetVariable
              id: setVariable_stelizabethLatestResidentFacility
              variable: Global.SelectedFacility
              value: ="St. Elizabeth"

        - id: conditionItem_mainplaceLatestResidentFacility
          condition: ="mainplace" in Lower(System.Activity.Text)
          actions:
            - kind: SetVariable
              id: setVariable_mainplaceLatestResidentFacility
              variable: Global.SelectedFacility
              value: ="Mainplace"

        - id: conditionItem_neworangehillsLatestResidentFacility
          condition: ="new orange hills" in Lower(System.Activity.Text)
          actions:
            - kind: SetVariable
              id: setVariable_neworangehillsLatestResidentFacility
              variable: Global.SelectedFacility
              value: ="New Orange Hills"

        - id: conditionItem_hillsLatestResidentFacility
          condition: ="the hills" in Lower(System.Activity.Text)
          actions:
            - kind: SetVariable
              id: setVariable_hillsLatestResidentFacility
              variable: Global.SelectedFacility
              value: ="The Hills"

        - id: conditionItem_beachsideLatestResidentFacility
          condition: ="beachside" in Lower(System.Activity.Text)
          actions:
            - kind: SetVariable
              id: setVariable_beachsideLatestResidentFacility
              variable: Global.SelectedFacility
              value: ="Beachside"

        - id: conditionItem_alamitoswestLatestResidentFacility
          condition: ="alamitos west" in Lower(System.Activity.Text)
          actions:
            - kind: SetVariable
              id: setVariable_alamitoswestLatestResidentFacility
              variable: Global.SelectedFacility
              value: ="Alamitos West"

        - id: conditionItem_coventryLatestResidentFacility
          condition: ="coventry court" in Lower(System.Activity.Text)
          actions:
            - kind: SetVariable
              id: setVariable_coventryLatestResidentFacility
              variable: Global.SelectedFacility
              value: ="Coventry Court"

        - id: conditionItem_pacifichavenLatestResidentFacility
          condition: ="pacific haven" in Lower(System.Activity.Text)
          actions:
            - kind: SetVariable
              id: setVariable_pacifichavenLatestResidentFacility
              variable: Global.SelectedFacility
              value: ="Pacific Haven"

      elseActions:
        - kind: Question
          id: question_latestResidentFacilityChoice
          interruptionPolicy:
            allowInterruption: true

          variable: Topic.ResidentFacilityChoiceOption
          prompt: Please confirm the facility for this resident-specific QM review.
          entity:
            kind: EmbeddedEntity
            definition:
              kind: ClosedListEntity
              optionSetName: ResidentFacilityOptions
              items:
                - id: Sea Cliff
                  displayName: Sea Cliff

                - id: Palm Terrace
                  displayName: Palm Terrace

                - id: Victoria
                  displayName: Victoria

                - id: St. Catherine
                  displayName: St. Catherine

                - id: St. Elizabeth
                  displayName: St. Elizabeth

                - id: Mainplace
                  displayName: Mainplace

                - id: New Orange Hills
                  displayName: New Orange Hills

                - id: The Hills
                  displayName: The Hills

                - id: Beachside
                  displayName: Beachside

                - id: Alamitos West
                  displayName: Alamitos West

                - id: Coventry Court
                  displayName: Coventry Court

                - id: Pacific Haven
                  displayName: Pacific Haven

        - kind: SetVariable
          id: setVariable_syncLatestResidentFacility
          variable: Global.SelectedFacility
          value: =Text(Topic.ResidentFacilityChoiceOption)

        - kind: SetVariable
          id: setVariable_syncLatestResidentFacilityName
          variable: Topic.ResidentFacilityName
          value: =Text(Topic.ResidentFacilityChoiceOption)

        - kind: SetVariable
          id: setVariable_syncLatestResidentFacilityChoice
          variable: Topic.ResidentFacilityChoice
          value: =Text(Topic.ResidentFacilityChoiceOption)

    - kind: SetVariable
      id: setVariable_syncLatestResidentFacilityNameFromGlobal
      variable: Topic.ResidentFacilityName
      value: =Text(Global.SelectedFacility)

    - kind: ConditionGroup
      id: conditionGroup_recoverLatestResidentFacilityFromTypedText
      conditions:
        - id: conditionItem_latestResidentFacilityAlreadySet
          condition: =!IsBlank(Global.SelectedFacility)

        - id: conditionItem_latestResidentChoiceHasValue
          condition: =!IsBlank(Topic.ResidentFacilityChoice)
          actions:
            - kind: SetVariable
              id: setVariable_syncLatestResidentFacilityFromChoice
              variable: Global.SelectedFacility
              value: =Text(Topic.ResidentFacilityChoice)

            - kind: SetVariable
              id: setVariable_syncLatestResidentFacilityNameFromChoice
              variable: Topic.ResidentFacilityName
              value: =Text(Topic.ResidentFacilityChoice)

        - id: conditionItem_latestResidentTypedSeaCliff
          condition: ="sea cliff" in Lower(System.Activity.Text)
          actions:
            - kind: SetVariable
              id: setVariable_latestResidentTypedSeaCliff
              variable: Global.SelectedFacility
              value: ="Sea Cliff"

        - id: conditionItem_latestResidentTypedPalmTerrace
          condition: ="palm terrace" in Lower(System.Activity.Text)
          actions:
            - kind: SetVariable
              id: setVariable_latestResidentTypedPalmTerrace
              variable: Global.SelectedFacility
              value: ="Palm Terrace"

        - id: conditionItem_latestResidentTypedVictoria
          condition: ="victoria" in Lower(System.Activity.Text)
          actions:
            - kind: SetVariable
              id: setVariable_latestResidentTypedVictoria
              variable: Global.SelectedFacility
              value: ="Victoria"

        - id: conditionItem_latestResidentTypedStCatherine
          condition: ="st. catherine" in Lower(System.Activity.Text) || "st catherine" in Lower(System.Activity.Text)
          actions:
            - kind: SetVariable
              id: setVariable_latestResidentTypedStCatherine
              variable: Global.SelectedFacility
              value: ="St. Catherine"

        - id: conditionItem_latestResidentTypedStElizabeth
          condition: ="st. elizabeth" in Lower(System.Activity.Text) || "st elizabeth" in Lower(System.Activity.Text)
          actions:
            - kind: SetVariable
              id: setVariable_latestResidentTypedStElizabeth
              variable: Global.SelectedFacility
              value: ="St. Elizabeth"

        - id: conditionItem_latestResidentTypedMainplace
          condition: ="mainplace" in Lower(System.Activity.Text)
          actions:
            - kind: SetVariable
              id: setVariable_latestResidentTypedMainplace
              variable: Global.SelectedFacility
              value: ="Mainplace"

        - id: conditionItem_latestResidentTypedNewOrangeHills
          condition: ="new orange hills" in Lower(System.Activity.Text)
          actions:
            - kind: SetVariable
              id: setVariable_latestResidentTypedNewOrangeHills
              variable: Global.SelectedFacility
              value: ="New Orange Hills"

        - id: conditionItem_latestResidentTypedTheHills
          condition: ="the hills" in Lower(System.Activity.Text)
          actions:
            - kind: SetVariable
              id: setVariable_latestResidentTypedTheHills
              variable: Global.SelectedFacility
              value: ="The Hills"

        - id: conditionItem_latestResidentTypedBeachside
          condition: ="beachside" in Lower(System.Activity.Text)
          actions:
            - kind: SetVariable
              id: setVariable_latestResidentTypedBeachside
              variable: Global.SelectedFacility
              value: ="Beachside"

        - id: conditionItem_latestResidentTypedAlamitosWest
          condition: ="alamitos west" in Lower(System.Activity.Text)
          actions:
            - kind: SetVariable
              id: setVariable_latestResidentTypedAlamitosWest
              variable: Global.SelectedFacility
              value: ="Alamitos West"

        - id: conditionItem_latestResidentTypedCoventryCourt
          condition: ="coventry court" in Lower(System.Activity.Text)
          actions:
            - kind: SetVariable
              id: setVariable_latestResidentTypedCoventryCourt
              variable: Global.SelectedFacility
              value: ="Coventry Court"

        - id: conditionItem_latestResidentTypedPacificHaven
          condition: ="pacific haven" in Lower(System.Activity.Text)
          actions:
            - kind: SetVariable
              id: setVariable_latestResidentTypedPacificHaven
              variable: Global.SelectedFacility
              value: ="Pacific Haven"

    - kind: BeginDialog
      id: beginDialog_routeLatestResidentSubmission
      dialog: cr917_agentu92bPc.topic.RESIDENTOUTLIERANALYSIS
inputType: {}
outputType: {}

