mcs.metadata:
  componentName: DoR SUMMARY EMAIL
  description: Elite clinical intelligence module specialized in [DoRSUMMARYEMAIL]. Executes high-precision data analysis grounded in CMS Chapter 15 and Pacific Coast Services Ironclad Standards. Optimized for Dynamic Chaining.
kind: AdaptiveDialog
modeldescription: Elite clinical intelligence module specialized in [DoRSUMMARYEMAIL]. Executes high-precision data analysis grounded in CMS Chapter 15 and Pacific Coast Services Ironclad Standards. Optimized for Dynamic Chaining.
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    triggerQueries:
      - summarize this for the dor
      - draft a leadership summary
      - write a qm email for leadership
      - create a dor wrap up
      - send a rehab director summary
      - send DoR summary email
      - send DoR summary email for multiple facilities
      - send dor summary for multiple facilities
      - email me the DoR summary
      - multi facility dor summary
      - multiple facility dor summary
      - DoR report email
      - get DoR summary by email
      - share DoR summary via email
      - can you send the DoR summary?
      - request DoR summary email
      - forward the DoR summary to my inbox
      - DoR daily report email
      - create a leadership wrap up from qm findings
      - draft an executive qm summary
      - draft a leadership email for multiple facilities
      - director of rehab summary for multiple facilities

  actions:
    - kind: SetVariable
      id: setVariable_initDorPromptSuppression
      variable: Global.SuppressGenericAnalysisPromptOnce
      value: =false

    - kind: ConditionGroup
      id: conditionGroup_detectDorScope
      conditions:
        - id: conditionItem_allFacilities
          condition: ="all facilities" in Lower(System.Activity.Text) || "all dors" in Lower(System.Activity.Text) || Global.SelectedFacility = "All Facilities"
          actions:
            - kind: SetVariable
              id: setVariable_allFacilitiesScope
              variable: Topic.DorScopeText
              value: All Facilities

        - id: conditionItem_multipleFacilities
          condition: ="multiple facilities" in Lower(System.Activity.Text) || "," in Lower(System.Activity.Text)
          actions:
            - kind: SetVariable
              id: setVariable_multipleFacilitiesScope
              variable: Topic.DorScopeText
              value: Multiple Facilities

        - id: conditionItem_singleFacility
          condition: =!IsBlank(Global.SelectedFacility)
          actions:
            - kind: SetVariable
              id: setVariable_singleFacilityScope
              variable: Topic.DorScopeText
              value: Individual Facility

      elseActions:
        - kind: AdaptiveCardPrompt
          id: adaptiveCardPrompt_dorScopeChoice
          card: |-
            ={
              '$schema': "http://adaptivecards.io/schemas/adaptive-card.json",
              type: "AdaptiveCard",
              version: "1.5",
              body: [
                {
                  type: "TextBlock",
                  text: "What kind of DoR summary do you need?",
                  wrap: true,
                  weight: "Bolder",
                  size: "Medium"
                },
                {
                  type: "TextBlock",
                  text: "If the card does not render correctly, type one of these exactly: Individual Facility, Multiple Facilities, All Facilities.",
                  wrap: true,
                  spacing: "Small"
                }
              ],
              actions: [
                { type: "Action.Submit", title: "Individual Facility", data: { dorScopeChoice: "Individual Facility" } },
                { type: "Action.Submit", title: "Multiple Facilities", data: { dorScopeChoice: "Multiple Facilities" } },
                { type: "Action.Submit", title: "All Facilities", data: { dorScopeChoice: "All Facilities" } }
              ]
            }
          output:
            binding:
              dorScopeChoice: Topic.IndividualOrAllDORsNewChoice

          outputType:
            properties:
              dorScopeChoice: String

        - kind: SetVariable
          id: setVariable_syncDorScopeChoice
          variable: Topic.DorScopeText
          value: =Text(Topic.IndividualOrAllDORsNewChoice)

    - kind: ConditionGroup
      id: conditionGroup_detectFacility
      conditions:
        - id: conditionItem_allFacilities
          condition: =Text(Topic.DorScopeText) = "All Facilities"
          actions:
            - kind: SetVariable
              id: setVariable_allFacilities
              variable: Global.SelectedFacility
              value: All Facilities

            - kind: SetVariable
              id: setVariable_clearPendingDorFacility_allFacilities
              variable: Global.PendingDorFacilitySelection
              value: =false

        - id: conditionItem_existingFacility
          condition: =!IsBlank(Global.SelectedFacility)
          actions:
            - kind: SetVariable
              id: setVariable_clearPendingDorFacility_existing
              variable: Global.PendingDorFacilitySelection
              value: =false

            - kind: SendActivity
              id: sendActivity_existingFacility
              activity: Using the current facility context already in place.

        - id: conditionItem_seaCliff
          condition: ="sea cliff" in Lower(System.Activity.Text)
          actions:
            - kind: SetVariable
              id: setVariable_seaCliff
              variable: Global.SelectedFacility
              value: Sea Cliff

        - id: conditionItem_palmTerrace
          condition: ="palm terrace" in Lower(System.Activity.Text)
          actions:
            - kind: SetVariable
              id: setVariable_palmTerrace
              variable: Global.SelectedFacility
              value: Palm Terrace

        - id: conditionItem_victoria
          condition: ="victoria" in Lower(System.Activity.Text)
          actions:
            - kind: SetVariable
              id: setVariable_victoria
              variable: Global.SelectedFacility
              value: Victoria

        - id: conditionItem_stCatherine
          condition: ="st. catherine" in Lower(System.Activity.Text) || "st catherine" in Lower(System.Activity.Text)
          actions:
            - kind: SetVariable
              id: setVariable_stCatherine
              variable: Global.SelectedFacility
              value: St. Catherine

        - id: conditionItem_stElizabeth
          condition: ="st. elizabeth" in Lower(System.Activity.Text) || "st elizabeth" in Lower(System.Activity.Text)
          actions:
            - kind: SetVariable
              id: setVariable_stElizabeth
              variable: Global.SelectedFacility
              value: St. Elizabeth

        - id: conditionItem_mainplace
          condition: ="mainplace" in Lower(System.Activity.Text)
          actions:
            - kind: SetVariable
              id: setVariable_mainplace
              variable: Global.SelectedFacility
              value: Mainplace

        - id: conditionItem_newOrangeHills
          condition: ="new orange hills" in Lower(System.Activity.Text)
          actions:
            - kind: SetVariable
              id: setVariable_newOrangeHills
              variable: Global.SelectedFacility
              value: New Orange Hills

        - id: conditionItem_theHills
          condition: ="the hills" in Lower(System.Activity.Text)
          actions:
            - kind: SetVariable
              id: setVariable_theHills
              variable: Global.SelectedFacility
              value: The Hills

        - id: conditionItem_beachside
          condition: ="beachside" in Lower(System.Activity.Text)
          actions:
            - kind: SetVariable
              id: setVariable_beachside
              variable: Global.SelectedFacility
              value: Beachside

        - id: conditionItem_alamitosWest
          condition: ="alamitos west" in Lower(System.Activity.Text)
          actions:
            - kind: SetVariable
              id: setVariable_alamitosWest
              variable: Global.SelectedFacility
              value: Alamitos West

        - id: conditionItem_coventryCourt
          condition: ="coventry court" in Lower(System.Activity.Text)
          actions:
            - kind: SetVariable
              id: setVariable_coventryCourt
              variable: Global.SelectedFacility
              value: Coventry Court

        - id: conditionItem_pacificHaven
          condition: ="pacific haven" in Lower(System.Activity.Text)
          actions:
            - kind: SetVariable
              id: setVariable_pacificHaven
              variable: Global.SelectedFacility
              value: Pacific Haven

      elseActions:
        - kind: ConditionGroup
          id: conditionGroup_routeFacilityPrompt
          conditions:
            - id: conditionItem_multipleFacilityCard
              condition: =Text(Topic.DorScopeText) = "Multiple Facilities"
              actions:
                - kind: AdaptiveCardPrompt
                  id: adaptiveCardPrompt_multiFacilityDor
                  card: |-
                    ={
                      '$schema': "http://adaptivecards.io/schemas/adaptive-card.json",
                      type: "AdaptiveCard",
                      version: "1.5",
                      body: [
                        {
                          type: "TextBlock",
                          text: "Select one or more facilities for this DoR summary.",
                          wrap: true,
                          weight: "Bolder",
                          size: "Medium"
                        },
                        {
                          type: "TextBlock",
                          text: "Use the checkboxes below, then submit your selection.",
                          wrap: true,
                          spacing: "Small"
                        },
                        {
                          type: "Input.ChoiceSet",
                          id: "selectedFacilities",
                          isMultiSelect: true,
                          style: "expanded",
                          choices: [
                            { title: "Sea Cliff", value: "Sea Cliff" },
                            { title: "Palm Terrace", value: "Palm Terrace" },
                            { title: "Victoria", value: "Victoria" },
                            { title: "St. Catherine", value: "St. Catherine" },
                            { title: "St. Elizabeth", value: "St. Elizabeth" },
                            { title: "Mainplace", value: "Mainplace" },
                            { title: "New Orange Hills", value: "New Orange Hills" },
                            { title: "The Hills", value: "The Hills" },
                            { title: "Beachside", value: "Beachside" },
                            { title: "Alamitos West", value: "Alamitos West" },
                            { title: "Coventry Court", value: "Coventry Court" },
                            { title: "Pacific Haven", value: "Pacific Haven" }
                          ]
                        }
                      ],
                      actions: [
                        {
                          type: "Action.Submit",
                          title: "Use selected facilities",
                          data: {
                            id: "dorFacilityMultiSelect"
                          }
                        }
                      ]
                    }
                  output:
                    binding:
                      actionSubmitId: Topic.DorFacilityCardAction
                      id: Topic.DorFacilityCardSubmitId
                      selectedFacilities: Topic.DorSelectedFacilitiesRaw

                  outputType:
                    properties:
                      actionSubmitId: String
                      id: String
                      selectedFacilities: String

                - kind: SetVariable
                  id: setVariable_markPendingDorFacilityCard
                  variable: Global.PendingDorFacilitySelection
                  value: =true

                - kind: ConditionGroup
                  id: conditionGroup_validateMultiFacilityCard
                  conditions:
                    - id: conditionItem_multiFacilitySelected
                      condition: =!IsBlank(Topic.DorSelectedFacilitiesRaw)
                      actions:
                        - kind: SetVariable
                          id: setVariable_selectedMultiFacilities
                          variable: Global.SelectedFacility
                          value: =Substitute(Text(Topic.DorSelectedFacilitiesRaw), ",", ", ")

                        - kind: SetVariable
                          id: setVariable_clearPendingDorFacility_afterCard
                          variable: Global.PendingDorFacilitySelection
                          value: =false

                  elseActions:
                    - kind: SetVariable
                      id: setVariable_keepPendingDorFacility_afterCardFailure
                      variable: Global.PendingDorFacilitySelection
                      value: =true

                    - kind: SendActivity
                      id: sendActivity_multiFacilityRequired
                      activity: Select at least one facility from the card before continuing the DoR summary workflow. Do not send the document type yet.

                    - kind: EndDialog
                      id: endDialog_multiFacilityRequired

            - id: conditionItem_singleFacilityPrompt
              condition: =true
              actions:
                - kind: SetVariable
                  id: setVariable_markPendingDorFacility_singlePrompt
                  variable: Global.PendingDorFacilitySelection
                  value: =true

                - kind: AdaptiveCardPrompt
                  id: adaptiveCardPrompt_singleFacilityDor
                  card: |-
                    ={
                      '$schema': "http://adaptivecards.io/schemas/adaptive-card.json",
                      type: "AdaptiveCard",
                      version: "1.5",
                      body: [
                        {
                          type: "TextBlock",
                          text: "Which facility is this DoR Summary for?",
                          wrap: true,
                          weight: "Bolder",
                          size: "Medium"
                        },
                        {
                          type: "TextBlock",
                          text: "Choose a facility below, or type the facility name directly if needed.",
                          wrap: true,
                          spacing: "Small"
                        },
                        {
                          type: "Input.ChoiceSet",
                          id: "facilityChoiceNew",
                          style: "expanded",
                          choices: [
                            { title: "Sea Cliff", value: "Sea Cliff" },
                            { title: "Palm Terrace", value: "Palm Terrace" },
                            { title: "Victoria", value: "Victoria" },
                            { title: "St. Catherine", value: "St. Catherine" },
                            { title: "St. Elizabeth", value: "St. Elizabeth" },
                            { title: "Mainplace", value: "Mainplace" },
                            { title: "New Orange Hills", value: "New Orange Hills" },
                            { title: "The Hills", value: "The Hills" },
                            { title: "Beachside", value: "Beachside" },
                            { title: "Alamitos West", value: "Alamitos West" },
                            { title: "Coventry Court", value: "Coventry Court" },
                            { title: "Pacific Haven", value: "Pacific Haven" }
                          ]
                        }
                      ],
                      actions: [
                        { type: "Action.Submit", title: "Use selected facility", data: { id: "singleDorFacilitySelection" } }
                      ]
                    }
                  output:
                    binding:
                      facilityChoiceNew: Topic.FacilityChoiceNew

                  outputType:
                    properties:
                      facilityChoiceNew: String

                - kind: SetVariable
                  id: setVariable_manualFacility
                  variable: Global.SelectedFacility
                  value: =Text(Topic.FacilityChoiceNew)

                - kind: SetVariable
                  id: setVariable_clearPendingDorFacility_singlePrompt
                  variable: Global.PendingDorFacilitySelection
                  value: =false

    - kind: ConditionGroup
      id: conditionGroup_validateFacilitySelection
      conditions:
        - id: conditionItem_hasFacilitySelection
          condition: =!IsBlank(Global.SelectedFacility)

      elseActions:
        - kind: SetVariable
          id: setVariable_keepPendingDorFacility_missing
          variable: Global.PendingDorFacilitySelection
          value: =true

        - kind: SendActivity
          id: sendActivity_missingFacilitySelection
          activity: I need at least one facility selection before I can continue the DoR summary workflow. Finish facility selection first, then continue with document type.

        - kind: EndDialog
          id: endDialog_missingFacilitySelection

    - kind: ConditionGroup
      id: conditionGroup_detectExistingAttachment
      conditions:
        - id: conditionItem_existingAttachment
          condition: =IsEmpty(System.Activity.Attachments) = false
          actions:
            - kind: SetVariable
              id: setVariable_detectExistingAttachmentType
              variable: Topic.UploadFile
              value: =If(EndsWith(Lower(First(System.Activity.Attachments).Name), ".csv"), "CSV", If(EndsWith(Lower(First(System.Activity.Attachments).Name), ".xlsx") || EndsWith(Lower(First(System.Activity.Attachments).Name), ".xls"), "Excel", If(EndsWith(Lower(First(System.Activity.Attachments).Name), ".pdf"), "PDF", If(EndsWith(Lower(First(System.Activity.Attachments).Name), ".doc") || EndsWith(Lower(First(System.Activity.Attachments).Name), ".docx"), "Word", If(EndsWith(Lower(First(System.Activity.Attachments).Name), ".png") || EndsWith(Lower(First(System.Activity.Attachments).Name), ".jpg") || EndsWith(Lower(First(System.Activity.Attachments).Name), ".jpeg") || EndsWith(Lower(First(System.Activity.Attachments).Name), ".tif") || EndsWith(Lower(First(System.Activity.Attachments).Name), ".tiff"), "Image", "Written Summary")))))

            - kind: SetVariable
              id: setVariable_useExistingAttachment
              variable: Topic.UploadEntireFile
              value: =First(System.Activity.Attachments).Value

            - kind: SendActivity
              id: sendActivity_reuseExistingAttachment
              activity: I detected the attached file in your message and will reuse it for the DoR summary workflow.

      elseActions:
        - kind: AdaptiveCardPrompt
          id: adaptiveCardPrompt_documentTypeChoice
          card: |-
            ={
              '$schema': "http://adaptivecards.io/schemas/adaptive-card.json",
              type: "AdaptiveCard",
              version: "1.5",
              body: [
                {
                  type: "TextBlock",
                  text: "What type of document are you providing for the DoR Summary?",
                  wrap: true,
                  weight: "Bolder",
                  size: "Medium"
                },
                {
                  type: "TextBlock",
                  text: "If the card does not render correctly, type one of these exactly: CSV, Excel, PDF, Word, Image, Email, Written Summary.",
                  wrap: true,
                  spacing: "Small"
                }
              ],
              actions: [
                { type: "Action.Submit", title: "CSV", data: { documentTypeChoice: "CSV" } },
                { type: "Action.Submit", title: "Excel", data: { documentTypeChoice: "Excel" } },
                { type: "Action.Submit", title: "PDF", data: { documentTypeChoice: "PDF" } },
                { type: "Action.Submit", title: "Word", data: { documentTypeChoice: "Word" } },
                { type: "Action.Submit", title: "Image", data: { documentTypeChoice: "Image" } },
                { type: "Action.Submit", title: "Email", data: { documentTypeChoice: "Email" } },
                { type: "Action.Submit", title: "Written Summary", data: { documentTypeChoice: "Written Summary" } }
              ]
            }
          output:
            binding:
              documentTypeChoice: Topic.UploadFileChoice

          outputType:
            properties:
              documentTypeChoice: String

        - kind: SetVariable
          id: setVariable_syncUploadFileChoice
          variable: Topic.UploadFile
          value: =Text(Topic.UploadFileChoice)

        - kind: Question
          id: question_rggEtK
          interruptionPolicy:
            allowInterruption: true

          variable: Topic.UploadEntireFile
          prompt: Please upload your document now.
          entity:
            kind: FilePrebuiltEntity
            sensitivityLevel: None

    - kind: SendActivity
      id: sendActivity_Xk89jr
      activity: Processing the DoR summary now.

    - kind: ConditionGroup
      id: conditionGroup_fileCheck
      conditions:
        - id: conditionItem_filePresent
          condition: =!IsBlank(Topic.UploadEntireFile)

      elseActions:
        - kind: SendActivity
          id: sendActivity_noFile
          activity: No document was uploaded. Please try again and upload your file when prompted.

    - kind: SendActivity
      id: yPZ9CK
      activity: I have the facility selection and supporting document. I will analyze the material and move the result into the DoR review workflow.

    - kind: BeginDialog
      id: lcpzUg
      input:
        binding:
          DocumentType: =Text(Topic.UploadFile)
          InboundFacility: =If(!IsBlank(Global.SelectedFacility), Global.SelectedFacility, Text(Topic.FacilityChoiceNew))

      dialog: cr917_agentu92bPc.topic.QMORCHESTRATOR
      output:
        binding:
          ProcessingStatus: Topic.ProcessingStatus

    - kind: ConditionGroup
      id: conditionGroup_handleOrchestratorReturn
      conditions:
        - id: conditionItem_orchestratorAwaitingInput
          condition: =Text(Topic.ProcessingStatus) = "AwaitingInput"
          actions:
            - kind: SetVariable
              id: setVariable_suppressGenericAnalysisPromptAfterDorAwaiting
              variable: Global.SuppressGenericAnalysisPromptOnce
              value: =true

            - kind: SetVariable
              id: setVariable_clearPendingDorFacility_afterAwaiting
              variable: Global.PendingDorFacilitySelection
              value: =false

            - kind: SendActivity
              id: sendActivity_orchestratorNeedsBetterInput
              activity: I could not complete the DoR summary from that document alone. Upload a SimpleLTC CSV or Excel export, or a cleaner facility-level PDF that clearly includes facility names and QM rates.

            - kind: EndDialog
              id: endDialog_afterAwaitingInput

        - id: conditionItem_orchestratorFailed
          condition: =Text(Topic.ProcessingStatus) = "Failed"
          actions:
            - kind: SetVariable
              id: setVariable_suppressGenericAnalysisPromptAfterDorFailure
              variable: Global.SuppressGenericAnalysisPromptOnce
              value: =true

            - kind: SetVariable
              id: setVariable_clearPendingDorFacility_afterFailure
              variable: Global.PendingDorFacilitySelection
              value: =false

            - kind: SendActivity
              id: sendActivity_orchestratorFailed
              activity: The DoR summary workflow could not complete from the current input. Try again with a supported export or paste the QM summary text directly.

            - kind: EndDialog
              id: endDialog_afterFailure

        - id: conditionItem_orchestratorSuccess
          condition: =Text(Topic.ProcessingStatus) = "Success"
          actions:
            - kind: SetVariable
              id: setVariable_clearPendingDorFacility_afterSuccess
              variable: Global.PendingDorFacilitySelection
              value: =false

            - kind: EndDialog
              id: endDialog_afterSuccess

inputType:
  properties:
    QMAccountabilityMatrix:
      displayName: QMAccountabilityMatrix
      type: String

    QMActionPlan:
      displayName: QMActionPlan
      type: String

    QMDomain:
      displayName: QMDomain
      type: String

    UploadEntireFile:
      displayName: UploadEntireFile
      type: File

outputType:
  properties:
    QMDomain:
      displayName: QMDomain
      type: String


