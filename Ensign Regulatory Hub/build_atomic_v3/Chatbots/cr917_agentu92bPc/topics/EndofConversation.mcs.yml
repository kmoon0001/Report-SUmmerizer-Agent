mcs.metadata:
  componentName: End of Conversation
  description: Elite clinical intelligence module specialized in [EndofConversation]. Executes high-precision data analysis grounded in CMS Chapter 15 and Pacific Coast Services Ironclad Standards. Optimized for Dynamic Chaining.
    Improved End of Conversation topic with menu-driven re-engagement for better UX.
beginDialog:
  kind: OnSystemRedirect
  id: main
  actions:
    - kind: Question
      id: survey
      variable: Topic.SurveyResponse
      prompt: "Did this support your documentation audit needs?"
      entity: BooleanPrebuiltEntity

    - kind: ConditionGroup
      id: SurveyCheck
      conditions:
        - id: Positive
          condition: =Topic.SurveyResponse = true
          actions:
            - kind: CSATQuestion
              id: csat

            - kind: SendActivity
              id: SuccessMsg
              activity: |
                Great! I'm glad I could help harden your documentation. 
                
                You can share another PT, OT, or SLP note anytime.

    - kind: Question
      id: ContinueChoice
      variable: Topic.WantToContinue
      prompt: "Would you like to perform another analysis or go back to the Main Menu?"
      entity: BooleanPrebuiltEntity

    - kind: ConditionGroup
      id: ReEngagement
      conditions:
        - id: Continue
          condition: =Topic.WantToContinue = true
          actions:
            - kind: BeginDialog
              id: BackToMenu
              dialog: cr917_agentu92bPc.topic.Greeting

      elseActions:
        - kind: SendActivity
          id: Farewell
          activity: |
            Goodbye for now. 
            
            Remember: Your clinical judgment is the driver; my feedback is the navigator. Stay compliant!
        
        - kind: EndConversation
          id: end
inputType: {}
outputType: {}




