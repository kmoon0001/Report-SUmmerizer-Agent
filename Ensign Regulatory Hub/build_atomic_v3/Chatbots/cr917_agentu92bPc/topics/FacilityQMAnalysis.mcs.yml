mcs.metadata:
  componentName: Facility QM Analysis
kind: AdaptiveDialog
modeldescription: Elite clinical intelligence module specialized in [FacilityQMAnalysis]. Executes high-precision data analysis grounded in CMS Chapter 15 and Pacific Coast Services Ironclad Standards. Optimized for Dynamic Chaining.
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent: {}
  actions:
    - kind: Question
      id: question_kRoz7l
      interruptionPolicy:
        allowInterruption: true
      variable: init:Topic.selectedFacility
      prompt: Which facility should we analyze at the QM performance level?
      entity: StringPrebuiltEntity

    - kind: AdaptiveCardPrompt
      id: adaptiveCardPrompt_qmMeasureFocus
      card: |-
        ={
          '$schema': "http://adaptivecards.io/schemas/adaptive-card.json",
          type: "AdaptiveCard",
          version: "1.5",
          body: [
            {
              type: "TextBlock",
              text: "QM Measure Focus",
              wrap: true,
              weight: "Bolder",
              size: "Medium",
              style: "heading"
            },
            {
              type: "TextBlock",
              text: "Which quality measure or domain should be the focus of this analysis?",
              wrap: true,
              spacing: "Small"
            }
          ],
          actions: [
            { type: "Action.Submit", title: "âš ï¸ Falls", data: { qmMeasureFocus: "Falls" }, tooltip: "Falls with major injury" },
            { type: "Action.Submit", title: "ðŸ“‰ ADL Decline", data: { qmMeasureFocus: "ADL Decline" }, tooltip: "Mobility and ADL function decline" },
            { type: "Action.Submit", title: "ðŸ©¹ Pressure Ulcers", data: { qmMeasureFocus: "Pressure Ulcers" }, tooltip: "New or worsened pressure injuries" },
            { type: "Action.Submit", title: "ðŸ’Š Antipsychotic Use", data: { qmMeasureFocus: "Antipsychotic Use" }, tooltip: "Antipsychotic medication rates" },
            { type: "Action.Submit", title: "ðŸ˜£ Pain", data: { qmMeasureFocus: "Pain" }, tooltip: "Moderate to severe pain rates" },
            { type: "Action.Submit", title: "ðŸ“‹ All QMs (Full Review)", data: { qmMeasureFocus: "All QMs" }, tooltip: "Comprehensive review of all quality measures" }
          ]
        }
      output:
        binding:
          qmMeasureFocus: Topic.qmMeasureFocus
      outputType:
        properties:
          qmMeasureFocus: String

      variable: init:Topic.qmMeasureFocus
      prompt: Which QM measure or metric should be the focus?
      entity: StringPrebuiltEntity

    - kind: Question
      id: question_rmNzwr
      interruptionPolicy:
        allowInterruption: true

      variable: init:Topic.analysisGoal
      prompt: "What analysis outcome do you need first: trend, benchmark, risk flag, or summary?"
      entity:
        kind: EmbeddedEntity
        definition:
          kind: ClosedListEntity
          items:
            - id: Trend
              displayName: Trend

            - id: Benchmark
              displayName: Benchmark

            - id: Risk flag
              displayName: Risk flag

            - id: Summary
              displayName: Summary

        displayName: EmbeddedEntity-BgDsI7

    - kind: ConditionGroup
      id: conditionGroup_FuNS1n
      conditions:
        - id: conditionItem_H7t5ex
          condition: =Topic.analysisGoal = 'cr917_agent.topic.FacilityQMAnalysis.main.question_rmNzwr'.Benchmark

        - id: conditionItem_9tNZ7x
          condition: =Topic.analysisGoal = 'cr917_agent.topic.FacilityQMAnalysis.main.question_rmNzwr'.'Risk flag'

        - id: conditionItem_Lcfoz3
          condition: =Topic.analysisGoal = 'cr917_agent.topic.FacilityQMAnalysis.main.question_rmNzwr'.Summary
    - kind: InvokeFlowAction
      id: invokeFlowAction_dejUVb
      input:
        binding:
          text: =Topic.selectedFacility

      output:
        binding:
          confirmationmessage: Topic.ConfirmationMessage
          declining_metrics_text: Topic.DecliningMetricsText
          facility_data_text: Topic.FacilityDataText
          facility_submission_status: Topic.FacilitySubmissionStatus
      flowId: 0b930a15-2516-f111-8341-0022480b6bd9

inputType: {}
outputType: {}


