mcs.metadata:
  componentName: Safety and Critical Risk Flags
  description: Elite clinical intelligence module specialized in [Safetyandcriticalriskflags]. Executes high-precision data analysis grounded in CMS Chapter 15 and Ensign Services Ironclad Standards. Optimized for Dynamic Chaining.
    Enhanced Safety and Risk topic featuring automated risk detection from notes.
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    triggerQueries:
      - safety flags
      - critical risk alerts
      - report a safety issue
      - are there any safety risks?
      - show critical risk flags
      - flagged safety concerns
      - current risk warnings
      - view safety and risk notifications
      - list critical incidents

  actions:
    - kind: SendActivity
      id: IntroMsg
      activity: I will analyze your documentation for clinical safety indicators such as aspiration risk, falls, and cognitive judgment gaps.

    - kind: Question
      id: GetNote
      variable: Topic.SourceNote
      prompt: "Please paste the documentation you would like to screen for safety risks:"
      entity: StringPrebuiltEntity

    - kind: SendActivity
      id: ScanningMsg
      activity: "🛡️ **Scanning for safety risks...**"

    - kind: BeginDialog
      id: CallRiskEngine
      input:
        binding:
          documentation: =Topic.SourceNote
          mode: risk_score
      dialog: cr917_agentu92bPc.agent.Compliance_Risk_Engine
      output:
        binding:
          QuickRiskResult: Topic.RiskResult

    - kind: SendActivity
      id: RiskSummary
      activity: |
        ### Safety Screening Results
        {Topic.RiskResult}
        
        **Remediation Guidance:**
        - Ensure any "Immediate Harm" risks found are communicated to the IDT immediately.
        - Verify that the plan of care reflects specific interventions for each identified safety risk.

    - kind: SendActivity
      id: Disclaimer
      activity: "⚠️ Analysis is for administrative audit support only and does not replace medical advice."

inputType: {}
outputType: {}



