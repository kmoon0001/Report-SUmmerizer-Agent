mcs.metadata:
  componentName: QM Orchestrator
  description: Elite clinical intelligence module specialized in [QMORCHESTRATOR]. Executes high-precision data analysis grounded in CMS Chapter 15 and Pacific Coast Services Ironclad Standards. Optimized for Dynamic Chaining.
kind: AdaptiveDialog
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent: {}
  actions:
    - kind: Question
      id: question_V6zkac
      interruptionPolicy:
        allowInterruption: true

      variable: init:Topic.routeChoice
      prompt: Choose a QM workflow to continue.
      entity:
        kind: EmbeddedEntity
        definition:
          kind: ClosedListEntity
          items:
            - id: Facility QM Review
              displayName: Facility QM Review

            - id: QM Driver Analysis
              displayName: QM Driver Analysis

            - id: Resident Outlier Analysis
              displayName: Resident Outlier Analysis

            - id: QM Decline Detection
              displayName: QM Decline Detection

            - id: QM Action Plan
              displayName: QM Action Plan

            - id: DoR Summary Email
              displayName: DoR Summary Email

            - id: QM Intake
              displayName: QM Intake

        displayName: EmbeddedEntity-X0yGRB

    - kind: ConditionGroup
      id: conditionGroup_imoZbs
      conditions:
        - id: conditionItem_du1Pbq
          condition: =Topic.routeChoice = 'cr917_agent.topic.QMOrchestrator.main.question_V6zkac'.'Facility QM Review'
          actions:
            - kind: BeginDialog
              id: beginDialog_FacilityQM
              dialog: cr917_agent.topic.FacilityQMAnalysis

        - id: conditionItem_GnZ8zv
          condition: =Topic.routeChoice = 'cr917_agent.topic.QMOrchestrator.main.question_V6zkac'.'QM Driver Analysis'
          actions:
            - kind: BeginDialog
              id: beginDialog_QMDrivers
              dialog: cr917_agent.topic.QMDriverAnalysis

        - id: conditionItem_7qkYQo
          condition: =Topic.routeChoice = 'cr917_agent.topic.QMOrchestrator.main.question_V6zkac'.'Resident Outlier Analysis'
          actions:
            - kind: BeginDialog
              id: beginDialog_ResidentOutlier
              dialog: cr917_agent.topic.ResidentOutlierAnalysis

        - id: conditionItem_7g7Fbw
          condition: =Topic.routeChoice = 'cr917_agent.topic.QMOrchestrator.main.question_V6zkac'.'QM Decline Detection'
          actions:
            - kind: BeginDialog
              id: beginDialog_DeclineDetection
              dialog: cr917_agent.topic.QMDataUploadDeclineDetection

        - id: conditionItem_GXwrUu
          condition: =Topic.routeChoice = 'cr917_agent.topic.QMOrchestrator.main.question_V6zkac'.'QM Action Plan'
          actions:
            - kind: BeginDialog
              id: beginDialog_ActionPlan
              dialog: cr917_agent.topic.QMActionPlan

        - id: conditionItem_irYU4n
          condition: =Topic.routeChoice = 'cr917_agent.topic.QMOrchestrator.main.question_V6zkac'.'DoR Summary Email'
          actions:
            - kind: BeginDialog
              id: beginDialog_DoRSummary
              dialog: cr917_agent.topic.DoRSummary

        - id: conditionItem_I1YmEg
          condition: =Topic.routeChoice = 'cr917_agent.topic.QMOrchestrator.main.question_V6zkac'.'QM Intake'
          actions:
            - kind: BeginDialog
              id: beginDialog_QMIntake
              dialog: cr917_agent.topic.QMIntake

      elseActions:
        - kind: SendActivity
          id: sendActivity_invalidChoice
          activity: I didn't recognize that choice. Please select one of the available QM workflows.

inputType: {}
outputType:
  properties:
    ProcessingStatus:
      type: String
      title: ProcessingStatus


