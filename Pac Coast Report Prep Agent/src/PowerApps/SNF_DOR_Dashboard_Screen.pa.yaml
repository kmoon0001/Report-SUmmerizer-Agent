# Power Fx / YAML Representation of SNF_Rehab_DOR_Dashboard (TodayOverview Screen)
# Optimized: Responsive formulas and centralized Global Theming Variables

App:
  Theme: PowerAppsTheme
  OnStart: |
    // Optimization: Pre-cache themes and required arrays on boot
    Set(gblAppTheme, {
       Primary: RGBA(0, 99, 177, 1),
       Background: RGBA(243, 244, 246, 1),
       TextAlert: RGBA(219, 58, 52, 1)
    });
    // Pre-fetch non-volatile metadata into collections to reduce network calls
    ClearCollect(colFacilities, ["FAC-1001", "FAC-1002"]);
  Properties:
    Name: Pac_Coast_Reports_DOR_Dashboard
    
Screens:
  TodayOverview:
    Properties:
      Fill: gblAppTheme.Background # Mapped dynamically to global object
      
    Controls:
      - HeaderContainer:
          Control: GroupContainer
          Properties:
            Width: Max(App.Width, 1024) # Ensure responsive breakpoints
            Height: 80
            Fill: gblAppTheme.Primary # Reused Global

          Controls:
            - TitleLabel:
                Control: Label
                Properties:
                  Text: "Pac Coast Report Prep Orchestration HQ"
                  Color: Color.White
                  Size: 24
                  FontWeight: FontWeight.Bold
                  
            - GenerateBriefingButton:
                Control: Button
                Properties:
                  Text: "Run Daily Copilot Orchestrator"
                  OnSelect: |
                    // Optimization: Use Concurrent to spawn network requests parallelly
                    Concurrent(
                      cr917_SNF_Daily_ETL_Flow.Run(),
                      Set(varLoadingOrchestrator, true)
                    );
                    Refresh(cr917_snf_daily_briefings);
                    Set(varLoadingOrchestrator, false);
                    Notify("Copilot extraction generated successfully.", NotificationType.Success)

      - KPIGallery:
          Control: Gallery
          Properties:
            Items: |
              // Fetches aggregate data from Dataverse
              GroupBy(cr917_snf_daily_briefings, "cr917_reporttype", "GroupedReports")
          Template:
            - KPICard:
                Control: Label
                Properties:
                  Text: ThisItem.cr917_reporttype & ": " & CountRows(ThisItem.GroupedReports)

      - ApprovalGrid:
          Control: Gallery
          Properties:
            Items: Filter(cr917_snf_daily_briefings, cr917_isprocessed = false)
            Layout: Layout.Vertical
          Template:
            - TherapistText:
                Control: Label
                Properties:
                  Text: "Therapist: " & ThisItem.cr917_therapistname
            - PatientText:
                Control: Label
                Properties:
                  Text: "Token: " & ThisItem.cr917_patienttoken
            - MedicalNecessityInput:
                Control: TextInput
                Properties:
                  Default: ThisItem.cr917_medicalnecessity
                  OnChange: |
                    Patch(cr917_snf_daily_briefings, ThisItem, {cr917_medicalnecessity: Self.Text})
            - ExcludeToggle:
                Control: Toggle
                Properties:
                  Title: "Exclude from Teams Broadcast"
                  OnChange: |
                    Patch(cr917_snf_daily_briefings, ThisItem, {cr917_excludefromsend: Self.Value})



