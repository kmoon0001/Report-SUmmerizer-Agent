mcs.metadata:
  componentName: QM Action Plan
  description: Elite clinical intelligence module specialized in [QMACTIONPLAN]. Executes high-precision data analysis grounded in CMS Chapter 15 and Pacific Coast Services Ironclad Standards. Optimized for Dynamic Chaining.
kind: AdaptiveDialog
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent: {}
  actions:
    - kind: ConditionGroup
      id: conditionGroup_facilityContext
      conditions:
        - id: conditionItem_hasGlobalFacility
          condition: =!IsBlank(Global.SelectedFacility)
          actions:
            - kind: SetVariable
              id: setVariable_syncActionPlanFacility
              variable: Topic.selectedFacility
              value: =Global.SelectedFacility

      elseActions:
        - kind: Question
          id: question_MdF0YE
          interruptionPolicy:
            allowInterruption: true

          variable: init:Topic.selectedFacility
          prompt: Which facility does this action plan apply to?
          entity: StringPrebuiltEntity

    - kind: Question
      id: question_I26cBZ
      interruptionPolicy:
        allowInterruption: true

      variable: init:Topic.targetMetric
      prompt: Which QM metric is the primary target for this action plan?
      entity: StringPrebuiltEntity

    - kind: Question
      id: question_DuVSAg
      interruptionPolicy:
        allowInterruption: true

      variable: init:Topic.planTimeline
      prompt: What timeline should the first action cycle use (for example 14, 30, or 60 days)?
      entity:
        kind: EmbeddedEntity
        definition:
          kind: ClosedListEntity
          items:
            - id: 7-30-90 days
              displayName: 7-30-90 days

            - id: 14 days
              displayName: 14 days

            - id: 30 days
              displayName: 30 days

            - id: 60 days
              displayName: 60 days

        displayName: EmbeddedEntity-NkC5XE

    - kind: ConditionGroup
      id: conditionGroup_LabKPu
      conditions:
        - id: conditionItem_OfcRmu
          condition: =Topic.planTimeline = "14 days"

        - id: conditionItem_Y3Gix9
          condition: =Topic.planTimeline = "30 days"

        - id: conditionItem_uY5sXT
          condition: =Topic.planTimeline = "60 days"

    - kind: InvokeFlowAction
      id: invokeFlowAction_IgRCDO
      input:
        binding:
          text: =Topic.targetMetric

      output:
        binding:
          hitl_approval: Topic.ActionPlanDraft

      flowId: fcf035ad-af0c-f111-8406-0022480b6bd9
      
    - kind: ConditionGroup
      id: conditionGroup_checkFlowResult
      conditions:
        - id: conditionItem_emptyResult
          condition: =IsBlank(Topic.ActionPlanDraft)
          actions:
            - kind: SendActivity
              id: sendActivity_errorFlow
              activity: I was unable to generate the QM Action Plan. The backend service may be unavailable. Please try again.
            - kind: EndDialog
              id: endDialog_errorFlow
      elseActions:
        - kind: SendActivity
          id: sendActivity_showDraft
          activity: ="Here is the generated Action Plan draft for your review:\n\n" & Topic.ActionPlanDraft

    - kind: BeginDialog
      id: beginDialog_hitl
      input: {}
      dialog: cr917_agentu92bPc.topic.HITLAPPROVAL
      output:
        binding:
          hitl_approval: Topic.hitl_approval

    - kind: ConditionGroup
      id: conditionGroup_checkHITLApproval
      conditions:
        - id: conditionItem_approvalGranted
          condition: =Global.HITL_Approval = true
          actions:
            - kind: SendActivity
              id: sendActivity_approvalGranted
              activity: |-
                **PDSA ACTION PLAN FINALIZED Ã¢Å“â€¦**
                
                **PLAN:** Targeted improvement in =Topic.targetMetric for =Global.SelectedFacility.
                
                **DO:** Implementation cycle of =Topic.planTimeline initiated.
                
                **STUDY:** Monitoring metrics and documentation checkpoints scheduled.
                
                **ACT:** Escalation triggers enabled if benchmark variance exceeds threshold.
                
                *This plan is now registered as an authoritative record of Quality Improvement.*
      elseActions:
        - kind: SendActivity
          id: sendActivity_approvalRejected
          activity: "Action plan was not approved. Please review the feedback, adjust your input, and try again."
        - kind: GoToTopic
          id: goToTopic_escalate
          topicName: cr917_agentu92bPc.topic.Escalate

inputType: {}
outputType: {}


