    displayName: End of Conversation
    parentBotId: a1133f91-9d37-f111-88b3-000d3a383a6c
    description: |-
      This system topic is only triggered by a redirect action,
      and guides the user through rating their conversation with the agent.
    shareContext: {}
    state: Active
    status: Active
    publisherUniqueName: DefaultPublisherorgbd048f00
    schemaName: template-content.topic.EndofConversation
    dialog:
      beginDialog:
        kind: OnSystemRedirect
        id: main
        actions:
          - kind: Question
            id: survey
            variable: Topic.SurveyResponse
            prompt: Did this support your documentation audit needs?
            entity: BooleanPrebuiltEntity

          - kind: ConditionGroup
            id: SurveyCheck
            conditions:
              - id: Positive
                condition: =Topic.SurveyResponse = true
                actions:
                  - kind: CSATQuestion
                    id: csat

                  - kind: SendActivity
                    id: SuccessMsg
                    activity: |
                      Great! I'm glad I could help harden your documentation. 

                      You can share another PT, OT, or SLP note anytime.

          - kind: Question
            id: ContinueChoice
            variable: Topic.WantToContinue
            prompt: Would you like to perform another analysis or go back to the Main Menu?
            entity: BooleanPrebuiltEntity

          - kind: ConditionGroup
            id: ReEngagement
            conditions:
              - id: Continue
                condition: =Topic.WantToContinue = true
                actions:
                  - kind: BeginDialog
                    id: BackToMenu
                    dialog: template-content.topic.Greeting

            elseActions:
              - kind: SendActivity
                id: Farewell
                activity: |
                  Goodbye for now. 

                  Remember: Your clinical judgment is the driver; my feedback is the navigator. Stay compliant!

              - kind: EndConversation
                id: end

      inputType: {}
      outputType: {}
      mcs.metadata:
        componentName: End of Conversation
        description: |
          Improved End of Conversation topic with menu-driven re-engagement for better UX.

