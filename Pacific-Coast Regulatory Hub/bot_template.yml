    displayName: Conversationalboosting
    parentBotId: a1133f91-9d37-f111-88b3-000d3a383a6c
    shareContext: {}
    state: Active
    status: Active
    publisherUniqueName: DefaultPublisherorgbd048f00
    schemaName: template-content.topic.Conversationalboosting
    dialog:
      beginDialog:
        kind: OnUnknownIntent
        id: main
        priority: -1
        actions:
          - kind: SearchAndSummarizeContent
            id: search-content
            variable: Topic.Answer
            userInput: =System.Activity.Text

          - kind: ConditionGroup
            id: has-answer-conditions
            conditions:
              - id: has-answer
                condition: =!IsBlank(Topic.Answer)
                actions:
                  - kind: SendActivity
                    id: DisplayAnswer
                    activity: "{Topic.Answer}"

                  - kind: Question
                    id: CheckHelpfulness
                    variable: Topic.IsHelpful
                    prompt: Was this information helpful for your compliance review?
                    entity: BooleanPrebuiltEntity

                  - kind: ConditionGroup
                    id: FeedbackLogic
                    conditions:
                      - id: NotHelpful
                        condition: =Topic.IsHelpful = false
                        actions:
                          - kind: SendActivity
                            id: Apology
                            activity: I apologize for not finding a precise answer. Would you like to escalate this to a human reviewer or try rephrasing?

                          - kind: Question
                            id: EscalateChoice
                            variable: Topic.WantEscalate
                            prompt: Escalate to human review?
                            entity: BooleanPrebuiltEntity

                          - kind: ConditionGroup
                            id: EscalateRedirect
                            conditions:
                              - id: Escalate
                                condition: =Topic.WantEscalate = true
                                actions:
                                  - kind: BeginDialog
                                    id: CallEscalate
                                    dialog: template-content.topic.Escalate

                  - kind: EndDialog
                    id: end-topic
                    clearTopicQueue: true

      mcs.metadata:
        componentName: Conversational Boosting
        description: |
          Enhanced Conversational Boosting with integrated user feedback loop for AI quality tracking.

