mcs.metadata:
  componentName: Care Plan Adherence And Goal Attainment
  description: Elite clinical intelligence module specialized in [CarePlanAdherenceAndGoalAttainment]. Executes high-precision data analysis grounded in CMS Chapter 15 and Ensign Services Ironclad Standards. Optimized for Dynamic Chaining.
kind: AdaptiveDialog
modeldescription: Elite clinical intelligence module specialized in [CarePlanAdherenceAndGoalAttainment]. Executes high-precision data analysis grounded in CMS Chapter 15 and Ensign Services Ironclad Standards. Optimized for Dynamic Chaining.
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    displayName: Care Plan Adherence And Goal Attainment
    includeInOnSelectIntent: true
    triggerQueries:
      - care plan adherence
      - goal attainment
      - intervention variance
      - care plan review
      - goal progress

  actions:
    - kind: Question
      id: question_scope
      alwaysPrompt: true
      variable: init:Topic.ScopeChoice
      prompt: What scope should I review?
      entity:
        kind: DynamicClosedListEntity
        items:
          - DisplayName: One patient
            Value: Patient
          - DisplayName: One unit
            Value: Unit
          - DisplayName: Service-line trend
            Value: ServiceLine

    - kind: Question
      id: question_focus
      alwaysPrompt: true
      variable: init:Topic.FocusChoice
      prompt: What is the main focus?
      entity:
        kind: DynamicClosedListEntity
        items:
          - DisplayName: Ordered intervention completion
            Value: InterventionCompletion
          - DisplayName: Goal progress and attainment
            Value: GoalAttainment
          - DisplayName: Care variance and missed steps
            Value: CareVariance
          - DisplayName: Combined adherence summary
            Value: CombinedSummary

    - kind: Question
      id: question_timeframe
      alwaysPrompt: true
      variable: init:Topic.TimeframeChoice
      prompt: What timeframe should I use?
      entity:
        kind: DynamicClosedListEntity
        items:
          - DisplayName: Current shift
            Value: CurrentShift
          - DisplayName: Last 24 hours
            Value: Last24Hours
          - DisplayName: Last 7 days
            Value: Last7Days
          - DisplayName: Current stay
            Value: CurrentStay

    - kind: SendActivity
      id: send_summary
      activity: =Concatenate("I have the intake for ", Topic.ScopeChoice.DisplayName, ", ", Topic.FocusChoice.DisplayName, ", and ", Topic.TimeframeChoice.DisplayName, ".")

    - kind: SendActivity
      id: send_manual_review_next_step
      activity: Use the intake above to guide manual care-plan and goal-attainment review with the assigned clinician or therapy lead. This topic stays in structured intake mode until a validated live insight backend is connected.

inputType: {}
outputType: {}


