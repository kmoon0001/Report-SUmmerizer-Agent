mcs.metadata:
  componentName: Family Communication And Satisfaction
  description: Elite clinical intelligence module specialized in [FamilyCommunicationAndSatisfaction]. Executes high-precision data analysis grounded in CMS Chapter 15 and Ensign Services Ironclad Standards. Optimized for Dynamic Chaining.
kind: AdaptiveDialog
modeldescription: Elite clinical intelligence module specialized in [FamilyCommunicationAndSatisfaction]. Executes high-precision data analysis grounded in CMS Chapter 15 and Ensign Services Ironclad Standards. Optimized for Dynamic Chaining.
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    displayName: Family Communication And Satisfaction
    includeInOnSelectIntent: true
    triggerQueries:
      - family communication
      - family update
      - satisfaction review
      - family concern
      - patient family

  actions:
    - kind: Question
      id: question_scope
      alwaysPrompt: true
      variable: init:Topic.ScopeChoice
      prompt: Is this for one patient or a broader trend review?
      entity:
        kind: DynamicClosedListEntity
        items:
          - DisplayName: One patient
            Value: Patient
          - DisplayName: Unit or service line trend
            Value: Trend

    - kind: Question
      id: question_need
      alwaysPrompt: true
      variable: init:Topic.NeedChoice
      prompt: What is the main need?
      entity:
        kind: DynamicClosedListEntity
        items:
          - DisplayName: Plan a family update
            Value: FamilyUpdate
          - DisplayName: Review a concern or complaint
            Value: ConcernReview
          - DisplayName: Review satisfaction trends
            Value: SatisfactionTrend
          - DisplayName: Confirm communication channel
            Value: ChannelPlanning

    - kind: Question
      id: question_urgency
      alwaysPrompt: true
      variable: init:Topic.UrgencyChoice
      prompt: How urgent is this?
      entity:
        kind: DynamicClosedListEntity
        items:
          - DisplayName: Routine
            Value: Routine
          - DisplayName: Same shift
            Value: SameShift
          - DisplayName: Urgent clinical update
            Value: UrgentClinical

    - kind: SendActivity
      id: send_family_notice
      activity: Family communication should follow consent, minimum-necessary disclosure, and approved channel rules.

    - kind: SendActivity
      id: send_family_summary
      activity: =Concatenate("I have the intake for ", Topic.ScopeChoice.DisplayName, ", ", Topic.NeedChoice.DisplayName, ", and ", Topic.UrgencyChoice.DisplayName, ".")

    - kind: SendActivity
      id: send_manual_summary_next_step
      activity: Use the intake above to prepare a governed family communication or satisfaction follow-up with the assigned owner. This topic stays in structured intake mode until a validated live summary backend is connected.

inputType: {}
outputType: {}


