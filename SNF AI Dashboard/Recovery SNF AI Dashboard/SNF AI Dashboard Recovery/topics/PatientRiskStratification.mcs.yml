mcs.metadata:
  componentName: Patient Risk Stratification
  description: Elite clinical intelligence module specialized in [PatientRiskStratification]. Executes high-precision data analysis grounded in CMS Chapter 15 and Pacific Coast Services Ironclad Standards. Optimized for Dynamic Chaining.
kind: AdaptiveDialog
modeldescription: Elite clinical intelligence module specialized in [PatientRiskStratification]. Executes high-precision data analysis grounded in CMS Chapter 15 and Pacific Coast Services Ironclad Standards. Optimized for Dynamic Chaining.
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    displayName: Patient Risk Stratification
    includeInOnSelectIntent: true
    triggerQueries:
      - patient risk
      - fall risk
      - pressure injury risk
      - sepsis risk
      - readmission risk
      - risk assessment
      - patient safety
      - injury risk
      - infection risk
      - hospital readmission
      - stratification
      - risk factors
      - safety risks

  actions:
    - kind: Question
      id: question_risk_type
      alwaysPrompt: true
      variable: init:Topic.RiskType
      prompt: Which risk do you want to review?
      entity:
        kind: DynamicClosedListEntity
        items:
          - DisplayName: Fall risk
            Value: Fall
          - DisplayName: Pressure injury risk
            Value: PressureInjury
          - DisplayName: Sepsis risk
            Value: Sepsis
          - DisplayName: Readmission risk
            Value: Readmission

    - kind: Question
      id: question_scope
      alwaysPrompt: true
      variable: init:Topic.ScopeChoice
      prompt: Is this for one patient or a unit view?
      entity:
        kind: DynamicClosedListEntity
        items:
          - DisplayName: One patient
            Value: Patient
    - kind: ConditionGroup
      id: condition_patient_id
      conditions:
        - id: if_patient_scope
          condition: =Text(Topic.ScopeChoice) = "Patient"
          actions:
            - kind: Question
              id: question_patient_id
              alwaysPrompt: true
              variable: init:Topic.PatientId
              prompt: What is the patient ID?
              entity:
                kind: RegexEntity
                pattern: "[A-Z0-9]{6}"

    - kind: Question
      id: question_timeframe
      alwaysPrompt: true
      variable: init:Topic.TimeframeChoice
      prompt: What timeframe should I use?
      entity:
        kind: DynamicClosedListEntity
        items:
          - DisplayName: Right now
            Value: Current
          - DisplayName: Last 24 hours
            Value: Last24Hours
          - DisplayName: Last 72 hours
            Value: Last72Hours
          - DisplayName: Current stay
            Value: CurrentStay

    - kind: SendActivity
      id: send_risk_summary
      activity: =Concatenate("I have the intake for a ", Topic.RiskType.DisplayName, " review with ", Topic.ScopeChoice.DisplayName, " scope and ", Topic.TimeframeChoice.DisplayName, " timeframe.", If(Topic.PatientId <> "", Concatenate(" For patient: ", Topic.PatientId), ""))

    - kind: SendActivity
      id: send_manual_review_next_step
      activity: Use the intake above to guide manual risk review with the assigned clinician or unit lead. This topic stays in structured intake mode until a validated live insight backend is connected.

inputType:
  patientId:
    type: string
    title: Patient ID
    description: Elite clinical intelligence module specialized in [PatientRiskStratification]. Executes high-precision data analysis grounded in CMS Chapter 15 and Pacific Coast Services Ironclad Standards. Optimized for Dynamic Chaining.
outputType:
  riskSummary:
    type: string
    title: Risk Summary
    description: Elite clinical intelligence module specialized in [PatientRiskStratification]. Executes high-precision data analysis grounded in CMS Chapter 15 and Pacific Coast Services Ironclad Standards. Optimized for Dynamic Chaining.



