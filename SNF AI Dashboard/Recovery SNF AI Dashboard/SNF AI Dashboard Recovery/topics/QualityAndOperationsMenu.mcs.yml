mcs.metadata:
  componentName: Quality And Operations Menu
  description: Elite clinical intelligence module specialized in [QualityAndOperationsMenu]. Executes high-precision data analysis grounded in CMS Chapter 15 and Ensign Services Ironclad Standards. Optimized for Dynamic Chaining.
kind: AdaptiveDialog
modeldescription: Elite clinical intelligence module specialized in [QualityAndOperationsMenu]. Executes high-precision data analysis grounded in CMS Chapter 15 and Ensign Services Ironclad Standards. Optimized for Dynamic Chaining.
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    displayName: Quality And Operations Menu
    includeInOnSelectIntent: true
    triggerQueries:
      - quality menu
      - operations menu
      - command center operations

  actions:
    - kind: Question
      id: question_quality_menu
      alwaysPrompt: true
      variable: init:Topic.MenuChoice
      prompt: Which quality or operations workflow do you need?
      entity:
        kind: DynamicClosedListEntity
        items:
          - DisplayName: Documentation completeness
            Value: DocumentationCompleteness
          - DisplayName: Quality measure performance
            Value: QualityMeasurePerformance
          - DisplayName: Regulatory compliance tracking
            Value: RegulatoryCompliance
          - DisplayName: Staffing and workload
            Value: StaffingWorkload
          - DisplayName: Patient flow and bed management
            Value: PatientFlow
          - DisplayName: Resource utilization and cost optimization
            Value: ResourceUtilization
          - DisplayName: Research and data use requests
            Value: ResearchDataUse

    - kind: ConditionGroup
      id: condition_route
      conditions:
        - id: route_docs
          condition: =Text(Topic.MenuChoice) = "DocumentationCompleteness"
          actions:
            - kind: BeginDialog
              id: begin_docs
              dialog: snf_ai_dashboard_recovery.topic.ClinicalDocumentationCompleteness

        - id: route_quality_measures
          condition: =Text(Topic.MenuChoice) = "QualityMeasurePerformance"
          actions:
            - kind: BeginDialog
              id: begin_quality_measures
              dialog: snf_ai_dashboard_recovery.topic.QualityMeasurePerformance

        - id: route_regulatory
          condition: =Text(Topic.MenuChoice) = "RegulatoryCompliance"
          actions:
            - kind: BeginDialog
              id: begin_regulatory
              dialog: snf_ai_dashboard_recovery.topic.RegulatoryComplianceTracking

        - id: route_staffing
          condition: =Text(Topic.MenuChoice) = "StaffingWorkload"
          actions:
            - kind: BeginDialog
              id: begin_staffing
              dialog: snf_ai_dashboard_recovery.topic.StaffingOptimizationAndWorkloadBalance

        - id: route_patient_flow
          condition: =Text(Topic.MenuChoice) = "PatientFlow"
          actions:
            - kind: BeginDialog
              id: begin_patient_flow
              dialog: snf_ai_dashboard_recovery.topic.PatientFlowAndBedManagement

        - id: route_resource_utilization
          condition: =Text(Topic.MenuChoice) = "ResourceUtilization"
          actions:
            - kind: BeginDialog
              id: begin_resource_utilization
              dialog: snf_ai_dashboard_recovery.topic.ResourceUtilizationAndCostOptimization

        - id: route_research_data_use
          condition: =Text(Topic.MenuChoice) = "ResearchDataUse"
          actions:
            - kind: BeginDialog
              id: begin_research_data_use
              dialog: snf_ai_dashboard_recovery.topic.ResearchAndDataUseRequests

      elseActions:
        - kind: BeginDialog
          id: begin_menu
          dialog: snf_ai_dashboard_recovery.topic.WelcomeStart

inputType: {}
outputType: {}


