mcs.metadata:
  componentName: Safety And Surveillance Menu
  description: Elite clinical intelligence module specialized in [SafetyAndSurveillanceMenu]. Executes high-precision data analysis grounded in CMS Chapter 15 and Ensign Services Ironclad Standards. Optimized for Dynamic Chaining.
kind: AdaptiveDialog
modeldescription: Elite clinical intelligence module specialized in [SafetyAndSurveillanceMenu]. Executes high-precision data analysis grounded in CMS Chapter 15 and Ensign Services Ironclad Standards. Optimized for Dynamic Chaining.
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    displayName: Safety And Surveillance Menu
    includeInOnSelectIntent: true
    triggerQueries:
      - safety menu
      - surveillance menu
      - safety workflows
      - safety issues
      - surveillance
      - medication review
      - infection control
      - outbreak response
      - environmental safety
      - patient safety menu
      - safety surveillance
      - infection surveillance

  actions:
    - kind: Question
      id: question_safety_menu
      alwaysPrompt: true
      variable: init:Topic.MenuChoice
      prompt: Which safety or surveillance workflow do you need?
      entity:
        kind: DynamicClosedListEntity
        items:
          - DisplayName: Medication safety review
            Value: MedicationSafety
          - DisplayName: Infection control surveillance
            Value: InfectionSurveillance
          - DisplayName: Infection outbreak detection and response
            Value: InfectionOutbreak
          - DisplayName: Environmental safety assessment
            Value: EnvironmentalSafety
          - DisplayName: Potential abuse or neglect reporting
            Value: AbuseNeglect

    - kind: ConditionGroup
      id: condition_route
      conditions:
        - id: route_med_safety
          condition: =Text(Topic.MenuChoice) = "MedicationSafety"
          actions:
            - kind: BeginDialog
              id: begin_med_safety
              dialog: snf_ai_dashboard_recovery.topic.MedicationSafetyReview

        - id: route_infection_surveillance
          condition: =Text(Topic.MenuChoice) = "InfectionSurveillance"
          actions:
            - kind: BeginDialog
              id: begin_infection_surveillance
              dialog: snf_ai_dashboard_recovery.topic.InfectionControlSurveillance

        - id: route_outbreak
          condition: =Text(Topic.MenuChoice) = "InfectionOutbreak"
          actions:
            - kind: BeginDialog
              id: begin_outbreak
              dialog: snf_ai_dashboard_recovery.topic.InfectionOutbreakDetectionAndResponse

        - id: route_environmental_safety
          condition: =Text(Topic.MenuChoice) = "EnvironmentalSafety"
          actions:
            - kind: BeginDialog
              id: begin_environmental_safety
              dialog: snf_ai_dashboard_recovery.topic.EnvironmentalSafetyAssessment

        - id: route_abuse_neglect
          condition: =Text(Topic.MenuChoice) = "AbuseNeglect"
          actions:
            - kind: BeginDialog
              id: begin_abuse_neglect
              dialog: snf_ai_dashboard_recovery.topic.PotentialAbuseOrNeglectReporting

      elseActions:
        - kind: BeginDialog
          id: begin_menu
          dialog: snf_ai_dashboard_recovery.topic.WelcomeStart

inputType: {}
outputType: {}


