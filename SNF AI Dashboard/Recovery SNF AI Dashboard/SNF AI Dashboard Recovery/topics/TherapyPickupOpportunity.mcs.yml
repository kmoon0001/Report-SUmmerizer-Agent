mcs.metadata:
  componentName: Therapy Pickup Opportunity
  description: Elite clinical intelligence module specialized in [TherapyPickupOpportunity]. Executes high-precision data analysis grounded in CMS Chapter 15 and Pacific Coast Services Ironclad Standards. Optimized for Dynamic Chaining.
kind: AdaptiveDialog
modeldescription: Elite clinical intelligence module specialized in [TherapyPickupOpportunity]. Executes high-precision data analysis grounded in CMS Chapter 15 and Pacific Coast Services Ironclad Standards. Optimized for Dynamic Chaining.
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    displayName: Therapy Pickup Opportunity
    includeInOnSelectIntent: true
    triggerQueries:
      - therapy pickup
      - therapy opportunity
      - therapy review
      - who needs therapy
      - rehab opportunity

  actions:
    - kind: Question
      id: question_discipline
      alwaysPrompt: true
      variable: init:Topic.DisciplineChoice
      prompt: Which discipline should I focus on?
      entity:
        kind: DynamicClosedListEntity
        items:
          - DisplayName: PT
            Value: PT
          - DisplayName: OT
            Value: OT
          - DisplayName: ST
            Value: ST
          - DisplayName: All therapy disciplines
            Value: All

    - kind: Question
      id: question_scope
      alwaysPrompt: true
      variable: init:Topic.ScopeChoice
      prompt: Is this for one patient or a unit-level review?
      entity:
        kind: DynamicClosedListEntity
        items:
          - DisplayName: One patient
            Value: Patient
          - DisplayName: Unit-level review
            Value: Unit

    - kind: Question
      id: question_reason
      alwaysPrompt: true
      variable: init:Topic.ReasonChoice
      prompt: What is the main reason for the review?
      entity:
        kind: DynamicClosedListEntity
        items:
          - DisplayName: Functional decline
            Value: FunctionalDecline
          - DisplayName: Goal progress concern
            Value: GoalProgress
          - DisplayName: PDPM or reimbursement opportunity
            Value: PDPM
          - DisplayName: Missed or overdue therapy follow-up
            Value: MissedFollowUp

    - kind: SendActivity
      id: send_therapy_summary
      activity: =Concatenate("I have the intake for ", Topic.DisciplineChoice.DisplayName, ", ", Topic.ScopeChoice.DisplayName, ", and ", Topic.ReasonChoice.DisplayName, ".")

    - kind: SendActivity
      id: send_manual_review_next_step
      activity: Use this intake to route a manual therapy opportunity review with the therapy lead. Automated flow output is temporarily disabled until tenant flow response fields are contract-aligned.

inputType: {}
outputType: {}



