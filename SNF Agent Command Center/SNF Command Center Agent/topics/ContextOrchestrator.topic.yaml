kind: AdaptiveDialog
description: Syncs and maintains the Universal Swarm Context across all clinical workers.
id: ContextOrchestrator
beginDialog:
  kind: OnRecognizedIntent
  id: Main
  actions:
    # 1. Capture State from Last Worker
    - kind: SetVariable
      variable: Global.SwarmContext
      value: "=JSON({ FleetID: 'ENSIGN-PLATINUM-01', LastExpert: Global.LastWorker, RiskScore: Global.AuditRiskScore })"
    
    - kind: SendActivity
      activity: "🛰️ **SWARM TELEMETRY**: Clinical state synchronized. Command Center is ready for handoff..."
