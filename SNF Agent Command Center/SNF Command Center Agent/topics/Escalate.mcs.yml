# Microsoft Learn Platinum Standard Instructions:
# **Grounding**: Refer to src/KnowledgeBase/GLOBAL_CMS_COMPLIANCE.md.
# **Patterns**: Implement src/KnowledgeBase/PLATINUM_PROMPT_PATTERNS.md for few-shot reasoning.
# **Self-Correction**: If the output involves clinical judgment, invoke the ComplianceAuditor gate.

mcs.metadata:
  componentName: Escalate
  description: |-
    This system topic is triggered when the user indicates they would like to speak to a representative.
    You can configure how the agent will handle human hand-off scenarios in the agent settings..
    If your agent does not handle escalations, this topic should be disabled.
kind: AdaptiveDialog
startBehavior: CancelOtherTopics
beginDialog:
  kind: OnEscalate
  id: main
  intent:
    displayName: Escalate
    includeInOnSelectIntent: false
    triggerQueries:
      - Talk to agent
      - Talk to a person
      - Talk to someone
      - Call back
      - Call customer service
      - Call me please
      - Call support
      - Call technical support
      - Can an agent call me
      - Can I call
      - Can I get in touch with someone else
      - Can I get real agent support
      - Can I get transferred to a person to call
      - Can I have a call in number Or can I be called
      - Can I have a representative call me
      - Can I schedule a call
      - Can I speak to a representative
      - Can I talk to a human
      - Can I talk to a human assistant
      - Can someone call me
      - Chat with a human
      - Chat with a representative
      - Chat with agent
      - Chat with someone please
      - Connect me to a live agent
      - Connect me to a person
      - Could some one contact me by phone
      - Customer agent
      - Customer representative
      - Customer service
      - I need a manager to contact me
      - I need customer service
      - I need help from a person
      - I need to speak with a live argent
      - I need to talk to a specialist please
      - I want to talk to customer service
      - I want to proceed with live support
      - I want to speak with a consultant
      - I want to speak with a live tech
      - I would like to speak with an associate
      - I would like to talk to a technician
      - Talk with tech support member

  actions:
    # --- Platinum Fix: Automatically generate a clinical oversight ticket ---
    - kind: InvokeFlowAction
      id: invokeFlow_escalationTicket
      input:
        binding:
          text: =If(IsBlank(Topic.ErrorEnvelope), "User requested human agent escalation / Discrepancy", Topic.ErrorEnvelope)
          text_1: =System.Conversation.Id
      action: Fleet-FallbackEscalationTicket-5e5ac7c8-523c-f111-88b3-7ced8d6e69f5
      output:
        binding:
          ticketid: Topic.EscalationTicketID

    - kind: SendActivity
      id: sendMessage_s39DCt
      conversationOutcome: Escalated
      activity: |-
         This alert requires human clinical intervention and cannot be handled by the SNF Command Center Agent alone. 
        
         **Escalation Ticket Generated:** {Topic.EscalationTicketID}

         IMMEDIATE ESCALATION STEPS:
        1. For CRITICAL rehospitalization risk or patient safety events: Contact the charge nurse or DON immediately
        2. For authorization or payer issues: Contact the MDS Coordinator or Business Office
        3. For CMS/QRP compliance escalation: Contact the Quality Assurance Coordinator
        4. For documentation or legal concerns: Contact the Director of Rehabilitation or Administrator

        All patient information discussed in this session is PHI. Do not share session content outside of authorized clinical staff.

        Note: This agent does not replace clinical judgment. All outputs are DRAFT  clinician review and sign-off required before any action is taken.

