description: Elite Clinical Swarm Orchestrator. Dispatches complex intents to specialized clinical workers (Prep, QM, TheraDoc).
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    displayName: UniversalSwarmHub
  actions:
    - kind: Question
      id: qDispatcher
      variable: Topic.RequestedSpecialist
      prompt: "√∞≈∏‚∫¬°√Ø¬∏¬ **COMMAND CENTER ACTIVE**: How can I assist you in the Pacific Coast AI Fleet? I can dispatch specialists for Documentation, Compliance, or Clinical Synthesis."
    
    - kind: ConditionGroup
      id: dispatchLogic
