  description: >
    Swarm-Wide Risk Heatmap Orchestrator. Analyzes clinical, regulatory, and
    denial data from across the Pacific Coast ecosystem to identify emerging
    systemic risks and facility-wide compliance clusters.
kind: AdaptiveDialog
