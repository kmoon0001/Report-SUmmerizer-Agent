          actions:
            - kind: SendActivity
              id: send_routeRegulatory
              activity: "ðŸš€ Routing to **Pacific Coast Regulatory Hub**..."
            - kind: BeginDialog
              id: beginDialog_regulatory
              dialog: cr917_agentu92bPc.topic.QMORCHESTRATOR

        # Denial Defense
        - id: route_denial
          condition: =Topic.CMD_MissionType = "DenialDefense"
          actions:
            - kind: SendActivity
              id: send_routeDenial
              activity: "ðŸš€ Activating **Denial Defense Agent**..."
            - kind: BeginDialog
              id: beginDialog_denial
              dialog: cr917_denialDefense.topic.DenialDefenseWorker

        # Data Analysis â†’ Synthesis Lab
        - id: route_synthesis
