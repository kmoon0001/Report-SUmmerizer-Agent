mcs.metadata:
  componentName: SwarmCommandRouter
  description: >
    Pacific Coast SNF Agent Command Center â€” Full Swarm Orchestration Router.
    Receives cross-agent requests from any hub and intelligently routes to the
    appropriate specialized agent or workflow. Implements the "Flight Controller"
    architecture for the entire Pacific Coast AI ecosystem.
kind: AdaptiveDialog
modeldescription: >
  Elite Swarm Command Router for the Pacific Coast SNF Agent Command Center.
  Acts as the master "Flight Controller" for the 8-agent Pacific Coast ecosystem.
  Receives contextual requests and routes to: TheraDoc (clinical documentation),
  Regulatory Hub (compliance/QM), Denial Defense (audit protection), Clinical
  Synthesis Lab (data analysis), SNF Dashboard (executive reporting), or
  Coaching Corner (therapist development). Implements Microsoft Learn
  agent-to-agent handoff patterns. Maintains swarm context across all hops.
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    displayName: Swarm Command Router
    triggerQueries:
      - command center
      - route my request
      - which agent handles
      - send to the right agent
      - swarm router
      - flight control
      - orchestrate
      - pacific coast command
      - what agent do i need
      - help me find the right tool
      - where do i go for

  actions:
    - kind: SendActivity
      id: sendActivity_intro
      activity: |-
        ðŸŽ›ï¸ **Pacific Coast SNF Command Center**
        I am the master orchestrator for your clinical AI ecosystem. Tell me what you need, and I will route you to the right specialized agent.

    - kind: Question
      id: question_missionType
      variable: Topic.CMD_MissionType
      prompt: What type of mission do you need?
      entity:
        kind: EmbeddedEntity
        definition:
          kind: ClosedListEntity
          items:
            - id: ClinicalDoc
              displayName: "ðŸ“ Clinical Documentation (TheraDoc)"
            - id: ComplianceQM
              displayName: "âš–ï¸ Regulatory / Quality Measures (Regulatory Hub)"
            - id: DenialDefense
              displayName: "ðŸ›¡ï¸ Denial Defense / Audit Protection"
            - id: DataAnalysis
              displayName: "ðŸ”¬ Clinical Data Analysis (Synthesis Lab)"
            - id: ExecutiveReport
              displayName: "ðŸ“Š Executive Dashboard / Reporting"
            - id: TherapistCoach
              displayName: "ðŸ§— Therapist Coaching (Coaching Corner)"
            - id: ConflictAudit
              displayName: "âš–ï¸ Cross-Discipline Conflict Audit"
            - id: PDPM
              displayName: "ðŸ’° PDPM Revenue / HIPPS Classification"
            - id: SCIC
              displayName: "ðŸš¨ Significant Change Detection (SCIC)"
            - id: Transition
              displayName: "ðŸ”„ Part A â†’ Part B Transition"

    - kind: ConditionGroup
      id: conditionGroup_missionRouting
      conditions:
        # Clinical Documentation â†’ TheraDoc
        - id: route_clinicalDoc
          condition: =Topic.CMD_MissionType = "ClinicalDoc"
          actions:
            - kind: SendActivity
              id: send_routeClinical
              activity: "ðŸš€ Routing to **TheraDoc Clinical Documentation Hub**..."
            - kind: BeginDialog
              id: beginDialog_theraDoc
              dialog: pcca_agent.topic.NoteIntakeRouter

        # Regulatory / QM â†’ Regulatory Hub
        - id: route_regulatory
