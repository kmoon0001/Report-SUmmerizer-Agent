mcs.metadata:
  componentName: SNF Dashboard - CrossAgent Audit Log
kind: TaskDialog
modelDisplayName: TheraDoc - CrossAgent Audit Log
modeldescription: Records TheraDoc handoffs to the Command Center audit trail. Aligns with Microsoft Learn "Ironclad" auditing standards.
outputs:
  - propertyName: sessionid
  - propertyName: auditstatus

action:
  kind: InvokeFlowTaskAction
  flowId: b8c9d0e1-f2a3-4567-bcde-890123456789
  inputs:
    binding:
      text: ="SNF Dashboard"
      text_1: ="SNF-Agent-Command-Center"
      text_2: Topic.AuditMissionType
      text_3: Topic.AuditUserRole
      text_4: Topic.AuditFacilityContext
      text_5: System.Conversation.Id
      text_6: Topic.AuditInputHash
      text_7: Topic.AuditOutputHash
      text_8: Topic.AuditTimestampIn
      text_9: Topic.AuditTimestampOut
  inputMode: Prompt

outputMode: All
