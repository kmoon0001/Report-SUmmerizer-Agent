    displayName: Fall Risk Assessment
    parentBotId: 4ac7d9ec-8855-4820-a949-9736ebdc48ec
    shareContext: {}
    state: Active
    status: Active
    publisherUniqueName: DefaultPublisherorgbd048f00
    schemaName: template-content.topic.FallRiskAssessment
    dialog:
      modelDescription: Review and assess patient fall risk documentation including TUG (Timed Up and Go) score, Berg Balance Scale, and mobility assessment. Provide PT-specific risk analysis with recommendations.
      beginDialog:
        kind: OnActivity
        id: main
        type: Message
        actions:
          - kind: SearchAndSummarizeContent
            id: BPj2jQ
            latencyMessageSettings:
              allowLatencyMessage: true
              latencyMessage: One moment while I analyze the documentation against CMS Chapter 15 and Section GG guidelines. This may take a few seconds...

            userInput: =System.Activity.Text
            additionalInstructions: |-
              Act as a Senior SNF Clinical Auditor. Evaluate the provided documentation against [CMS Chapter 15](https://copilotstudio.microsoft.com/environments/Default-03cc92c3-986c-4cf4-ae27-1478cf99d17f/bots/a6aa67e3-f3fc-f011-8406-000d3a37eba2/knowledge/1a0a40ac-b3be-4cf9-8014-003abddeb7ae/details) and [Fall Prevention CPGs](https://copilotstudio.microsoft.com/environments/Default-03cc92c3-986c-4cf4-ae27-1478cf99d17f/bots/a6aa67e3-f3fc-f011-8406-000d3a37eba2/knowledge/a17e74df-1c03-4191-bb86-8c7973b528ed/details).
              1. **Objective Check**: Confirm if a standardized test (TUG, BBS, Tinetti) is present with a numerical score.
              2. **Clinical Interpretation**: Check if the therapist interpreted the score (e.g., 'Score of 15s indicates high fall risk').
              3. **Plan Alignment**: Ensure the plan of care includes specific skilled balance interventions (e.g., 'neuromuscular re-education for center of gravity control').
              4. **Licensing**: If the note is signed by a Student or PTA without a supervising PT signature on the assessment, flag this immediately.
            fileSearchDataSource:
              searchFilesMode:
                kind: SearchSpecificFiles
                files:
                  - template-content.file.GGSelfCareandMobilityActivitiesDecisionTree.pdf
                  - template-content.file.GeriatricsSocietyClinicalPracticeGuidelineforPreventionofFallsinOlderPerson.pd
                  - template-content.file.NeurologicOutcomeMeasureCPG.pdf
                  - template-content.file.Ch15MedicareBenefitsPolicyManual.pdf
                  - template-content.file.StrongPTDocumentationPatterns.txt
                  - template-content.file.aotaaptaashaconsensusstatement.pdf

            knowledgeSources:
              kind: SearchSpecificKnowledgeSources
              knowledgeSources:
                - template-content.knowledge.httpswww.cms.govoutreachandeducationmedicarelearningnetworkmln
                - template-content.knowledge.httpswww.apta.orgpatientcareclinicalpractice

            applyModelKnowledgeSetting: false

      inputType: {}
      outputType: {}

