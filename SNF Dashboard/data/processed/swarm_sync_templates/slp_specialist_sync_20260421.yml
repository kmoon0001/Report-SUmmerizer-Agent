    displayName: Analyze SLP Evaluation Report
    parentBotId: 4a2a665a-e302-482e-84aa-d7b71113f0eb
    description: |-
      Analyze an existing SLP evaluation report for completeness, clarity, and defensible documentation. Check that history, current communication or swallowing status, standardized and informal test results, functional impact on daily communication, diagnosis/impressions, prognosis, and plan of care are clearly documented. Identify what is missing or vague and suggest concise, SLP‑appropriate improvements.

      Trigger phrases: 

      analyze slp eval note

      analyze slp evaluation note

      check this slp eval

      is this slp eval complete

      review my slp evaluation report
    shareContext: {}
    state: Active
    status: Active
    publisherUniqueName: DefaultPublisherorgbd048f00
    schemaName: template-content.topic.AnalyzeSLPEvaluationReport
    dialog:
      beginDialog:
        kind: OnActivity
        id: main
        type: Message
        actions:
          - kind: SearchAndSummarizeContent
            id: ddn40A
            userInput: =System.Activity.Text
            additionalInstructions: Analyze the provided SLP documentation as a backend connected agent. Return exactly one valid JSON object using the SLP_Specialist schema. Do not ask follow-up questions or emit narrative. If evidence is incomplete, return a JSON error object that lists missing documentation elements or fields.
            fileSearchDataSource:
