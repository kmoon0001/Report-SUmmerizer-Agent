    displayName: SNF Routing Status Check
    parentBotId: 8c9b244f-073a-f111-88b3-000d3a5b95c6
    shareContext: {}
    state: Active
    status: Active
    publisherUniqueName: DefaultPublisherorgbd048f00
    schemaName: template-content.topic.SNFRoutingStatusCheck
    dialog:
      beginDialog:
        kind: OnRecognizedIntent
        id: main
        intent:
          triggerQueries:
            - snf routing status
            - check snf routing
            - snf route update
            - is snf routed
            - snf routing progress
            - status of snf routing
            - has snf been routed
            - snf route check
            - routing status for snf

        actions:
          - kind: SendActivity
            id: SendActivity_DXzX51
            activity: This topic is for checking the status of a previously submitted SNF alert. Please do NOT use it for submitting new alerts.

          - kind: Question
            id: Question_RJieKJ
            variable: Topic.ResidentMRN
            prompt: Please provide the Resident MRN.
            entity: StringPrebuiltEntity

          - kind: ConditionGroup
            id: ConditionGroup_BHepT6
            conditions:
              - id: ConditionItem_iOrlhW
                condition: =!IsBlank(Topic.ResidentMRN)
