                  - kind: SendActivity
                    id: SendActivity_VkRkMA
                    activity: I'll check the current routing status for this SNF alert. Please provide the Resident MRN to look up the active alert lifecycle stage.

            elseActions:
              - kind: SendActivity
                id: SendActivity_XhFM9c
                activity: No alert was found for the provided MRN.

              - kind: Question
                id: Question_U5dxsc
                variable: Topic.Var1
                prompt: Would you like to submit a new alert?
                entity:
                  kind: BooleanPrebuiltEntity
                  sensitivityLevel: None

              - kind: ConditionGroup
                id: conditionGroup_ojQvAw
                conditions:
                  - id: conditionItem_QHu7RE
                    condition: =Topic.Var1 = true
                    actions:
                      - kind: SendActivity
                        id: sendActivity_rXEbdG
                        activity: "Understood. Please describe the alert type and provide the Resident MRN so I can route a new alert. Example: \"Rehospitalization risk for MRN 12345\" or \"Authorization alert for OT patient MRN 67890\"."

                elseActions:
                  - kind: SendActivity
                    id: sendActivity_tRplev
                    activity: Understood. No new alert will be submitted. If you need further assistance, feel free to ask. Stay well!

      inputType: {}
      outputType: {}

