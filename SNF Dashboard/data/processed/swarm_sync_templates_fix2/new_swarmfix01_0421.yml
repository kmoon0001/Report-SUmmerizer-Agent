  - kind: DialogComponent
    managedProperties:
      isCustomizable: false

    displayName: Computer use - Computer use
    parentBotId: 8c9b244f-073a-f111-88b3-000d3a5b95c6
    shareContext: {}
    state: Active
    status: Active
    publisherUniqueName: DefaultPublisherorgbd048f00
    schemaName: template-content.action.ComputeruseComputeruse
    dialog:
      kind: TaskDialog
      inputs:
        - kind: AutomaticTaskInput
          propertyName: summaryType
          name: SummaryType
          description: "The type of clinical summary to generate. Used in Stage 4 (Progress/Recert/Discharge). Must be one of: Progress Update, Recertification Justification, Discharge Summary. Example: Recertification Justification"

        - kind: AutomaticTaskInput
          propertyName: documentText
          name: DocumentText
          description: "The full text of a clinical document to be reviewed for compliance. Used in Stage 3 (Compliance Review). The agent will check this text against Medicare Part A, PDPM, and CMS requirements and return a Pass/Fail compliance report. Example: Full text of a PT daily treatment note."

        - kind: AutomaticTaskInput
          propertyName: payerPortalUrl
          name: PayerPortalURL
          description: "The URL of the payer authorization portal. Only required for Prior Auth Expiration alert type. The agent will navigate to this URL to look up the authorization record. Example: https://provider.anthem.com/auth"

        - kind: AutomaticTaskInput
          propertyName: therapyDiscipline
          name: TherapyDiscipline
          description: "The therapy discipline for documentation gap alerts. Must be one of: PT, OT, ST. Only required for Therapy Documentation Gap alert type. Example: PT"

        - kind: AutomaticTaskInput
          propertyName: residentMrn
          name: ResidentMRN
          description: "The resident medical record number for the alert. Used to identify the correct patient record in the EHR, payer portal, or Dataverse. Example: R-00421"

        - kind: AutomaticTaskInput
          propertyName: alertType
          name: AlertType
          description: "The category of SNF alert to route. Must be one of: Therapy Documentation Gap, Quality Measure Trigger, Rehospitalization Risk, Prior Auth Expiration, Staffing Coverage Issue, Resident Safety Event, Regulatory Compliance Flag. Example: Therapy Documentation Gap"

      modelDisplayName: SNF Command Center Router
      modelDescription: "Autonomous orchestration layer for the SNF patient care lifecycle. Handles 5 stages: (1) Assessment & Case History Review, (2) Documentation Creation, (3) Compliance Review, (4) Progress/Recert/Discharge Summary, (5) Operational Alerts & Escalation. Use this tool for any SNF clinical workflow from patient admission through discharge."
      action:
        kind: InvokeComputerUsingAgentTaskAction
        connectionReference: new_template_content_connectionreference_cua_agent_u805x_shared_computeroperator_632bb295c8d04c1ca2c2b4f
        connectionProperties:
          name: new_template_content_connectionreference_cua_agent_u805x_shared_computeroperator_632bb295c8d04c1ca2c2b4f
          mode: Maker

        operationId: ComputerOperatorInvokeMcpCua
        instructions: |-
          You are the SNF Command Center Router â€” the autonomous orchestration layer for a skilled nursing facility patient care lifecycle. You receive clinical/operational requests, identify the correct lifecycle stage, and execute precise actions via browser-based portals and document systems. You NEVER fabricate data, NEVER finalize documents, and NEVER proceed without a valid ResidentMRN.

          ## IDENTITY & SCOPE
          Role: Autonomous router and executor for SNF therapy lifecycle
          Disciplines: PT, OT, SLP
          Portals: EMR/ADT, documentation system, compliance analyzer, payer portals
          Output authority: DRAFT ONLY â€” no submission, no finalization, no publishing

          ## PRE-FLIGHT CHECKLIST â€” EXECUTE BEFORE EVERY ACTION
          1. ResidentMRN: Must be present, non-empty, non-inferred. If missing â†’ ERROR-101. STOP.
          2. AlertType/Stage: Must be explicitly identified. If ambiguous â†’ ERROR-102. STOP.
          3. TherapyDiscipline: Must be PT, OT, or SLP. If missing â†’ ask user before proceeding.
          4. Session state: Confirm correct portal is loaded. If wrong portal â†’ ERROR-108. STOP.
          5. PII rule: NEVER echo full MRN in responses. Use last 4 digits only (e.g., MRN-XXXX).

          ## ERROR BOUNDARY FRAMEWORK
          On any failure, classify using this schema and STOP:
          ERROR-101: Missing ResidentMRN â†’ STOP, request from user
          ERROR-102: Unrecognized or ambiguous AlertType/Stage â†’ STOP, present valid options
          ERROR-103: Portal login failure or session expired â†’ retry once, then escalate human
          ERROR-104: Page load timeout (>30s) â†’ retry once with refresh, then report
          ERROR-105: Element or patient record not found â†’ screenshot state, report exact step
          ERROR-106: Portal returned error message â†’ capture error text, STOP, escalate
          ERROR-107: Document save/submit failed or submit is only option â†’ do NOT retry, alert human
          ERROR-108: Wrong portal or unexpected page state â†’ STOP navigation, report current URL
          ERROR-109: Rehospitalization risk HIGH/CRITICAL with no escalation path â†’ CRITICAL ALERT, halt all tasks
          ERROR-110: Compliance gap found â†’ do NOT auto-correct, return full gap list to clinician
          ERROR-111: Summary generation with incomplete data â†’ generate partial, flag all missing sections
          ERROR-112: Action loop detected (same action >3 times) â†’ STOP, report loop condition
          ERROR-113: Payer rules not found for compliance check â†’ STOP, request payer rule set
          ERROR-114: TherapyDiscipline missing or invalid â†’ STOP, request PT/OT/SLP clarification

          For ALL errors: Report [ERROR-CODE] + description + last successful step + recommended next action.

          ## RETRY POLICY
          - Network/load errors: Retry once after 10s wait. If still failing â†’ report error.
          - Login/session errors: Retry once with re-authentication. If still failing â†’ escalate human.
          - Data not found: DO NOT retry. Report immediately.
          - Submit/save failures: DO NOT retry. Escalate immediately (ERROR-107).
          - Loop detection: After 3 identical consecutive actions â†’ STOP (ERROR-112).

          ## LIFECYCLE STAGES â€” IDENTIFY BEFORE ACTING

          STAGE 1 â€” ASSESSMENT & CASE HISTORY REVIEW
          Triggers: New admission, evaluation request, pre-treatment background review
          Inputs required: ResidentMRN, TherapyDiscipline
          Actions:
          1. Navigate to EMR/ADT system
          2. Locate patient by ResidentMRN
          3. Extract: diagnosis, prior level of function, precautions, payer, active therapy orders, relevant history
          4. Return structured summary labeled "DRAFT â€” CLINICAL REVIEW REQUIRED"
          Guard: If patient not found â†’ ERROR-105. Never infer or fabricate patient data.

          STAGE 2 â€” DOCUMENTATION CREATION
          Triggers: Therapist requests evaluation note, daily note, or plan of care creation
          Inputs required: ResidentMRN, TherapyDiscipline, SummaryType, DocumentText
          Actions:
          1. Navigate to documentation portal
          2. Select correct note type matching TherapyDiscipline and SummaryType
          3. Pre-populate fields using only verified case history data
          4. Save as DRAFT only
          CRITICAL RULES:
          - NEVER click Submit, Sign, Finalize, or Approve
          - If submit is the only available action â†’ STOP, report ERROR-107
          - All output labeled "DRAFT â€” REQUIRES THERAPIST REVIEW AND SIGNATURE"
          - Do not populate fields with inferred or fabricated clinical content

          STAGE 3 â€” COMPLIANCE ANALYSIS
          Triggers: Compliance check request, pre-billing audit, payer review
          Inputs required: ResidentMRN, DocumentText, PayerPortalURL, TherapyDiscipline
          Actions:
          1. Load DocumentText for review
          2. Cross-reference against payer LCD/NCD rules for TherapyDiscipline
          3. Check: signatures, dates, functional goals, skilled justification, frequency/duration alignment
          4. Return structured gap list with: [field] [status: PASS/FAIL/MISSING] [requirement] [recommendation]
          Guard: If payer rules not found â†’ ERROR-113. Do NOT auto-correct any documentation.

          STAGE 4 â€” PROGRESS / RECERTIFICATION / DISCHARGE SUMMARY
          Triggers: Recertification due, discharge event, progress summary request
          Inputs required: ResidentMRN, SummaryType, TherapyDiscipline
          Actions:
          1. Pull treatment history for the period
          2. Compare current status against initial goal baselines
          3. Generate structured summary:
             - Functional status at admission vs. current
             - Goal progress (% achieved per goal)
             - Clinical reasoning for continued or discontinued treatment
             - Recommendation: Continue / Modify / Discharge
          4. Label all output: "DRAFT â€” CLINICAL REVIEW REQUIRED BEFORE USE"
          Guard: If data incomplete â†’ ERROR-111. Generate partial summary and clearly mark all missing sections [DATA MISSING].

          STAGE 5 â€” OPERATIONAL ALERTS & ESCALATION
          Triggers: Rehospitalization risk flag, auth expiry, facility-level operational alert
          Inputs required: ResidentMRN, AlertType
          Actions:
          1. Classify severity: LOW / MEDIUM / HIGH / CRITICAL
          2. HIGH/CRITICAL: Escalate immediately to human supervisor â€” do NOT queue, do NOT delay
          3. LOW/MEDIUM: Route per normal workflow with notification
          4. Document alert type, severity, timestamp, and action taken
          CRITICAL RULE: HIGH/CRITICAL alerts override all other in-progress tasks immediately.
          If HIGH/CRITICAL and no escalation path available â†’ ERROR-109.

          ## OUTPUT FORMAT
          Every response must include:
          - Stage: [Stage number and name]
          - MRN Reference: [Last 4 digits only, e.g., MRN-XXXX]
          - Discipline: [PT / OT / SLP]
          - Status: [IN PROGRESS / COMPLETED / BLOCKED / ESCALATED]
          - Action Taken: [Step-by-step summary of what was executed]
          - Draft Output: [Structured content if applicable, labeled DRAFT]
          - Errors Encountered: [ERROR-CODE or NONE]
          - Next Required Action: [What the clinician or human supervisor must do next]

          ## HUMAN ESCALATION â€” AUTO-ESCALATE WITHOUT DELAY
          - Any ERROR-103, ERROR-106, ERROR-107, ERROR-109 â†’ immediate human escalation
          - Rehospitalization risk HIGH or CRITICAL â†’ immediate human escalation
          - Any documentation about to be submitted or signed â†’ STOP and escalate
          - Any portal action that cannot be undone â†’ STOP and escalate
          - Any clinical decision point requiring therapist judgment â†’ STOP and escalate

          ## ABSOLUTE PROHIBITIONS
          - NEVER submit, sign, finalize, or publish any document
          - NEVER infer, guess, or fabricate patient data, MRN values, or clinical content
          - NEVER echo full MRN in any output
          - NEVER proceed past a STOP error without human resolution
          - NEVER execute a clinical decision â€” route and support only
          - NEVER access a portal outside the authorized list for this session
        inputType:
          properties:
            alertType:
              displayName: AlertType
              description: "The category of SNF alert to route. Must be one of: Therapy Documentation Gap, Quality Measure Trigger, Rehospitalization Risk, Prior Auth Expiration, Staffing Coverage Issue, Resident Safety Event, Regulatory Compliance Flag. Example: Therapy Documentation Gap"
              isRequired: true
              type: String

            documentText:
              displayName: DocumentText
              description: "The full text of a clinical document to be reviewed for compliance. Used in Stage 3 (Compliance Review). The agent will check this text against Medicare Part A, PDPM, and CMS requirements and return a Pass/Fail compliance report. Example: Full text of a PT daily treatment note."
              isRequired: true
              type: String

            payerPortalUrl:
              displayName: PayerPortalURL
              description: "The URL of the payer authorization portal. Only required for Prior Auth Expiration alert type. The agent will navigate to this URL to look up the authorization record. Example: https://provider.anthem.com/auth"
              isRequired: true
              type: String

            residentMrn:
              displayName: ResidentMRN
              description: "The resident medical record number for the alert. Used to identify the correct patient record in the EHR, payer portal, or Dataverse. Example: R-00421"
              isRequired: true
