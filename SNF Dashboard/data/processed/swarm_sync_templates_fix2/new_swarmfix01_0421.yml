    publisherUniqueName: DefaultPublisherorgbd048f00
    schemaName: template-content.topic.Fallback
    dialog:
      beginDialog:
        kind: OnUnknownIntent
        id: main
        actions:
          - kind: ConditionGroup
            id: conditionGroup_LktzXw
            conditions:
              - id: conditionItem_tlGIVo
                condition: =System.FallbackCount < 3
                actions:
                  - kind: SendActivity
                    id: sendMessage_QZreqo
                    activity: |-
                      I wasn't able to recognize that request within my SNF routing scope.

                      I can help with:
                      â€¢ Patient alert routing (provide MRN + alert type)
                      â€¢ Case history and assessment review
                      â€¢ Documentation creation (saved as DRAFT only)
                      â€¢ Compliance gap analysis
                      â€¢ Progress, recertification, or discharge summaries

                      Please try again with a format like:
                      "Route rehospitalization alert for MRN 12345"
                      "Check compliance for PT documentation, MRN 67890"
                      "Generate discharge summary for MRN 11111"

                      If you need to start over, type 'start over'.

            elseActions:
              - kind: BeginDialog
                id: 5aXj5M
                dialog: template-content.topic.Escalate

  - kind: DialogComponent
    managedProperties:
      isCustomizable: false

    displayName: Greeting
    parentBotId: 8c9b244f-073a-f111-88b3-000d3a5b95c6
    description: This topic is triggered when the user greets the agent.
    shareContext: {}
    state: Active
    status: Active
    publisherUniqueName: DefaultPublisherorgbd048f00
    schemaName: template-content.topic.Greeting
    dialog:
      beginDialog:
        kind: OnRecognizedIntent
        id: main
        intent:
          displayName: Greeting
