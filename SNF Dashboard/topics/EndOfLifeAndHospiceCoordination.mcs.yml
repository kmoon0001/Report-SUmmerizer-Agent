mcs.metadata:
  componentName: End Of Life And Hospice Coordination
  description: Elite clinical intelligence module specialized in [EndOfLifeAndHospiceCoordination]. Executes high-precision data analysis grounded in CMS Chapter 15 and Pacific Coast Services Ironclad Standards. Optimized for Dynamic Chaining.
kind: AdaptiveDialog
modelDescription: Use this topic to handle EndOfLifeAndHospiceCoordination requests in SNF Command Center.
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    displayName: End Of Life And Hospice Coordination
    includeInOnSelectIntent: true
    triggerQueries:
      - hospice coordination
      - end of life coordination
      - goals of care support
      - comfort care coordination
      - palliative family update

  actions:
    - kind: Question
      id: question_scope
      alwaysPrompt: true
      variable: init:Topic.ScopeChoice
      prompt: What is the main coordination need?
      entity:
        kind: DynamicClosedListEntity
        items:
          - DisplayName: Goals-of-care summary
            Value: GoalsOfCareSummary
          - DisplayName: Hospice coordination review
            Value: HospiceCoordination
          - DisplayName: Family communication support
            Value: FamilyCommunication
          - DisplayName: Care-transition summary
            Value: TransitionSummary

    - kind: Question
      id: question_urgency
      alwaysPrompt: true
      variable: init:Topic.UrgencyChoice
      prompt: How urgent is this?
      entity:
        kind: DynamicClosedListEntity
        items:
          - DisplayName: Routine planning
            Value: Routine
          - DisplayName: Same day
            Value: SameDay
          - DisplayName: Immediate clinician coordination
            Value: ImmediateClinician

    - kind: SendActivity
      id: send_notice
      activity: End-of-life and hospice discussions should support the care team, patient goals, and documented preferences. Do not treat this as direct medical advice.

    - kind: SendActivity


      id: send_hospice_summary


      activity:


        attachments:


          - contentType: application/vnd.microsoft.card.adaptive


            content:


              type: AdaptiveCard


              version: "1.3"


              body:


                - type: Container


                  items:


                    - type: TextBlock


                      text: "?? WORKFLOW INTAKE OVERVIEW"


                      weight: Bolder


                      size: Large


                    - type: TextBlock


                      text: "Grounded AI Insight: Automated Handoff Mode"


                      isSubtle: true


                      spacing: None


                - type: Container


                  items:


                    - type: TextBlock


                      text: =Concatenate("I have the intake for ", Topic.ScopeChoice.DisplayName, " with ", Topic.UrgencyChoice.DisplayName, " urgency.")


                      wrap: true


                      size: Medium


                - type: TextBlock


                  text: "?? This is a structured intake summary. The automated backend is currently in validation mode."


                  wrap: true


                  fontType: Monospace


                  size: Small


                  color: Warning


                  spacing: Medium


              $schema: "http://adaptivecards.io/schemas/adaptive-card.json"

    - kind: SendActivity
      id: send_manual_summary_next_step
      activity: Use the intake above to coordinate with the assigned clinician, social work, or hospice owner. This topic stays in structured intake mode until a validated live summary backend is connected.

inputType: {}
outputType: {}








