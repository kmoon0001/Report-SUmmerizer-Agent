mcs.metadata:
  componentName: FacilityContextSwitcher
  description: >
    Multi-Facility Context Switcher for DORs managing multiple SNF buildings.
    Allows rapid switching of the active facility context without losing session data.
kind: AdaptiveDialog
modelDescription: Use this topic to handle FacilityContextSwitcher requests in SNF Command Center.
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    displayName: Facility Context Switcher
    triggerQueries:
      - switch facility
      - change facility
      - different building
      - select facility
      - change location
      - new facility
      - switch buildings
      - set facility

  actions:
    - kind: ConditionGroup
      id: conditionGroup_currentFacility
      conditions:
        - id: conditionItem_hasFacility
          condition: =!IsBlank(Global.SelectedFacility)
          actions:
            - kind: SendActivity
              id: sendActivity_currentFacility
              activity: " Current Facility Context: **{Global.SelectedFacility}**"

    - kind: Question
      id: question_selectFacility
      variable: Global.SelectedFacility
      prompt: Select the facility you want to work with:
      entity:
        kind: DynamicClosedListEntity
        items:
          - id: SeaCliff
            displayName: Sea Cliff
          - id: PalmTerrace
            displayName: Palm Terrace
          - id: Victoria
            displayName: Victoria
          - id: StCatherine
            displayName: St. Catherine
          - id: StElizabeth
            displayName: St. Elizabeth
          - id: Mainplace
            displayName: Mainplace
          - id: NewOrangeHills
            displayName: New Orange Hills
          - id: TheHills
            displayName: The Hills
          - id: Other
            displayName: Other / Not Listed

    - kind: ConditionGroup
      id: conditionGroup_otherFacility
      conditions:
        - id: conditionItem_other
          condition: =Text(Global.SelectedFacility) = "Other"
          actions:
            - kind: SendActivity
              id: sendActivity_otherFacility
              activity: "Other facility selection requires administrator setup. For now, select one of the listed facilities."

    - kind: SendActivity
      id: sendActivity_facilitySet
      activity: |-
        **Facility Context Updated**
        Active Facility: **{Global.SelectedFacility}**

        All QM analysis, PDPM reporting, and compliance tracking will now be scoped to **{Global.SelectedFacility}**.

        *Previous patient context (if any) has been preserved. Say "clear patient" to reset.*

inputType: {}
outputType:
  properties:
    SelectedFacility:
      displayName: SelectedFacility
      type: String


