mcs.metadata:
  componentName: FacilityContextSwitcher
  description: >
    Multi-Facility Context Switcher for DORs managing multiple SNF buildings.
    Allows rapid switching of the active facility context without losing session data.
kind: AdaptiveDialog
modeldescription: >
  Elite Multi-Facility Context Switcher for Pacific Coast Therapy Hub.
  Enables Directors of Rehab (DOR) and executives managing multiple Pacific
  Coast facilities to switch facility context in real-time. Preserves all
  session variables while updating the active facility binding for QM analysis,
  PDPM reporting, and compliance tracking. Supports all Pacific Coast facilities.
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    displayName: Facility Context Switcher
    triggerQueries:
      - switch facility
      - change facility
      - different building
      - select facility
      - change location
      - new facility
      - switch buildings
      - set facility

  actions:
    - kind: ConditionGroup
      id: conditionGroup_currentFacility
      conditions:
        - id: conditionItem_hasFacility
          condition: =!IsBlank(Global.SelectedFacility)
          actions:
            - kind: SendActivity
              id: sendActivity_currentFacility
              activity: "ðŸ“ Current Facility Context: **{Global.SelectedFacility}**"

    - kind: Question
      id: question_selectFacility
      variable: Global.SelectedFacility
      prompt: Select the facility you want to work with:
      entity:
        kind: EmbeddedEntity
        definition:
          kind: ClosedListEntity
          items:
            - id: SeaCliff
              displayName: Sea Cliff
            - id: PalmTerrace
              displayName: Palm Terrace
            - id: Victoria
              displayName: Victoria
            - id: StCatherine
              displayName: St. Catherine
            - id: StElizabeth
              displayName: St. Elizabeth
            - id: Mainplace
              displayName: Mainplace
            - id: NewOrangeHills
              displayName: New Orange Hills
            - id: TheHills
              displayName: The Hills
            - id: Other
              displayName: Other / Not Listed

    - kind: ConditionGroup
      id: conditionGroup_otherFacility
      conditions:
        - id: conditionItem_other
          condition: =Global.SelectedFacility = "Other"
          actions:
            - kind: Question
              id: question_otherFacility
              variable: Global.SelectedFacility
              prompt: Enter the facility name:
              entity:
                kind: StringPrebuiltEntity
                sensitivityLevel: None

    - kind: SendActivity
      id: sendActivity_facilitySet
      activity: |-
        âœ… **Facility Context Updated**
        Active Facility: **{Global.SelectedFacility}**

        All QM analysis, PDPM reporting, and compliance tracking will now be scoped to **{Global.SelectedFacility}**.

        *Previous patient context (if any) has been preserved. Say "clear patient" to reset.*

inputType: {}
outputType:
  properties:
    SelectedFacility:
      displayName: SelectedFacility
      type: String

