mcs.metadata:
  componentName: Fallback
  description: Elite clinical intelligence module specialized in [Fallback]. Executes high-precision data analysis grounded in CMS Chapter 15 and Pacific Coast Services Ironclad Standards. Optimized for Dynamic Chaining.
kind: AdaptiveDialog
modelDescription: Use this topic to handle Fallback requests in SNF Command Center.
beginDialog:
  kind: OnUnknownIntent
  id: main

  actions:
    - kind: ConditionGroup
      id: condition_fallback_count
      conditions:
        - id: route_first_fallback
          condition: =System.FallbackCount < 3
          actions:
            - kind: SendActivity
              id: send_first_fallback
              activity: I can route this with buttons. Choose one of the menu options below.

            - kind: BeginDialog
              id: begin_first_fallback_menu
              dialog: snf_ai_dashboard.topic.WelcomeStart

      elseActions:
        - kind: BeginDialog
          id: begin_ambiguity_help
          dialog: snf_ai_dashboard.topic.AmbiguousRequestDisambiguation

inputType: {}
outputType: {}








