mcs.metadata:
  componentName: File And Image Processing Menu
  description: Elite clinical intelligence module specialized in [FileAndImageProcessingMenu]. Executes high-precision data analysis grounded in CMS Chapter 15 and Pacific Coast Services Ironclad Standards. Optimized for Dynamic Chaining.
kind: AdaptiveDialog
modeldescription: Elite clinical intelligence module specialized in [FileAndImageProcessingMenu]. Executes high-precision data analysis grounded in CMS Chapter 15 and Pacific Coast Services Ironclad Standards. Optimized for Dynamic Chaining.
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    displayName: File And Image Processing Menu
    includeInOnSelectIntent: true
    triggerQueries:
      - files and images
      - upload workflow
      - upload center
      - document upload
      - image upload

  actions:
    - kind: Question
      id: question_upload_path
      alwaysPrompt: true
      variable: init:Topic.UploadPathChoice
      prompt:
        attachments:
          - contentType: application/vnd.microsoft.card.adaptive
            content:
              type: AdaptiveCard
              version: "1.3"
              body:
                - type: Container
                  items:
                    - type: TextBlock
                      text: " FILE & IMAGE PROCESSING"
                      weight: Bolder
                      size: Large
                    - type: TextBlock
                      text: "What do you need to upload or review?"
                      isSubtle: true
                      spacing: None
              $schema: "http://adaptivecards.io/schemas/adaptive-card.json"
      entity:
        kind: DynamicClosedListEntity
        items:
          - DisplayName: Clinical document or export
            Value: ClinicalDocument
          - DisplayName: Clinical image or photo
            Value: ClinicalImage
          - DisplayName: Upload guidance first
            Value: Guidance
          - DisplayName: Back to main menu
            Value: MainMenu

    - kind: ConditionGroup
      id: condition_upload_route
      conditions:
        - id: route_document
          condition: =Text(Topic.UploadPathChoice) = "ClinicalDocument"
          actions:
            - kind: BeginDialog
              id: begin_upload_document
              dialog: snf_ai_dashboard.topic.UploadClinicalDocument

        - id: route_image
          condition: =Text(Topic.UploadPathChoice) = "ClinicalImage"
          actions:
            - kind: BeginDialog
              id: begin_upload_image
              dialog: snf_ai_dashboard.topic.UploadClinicalImage

        - id: route_guidance
          condition: =Text(Topic.UploadPathChoice) = "Guidance"
          actions:
            - kind: BeginDialog
              id: begin_upload_guidance
              dialog: snf_ai_dashboard.topic.FileAndImageUploadGuidance

        - id: route_main_menu
          condition: =Text(Topic.UploadPathChoice) = "MainMenu"
          actions:
            - kind: BeginDialog
              id: begin_main_menu
              dialog: snf_ai_dashboard.topic.WelcomeStart

      elseActions:
        - kind: SendActivity
          id: send_retry
          activity: Choose the upload path that best matches the file or image you need to handle.

inputType: {}
outputType: {}








