mcs.metadata:
  componentName: Handoff Queue Review
  description: Elite clinical intelligence module specialized in [HandoffQueueReview]. Executes high-precision data analysis grounded in CMS Chapter 15 and Pacific Coast Services Ironclad Standards. Optimized for Dynamic Chaining.
kind: AdaptiveDialog
modeldescription: Elite clinical intelligence module specialized in [HandoffQueueReview]. Executes high-precision data analysis grounded in CMS Chapter 15 and Pacific Coast Services Ironclad Standards. Optimized for Dynamic Chaining.
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    displayName: Handoff Queue Review
    includeInOnSelectIntent: true
    triggerQueries:
      - handoff queue
      - view handoff queue
      - check handoff status
      - pending handoffs
      - action item queue
      - who owns these escalations
      - review pending clinical actions

  actions:
    - kind: Question
      id: question_queue_scope
      alwaysPrompt: true
      variable: init:Topic.QueueScopeChoice
      prompt: What scope do you want to review?
      entity:
        kind: DynamicClosedListEntity
        items:
          - DisplayName: One unit
            Value: Unit
          - DisplayName: All units â€” facility-wide
            Value: FacilityWide
          - DisplayName: My assigned items only
            Value: MyItems

    - kind: Question
      id: question_shift_filter
      alwaysPrompt: true
      variable: init:Topic.ShiftFilterChoice
      prompt: Which shift window should I focus on?
      entity:
        kind: DynamicClosedListEntity
        items:
          - DisplayName: Current shift
            Value: CurrentShift
          - DisplayName: Last 24 hours
            Value: Last24Hours
          - DisplayName: Open items â€” any age
            Value: AllOpen

    - kind: Question
      id: question_priority_filter
      alwaysPrompt: true
      variable: init:Topic.PriorityFilterChoice
      prompt: Which priority tier?
      entity:
        kind: DynamicClosedListEntity
        items:
          - DisplayName: High priority only
            Value: High
          - DisplayName: All priorities
            Value: All

    - kind: SendActivity
      id: send_queue_summary
      activity: =Concatenate("I have the intake for a handoff queue review: ", Text(Topic.QueueScopeChoice), " scope, ", Text(Topic.ShiftFilterChoice), " window, ", Text(Topic.PriorityFilterChoice), " priority.")

    - kind: SendActivity
      id: send_queue_next_step
      activity: Use the intake above to filter the handoff queue in the command center dashboard. This topic stays in structured intake mode until a validated live queue backend is connected. For urgent open items, use Escalate Urgent Clinical Concern.

inputType: {}
outputType: {}






