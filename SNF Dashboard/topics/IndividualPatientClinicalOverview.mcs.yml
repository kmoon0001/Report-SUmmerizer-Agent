mcs.metadata:
  componentName: Individual Patient Clinical Overview
  description: Elite clinical intelligence module specialized in [IndividualPatientClinicalOverview]. Executes high-precision data analysis grounded in CMS Chapter 15 and Pacific Coast Services Ironclad Standards. Optimized for Dynamic Chaining.
kind: AdaptiveDialog
modeldescription: Elite clinical intelligence module specialized in [IndividualPatientClinicalOverview]. Executes high-precision data analysis grounded in CMS Chapter 15 and Pacific Coast Services Ironclad Standards. Optimized for Dynamic Chaining.
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    displayName: Individual Patient Clinical Overview
    includeInOnSelectIntent: true
    triggerQueries:
      - patient overview
      - whole patient picture
      - patient summary
      - what needs attention for this patient
      - clinical overview

  actions:
    - kind: Question
      id: question_focus
      alwaysPrompt: true
      variable: init:Topic.FocusChoice
      prompt: What is the main focus for this patient review?
      entity:
        kind: DynamicClosedListEntity
        items:
          - DisplayName: Safety risks and changes
            Value: Safety
          - DisplayName: Medication and active problems
            Value: MedicationAndProblems
          - DisplayName: Care plan and interventions
            Value: CarePlan
          - DisplayName: Discharge or transition readiness
            Value: Discharge
          - DisplayName: Full overview
            Value: FullOverview

    - kind: Question
      id: question_timeframe
      alwaysPrompt: true
      variable: init:Topic.TimeframeChoice
      prompt: What timeframe should I use for the review?
      entity:
        kind: DynamicClosedListEntity
        items:
          - DisplayName: Right now
            Value: Current
          - DisplayName: Last 24 hours
            Value: Last24Hours
          - DisplayName: Last 72 hours
            Value: Last72Hours
          - DisplayName: Current stay
            Value: CurrentStay

    - kind: SendActivity
      id: send_patient_overview_card
      activity:
        attachments:
          - contentType: application/vnd.microsoft.card.adaptive
            content:
              type: AdaptiveCard
              version: "1.3"
              body:
                - type: Container
                  items:
                    - type: TextBlock
                      text: "Ă°Ĺ¸âĹ  PATIENT CLINICAL OVERVIEW"
                      weight: Bolder
                      size: Large
                    - type: TextBlock
                      text: "Grounded AI Insight: Automated Handoff Mode"
                      isSubtle: true
                      spacing: None
                - type: ColumnSet
                  columns:
                    - type: Column
                      width: stretch
                      items:
                        - type: TextBlock
                          text: "**Focus**"
                          isSubtle: true
                        - type: TextBlock
                          text: "=Text(Topic.FocusChoice)"
                          size: Medium
                          weight: Bolder
                          spacing: None
                    - type: Column
                      width: stretch
                      items:
                        - type: TextBlock
                          text: "**Timeframe**"
                          isSubtle: true
                        - type: TextBlock
                          text: "=Text(Topic.TimeframeChoice)"
                          size: Medium
                          weight: Bolder
                          spacing: None
                - type: TextBlock
                  text: "Ă˘ĹˇÂ ĂŻÂ¸ This is a structured intake summary. The automated backend is currently in validation mode."
                  wrap: true
                  fontType: Monospace
                  size: Small
                  color: Warning
                  spacing: Medium
              actions:
                - type: Action.Submit
                  title: "View Full Dashboard"
                  data:
                    action: "open_dashboard"
              $schema: "http://adaptivecards.io/schemas/adaptive-card.json"

    - kind: SendActivity
      id: send_manual_review_next_step
      activity: Use the intake above to guide manual patient review with the assigned clinician. This topic stays in structured intake mode until a validated live insight backend is connected.

inputType: {}
outputType: {}







