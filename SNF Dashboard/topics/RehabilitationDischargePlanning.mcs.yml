mcs.metadata:
  componentName: Rehabilitation Discharge Planning
  description: Elite clinical intelligence module specialized in [RehabilitationDischargePlanning]. Executes high-precision data analysis grounded in CMS Chapter 15 and Pacific Coast Services Ironclad Standards. Optimized for Dynamic Chaining.
kind: AdaptiveDialog
modeldescription: Elite clinical intelligence module specialized in [RehabilitationDischargePlanning]. Executes high-precision data analysis grounded in CMS Chapter 15 and Pacific Coast Services Ironclad Standards. Optimized for Dynamic Chaining.
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    displayName: Rehabilitation Discharge Planning
    includeInOnSelectIntent: true
    triggerQueries:
      - discharge planning
      - rehab discharge
      - transition planning
      - discharge readiness
      - equipment for discharge

  actions:
    - kind: Question
      id: question_discipline
      alwaysPrompt: true
      variable: init:Topic.DisciplineChoice
      prompt: Which discipline or team should I focus on?
      entity:
        kind: DynamicClosedListEntity
        items:
          - DisplayName: PT
            Value: PT
          - DisplayName: OT
            Value: OT
          - DisplayName: ST
            Value: ST
          - DisplayName: Interdisciplinary discharge planning
            Value: Interdisciplinary

    - kind: Question
      id: question_destination
      alwaysPrompt: true
      variable: init:Topic.DestinationChoice
      prompt: What is the expected destination?
      entity:
        kind: DynamicClosedListEntity
        items:
          - DisplayName: Home
            Value: Home
          - DisplayName: Assisted living or group setting
            Value: AssistedLiving
          - DisplayName: Another facility or level of care
            Value: FacilityTransfer
          - DisplayName: Not decided yet
            Value: Undecided

    - kind: Question
      id: question_barrier
      alwaysPrompt: true
      variable: init:Topic.BarrierChoice
      prompt: What is the main planning concern?
      entity:
        kind: DynamicClosedListEntity
        items:
          - DisplayName: Functional readiness
            Value: FunctionalReadiness
          - DisplayName: Equipment or training need
            Value: EquipmentTraining
          - DisplayName: Caregiver or support concern
            Value: CaregiverSupport
          - DisplayName: Follow-up services and coordination
            Value: FollowUpServices

    - kind: SendActivity


      id: send_discharge_summary


      activity:


        attachments:


          - contentType: application/vnd.microsoft.card.adaptive


            content:


              type: AdaptiveCard


              version: "1.3"


              body:


                - type: Container


                  items:


                    - type: TextBlock


                      text: "?? WORKFLOW INTAKE OVERVIEW"


                      weight: Bolder


                      size: Large


                    - type: TextBlock


                      text: "Grounded AI Insight: Automated Handoff Mode"


                      isSubtle: true


                      spacing: None


                - type: Container


                  items:


                    - type: TextBlock


                      text: =Concatenate("I have the intake for ", Topic.DisciplineChoice.DisplayName, ", destination ", Topic.DestinationChoice.DisplayName, ", and concern ", Topic.BarrierChoice.DisplayName, ".")


                      wrap: true


                      size: Medium


                - type: TextBlock


                  text: "?? This is a structured intake summary. The automated backend is currently in validation mode."


                  wrap: true


                  fontType: Monospace


                  size: Small


                  color: Warning


                  spacing: Medium


              $schema: "http://adaptivecards.io/schemas/adaptive-card.json"

    - kind: SendActivity
      id: send_manual_summary_next_step
      activity: Use the intake above to coordinate discharge planning with therapy, nursing, and case management. This topic stays in structured intake mode until a validated live summary backend is connected.

inputType: {}
outputType: {}






