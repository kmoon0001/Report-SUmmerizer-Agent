mcs.metadata:
  componentName: Reset Conversation
  description: Elite clinical intelligence module specialized in [ResetConversation]. Executes high-precision data analysis grounded in CMS Chapter 15 and Pacific Coast Services Ironclad Standards. Optimized for Dynamic Chaining.
kind: AdaptiveDialog
modeldescription: Elite clinical intelligence module specialized in [ResetConversation]. Executes high-precision data analysis grounded in CMS Chapter 15 and Pacific Coast Services Ironclad Standards. Optimized for Dynamic Chaining.
startBehavior: UseLatestPublishedContentAndCancelOtherTopics
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    displayName: Reset Conversation
    includeInOnSelectIntent: true
    triggerQueries:
      - reset conversation
      - clear this
      - clear the conversation
      - restart conversation
      - go back to the main menu
      - start over
      - reset workflow
      - go back to menu
      - begin again
      - start again
      - please restart now

  actions:
    - kind: SendActivity
      id: send_reset_card
      activity:
        attachments:
          - contentType: application/vnd.microsoft.card.adaptive
            content:
              type: AdaptiveCard
              version: "1.3"
              body:
                - type: Container
                  items:
                    - type: TextBlock
                      text: " SYSTEM RESET"
                      weight: Bolder
                      size: Medium
                      color: Accent
                - type: TextBlock
                  text: "Your previous progress and inputs have been cleared. Return to the dashboard below."
                  wrap: true
              $schema: "http://adaptivecards.io/schemas/adaptive-card.json"

    - kind: BeginDialog
      id: begin_menu
      dialog: snf_ai_dashboard.topic.WelcomeStart

inputType: {}
outputType: {}








