kind: AdaptiveDialog
description: Normalizes messy therapist dictation into high-fidelity clinical syntax.
id: Narrative_Normalization
beginDialog:
  kind: OnRecognizedIntent
  id: Main
  actions:
    - kind: SendActivity
      activity: "🧠 **NARRATIVE NORMALIZATION**: Refining unstructured dictation into skilled terminology..."
    
    # 1. Apply Platinum Prompt Pattern: "Translate-to-Skilled"
    - kind: SetVariable
      variable: Topic.NormalizedNote
      value: "=AI.Rewrite(Topic.RawDictation, 'Professional Clinical Syntax - ASHA/AOTA/APTA Standard')"
    
    - kind: SendActivity
      activity: "✅ **REFINEMENT COMPLETE**: Your dictation has been hardened for medical necessity."
