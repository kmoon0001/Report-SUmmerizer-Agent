    displayName: Progress Note Intake
    parentBotId: f0a91e13-4b2f-f111-88b4-000d3a37eba2
    shareContext: {}
    state: Active
    status: Active
    publisherUniqueName: DefaultPublisherorg3353a370
    schemaName: template-content.topic.ProgressNoteIntake
    dialog:
      modelDescription: Collects structured SNF therapy data for progress note generation. No PII collected. All questions are quick-click buttons with a free-text field at the end.
      beginDialog:
        kind: OnRecognizedIntent
        id: main
        intent: {}
        actions:
          - kind: SendActivity
            id: sendActivity_welcome
            activity: Let's build your Progress Note. Tap the buttons to answer each question — no typing needed (except the free-text field at the end).

          - kind: Question
            id: question_discipline
            interruptionPolicy:
              allowInterruption: true

            variable: init:Topic.discipline
            prompt: Which therapy discipline?
            entity:
              kind: EmbeddedEntity
              definition:
                kind: ClosedListEntity
                items:
                  - id: PT
                    displayName: PT — Physical Therapy

                  - id: OT
                    displayName: OT — Occupational Therapy

                  - id: SLP
                    displayName: SLP — Speech-Language Pathology

          - kind: Question
            id: question_therapyGoals
            interruptionPolicy:
              allowInterruption: true

            variable: init:Topic.therapyGoals
            prompt: What goal area was addressed this session?
            entity:
              kind: EmbeddedEntity
              definition:
                kind: ClosedListEntity
                items:
                  - id: Ambulation / Mobility
                    displayName: Ambulation / Mobility

                  - id: Transfers / Bed Mobility
                    displayName: Transfers / Bed Mobility

                  - id: ADL Independence
                    displayName: ADL Independence

                  - id: Balance / Fall Prevention
                    displayName: Balance / Fall Prevention

                  - id: Strengthening / Endurance
                    displayName: Strengthening / Endurance

                  - id: ROM / Flexibility
                    displayName: ROM / Flexibility

                  - id: Swallowing / Dysphagia
                    displayName: Swallowing / Dysphagia

                  - id: Cognition / Memory
                    displayName: Cognition / Memory

                  - id: Communication / Speech
                    displayName: Communication / Speech

                  - id: Pain Management
                    displayName: Pain Management

                  - id: Home Safety / Discharge Planning
                    displayName: Home Safety / Discharge Planning

                  - id: Other
                    displayName: Other (describe below)

          - kind: Question
            id: question_progressStatus
            interruptionPolicy:
              allowInterruption: true

            variable: init:Topic.progressStatus
            prompt: How is the patient progressing toward their goals?
            entity:
              kind: EmbeddedEntity
              definition:
                kind: ClosedListEntity
                items:
                  - id: Progressing
                    displayName: Progressing — Making measurable gains

                  - id: Maintained
                    displayName: Maintained — Holding current level

                  - id: Regressed
                    displayName: Regressed — Declined from prior level

                  - id: Plateau
                    displayName: Plateau — No change expected short-term

          - kind: Question
            id: question_assistLevel
            interruptionPolicy:
              allowInterruption: true

            variable: init:Topic.assistLevel
            prompt: What is the current assist level?
            entity:
              kind: EmbeddedEntity
              definition:
                kind: ClosedListEntity
                items:
                  - id: Independent
                    displayName: Independent (I)

                  - id: Supervision / SBA
                    displayName: Supervision / Stand-By Assist (SBA)

                  - id: Contact Guard Assist
                    displayName: Contact Guard Assist (CGA)

                  - id: Min Assist
                    displayName: Minimum Assist (Min A) — 25%

                  - id: Mod Assist
                    displayName: Moderate Assist (Mod A) — 50%

                  - id: Max Assist
                    displayName: Maximum Assist (Max A) — 75%

                  - id: Dependent
                    displayName: Dependent / Total Assist (DEP)

          - kind: Question
            id: question_levelChange
            interruptionPolicy:
              allowInterruption: true

            variable: init:Topic.levelChange
            prompt: Has the assist level changed since the last session?
            entity:
              kind: EmbeddedEntity
              definition:
                kind: ClosedListEntity
                items:
                  - id: Improved
                    displayName: Improved — Less assist needed

                  - id: Same
                    displayName: Same — No change

                  - id: Declined
                    displayName: Declined — More assist needed

          - kind: Question
            id: question_medNecessity
            interruptionPolicy:
              allowInterruption: true

            variable: init:Topic.medNecessity
            prompt: Medical necessity status for continued skilled therapy?
            entity:
              kind: EmbeddedEntity
              definition:
                kind: ClosedListEntity
                items:
