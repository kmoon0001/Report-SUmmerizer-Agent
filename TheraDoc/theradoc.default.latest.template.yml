  - kind: DialogComponent
    managedProperties:
      isCustomizable: false

    displayName: Ambiguous Request Disambiguation
    parentBotId: f0a91e13-4b2f-f111-88b4-000d3a37eba2
    shareContext: {}
    state: Active
    status: Active
    publisherUniqueName: DefaultPublisherorg3353a370
    schemaName: template-content.topic.AmbiguousRequestDisambiguation
    dialog:
      modelDescription: Triggered when the user's request is ambiguous or unclear. Helps clarify what type of documentation or action the user needs. Presents menu of options including Daily Note, Progress Note, Evaluation, Discharge Summary, Nursing Handoff, or other documentation types.
      beginDialog:
        kind: OnRecognizedIntent
        id: main
        intent: {}
        actions:
          - kind: SendActivity
            id: sendActivity_MuC7rY
            activity: I'm sorry, I didn't quite understand that. Let me show you the available options so I can direct you appropriately.

          - kind: Question
            id: question_LknoA0
            displayName: Recertification
            interruptionPolicy:
              allowInterruption: true

            variable: init:Topic.mainMenuSelection
            prompt: "What would you like to do? Please select one of the following options:"
            entity:
              kind: EmbeddedEntity
              definition:
                kind: ClosedListEntity
                items:
                  - id: PT Daily Note
                    displayName: PT Daily Note

                  - id: OT Daily Note
                    displayName: OT Daily Note

                  - id: ST Daily Note
                    displayName: ST Daily Note

                  - id: Progress Note
                    displayName: Progress Note

                  - id: Evaluation/Assessment
                    displayName: Evaluation/Assessment

                  - id: Discharge Note
                    displayName: Discharge Note

                  - id: Recertification
                    displayName: Recertification

                  - id: Nursing Handoff
                    displayName: Nursing Handoff

                  - id: Audit Existing Note
                    displayName: Audit Existing Note

          - kind: ConditionGroup
            id: conditionGroup_XfaihB
            conditions:
              - id: conditionItem_DHOqLe
                condition: =Topic.mainMenuSelection = 'template-content.topic.AmbiguousRequestDisambiguation.main.question_LknoA0'.'PT Daily Note'
                actions:
                  - kind: BeginDialog
                    id: wmGfrg
                    dialog: template-content.topic.PTDailyNoteCard

              - id: conditionItem_VRCgib
                condition: =Topic.mainMenuSelection = 'template-content.topic.AmbiguousRequestDisambiguation.main.question_LknoA0'.'OT Daily Note'
                actions:
                  - kind: BeginDialog
                    id: dkd9hK
                    dialog: template-content.topic.OTDailyNoteCard

              - id: conditionItem_hwlTdN
                condition: =Topic.mainMenuSelection = 'template-content.topic.AmbiguousRequestDisambiguation.main.question_LknoA0'.'ST Daily Note'
                actions:
                  - kind: BeginDialog
                    id: 9EBzgO
                    dialog: template-content.topic.SLPDailyNoteCard

              - id: conditionItem_pijeh4
                condition: =Topic.mainMenuSelection = 'template-content.topic.AmbiguousRequestDisambiguation.main.question_LknoA0'.'Progress Note'
                actions:
                  - kind: BeginDialog
                    id: oGnA3p
                    dialog: template-content.topic.ProgressNoteIntake

              - id: conditionItem_ERIMSG
                condition: =Topic.mainMenuSelection = 'template-content.topic.AmbiguousRequestDisambiguation.main.question_LknoA0'.'Evaluation/Assessment'
                actions:
                  - kind: BeginDialog
                    id: SCBGZL
                    dialog: template-content.topic.EvaluationAssessmentIntake

              - id: conditionItem_JSPoXh
                condition: =Topic.mainMenuSelection = 'template-content.topic.AmbiguousRequestDisambiguation.main.question_LknoA0'.'Discharge Note'
                actions:
                  - kind: BeginDialog
                    id: ZHV8Ze
                    dialog: template-content.topic.DischargeNoteIntake

              - id: conditionItem_WmYnJ5
                condition: =Topic.mainMenuSelection = 'template-content.topic.AmbiguousRequestDisambiguation.main.question_LknoA0'.Recertification
                actions:
                  - kind: BeginDialog
                    id: DVe38i
                    dialog: template-content.topic.RecertificationDischargeCard

              - id: conditionItem_VJhrM1
                condition: =Topic.mainMenuSelection = 'template-content.topic.AmbiguousRequestDisambiguation.main.question_LknoA0'.'Nursing Handoff'
                actions:
                  - kind: BeginDialog
                    id: OYeNBC
                    dialog: template-content.topic.NursingHandoff

              - id: conditionItem_bUa8iR
                condition: =Topic.mainMenuSelection = 'template-content.topic.AmbiguousRequestDisambiguation.main.question_LknoA0'.'Audit Existing Note'
                actions:
                  - kind: BeginDialog
                    id: SHxoj9
                    input: {}
                    dialog: template-content.topic.AuditExistingNote
                    output:
                      binding:
                        existingNoteText: Topic.existingNoteText

      inputType: {}
