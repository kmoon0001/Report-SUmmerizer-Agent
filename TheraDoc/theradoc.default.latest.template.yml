  - kind: DialogComponent
    managedProperties:
      isCustomizable: false

    displayName: Welcome / Start
    parentBotId: f0a91e13-4b2f-f111-88b4-000d3a37eba2
    shareContext: {}
    state: Active
    status: Active
    publisherUniqueName: DefaultPublisherorg3353a370
    schemaName: template-content.topic.WelcomeStart
    dialog:
      modelDescription: Greeting message that welcomes users and presents available note types and capabilities
      beginDialog:
        kind: OnRecognizedIntent
        id: main
        intent: {}
        actions:
          - kind: SendActivity
            id: sendActivity_mDSpVD
            activity: |-
              👋 Welcome to TheraDoc!

              I can help you generate Medicare-compliant therapy notes fast.

              What would you like to do?
              • Daily Note — quick session note
              • Progress Note — goal progress update
              • Assessment / Eval — full evaluation
              • Recertification — continued care justification
              • Discharge Summary — end of episode
              • Nursing Handoff — SBAR summary

              Just tell me what you need, or pick from the list above.

      inputType: {}
      outputType: {}

