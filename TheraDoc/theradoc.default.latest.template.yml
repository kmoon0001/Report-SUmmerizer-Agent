kind: BotDefinition
entity:
  accessControlPolicy: Any
  authenticationMode: Integrated
  authenticationTrigger: Always
  configuration:
    settings:
      GenerativeActionsEnabled: true

  template: kickStartTemplate-1.0.0

components:
  - kind: DialogComponent
    managedProperties:
      isCustomizable: false

    displayName: On Error
    parentBotId: f0a91e13-4b2f-f111-88b4-000d3a37eba2
    description: This system topic triggers when the agent encounters an error. When using the test chat pane, the full error description is displayed.
    shareContext: {}
    state: Active
    status: Active
    publisherUniqueName: DefaultPublisherorg3353a370
    schemaName: template-content.topic.OnError
    dialog:
      startBehavior: UseLatestPublishedContentAndCancelOtherTopics
      beginDialog:
        kind: OnError
        id: main
        actions:
          - kind: SetVariable
            id: setVariable_timestamp
            variable: init:Topic.CurrentTime
            value: =Text(Now(), DateTimeFormat.UTC)

          - kind: ConditionGroup
            id: condition_1
            conditions:
              - id: bL4wmY
                condition: =System.Conversation.InTestMode = true
                actions:
                  - kind: SendActivity
                    id: sendMessage_XJBYMo
                    activity: |-
                      Error Message: {System.Error.Message}
                      Error Code: {System.Error.Code}
                      Conversation Id: {System.Conversation.Id}
                      Time (UTC): {Topic.CurrentTime}

            elseActions:
              - kind: SendActivity
                id: sendMessage_dZ0gaF
                activity:
                  text:
                    - |-
                      An error has occurred.
                      Error code: {System.Error.Code}
                      Conversation Id: {System.Conversation.Id}
                      Time (UTC): {Topic.CurrentTime}.
                  speak:
                    - An error has occurred, please try again.

          - kind: LogCustomTelemetryEvent
            id: 9KwEAn
            eventName: OnErrorLog
            properties: "={ErrorMessage: System.Error.Message, ErrorCode: System.Error.Code, TimeUTC: Topic.CurrentTime, ConversationId: System.Conversation.Id}"

          - kind: CancelAllDialogs
            id: NW7NyY

  - kind: BotSettingsComponent
    managedProperties:
      isCustomizable: false

    parentBotId: f0a91e13-4b2f-f111-88b4-000d3a37eba2
    shareContext: {}
    state: Active
    status: Active
    publisherUniqueName: DefaultPublisherorg3353a370
    schemaName: template-content.settings.pcca_agent.BotSettingsComponent.Feedback
    settings:
      kind: DefaultFeedbackCollection
      disclaimer: Your feedback helps improve TheraDoc. Please do not include PHI (Protected Health Information), patient names, identifiers, or sensitive clinical data. Feedback is used only for quality improvement and is reviewed by our organization. By submitting, you consent to this use.

  - kind: CustomEntityComponent
    managedProperties:
      isCustomizable: false

    displayName: Rest Period
    parentBotId: f0a91e13-4b2f-f111-88b4-000d3a37eba2
    shareContext: {}
    state: Active
    status: Active
    publisherUniqueName: DefaultPublisherorg3353a370
    schemaName: template-content.entity.RestPeriod
    entity:
      kind: RegexEntity
      pattern: \b(\d+)\s?(sec(ond)?s?|min(ute)?s?)\b\s?(rest|break|between\s?sets?)?|\b(\d+)[\s-]?(sec(ond)?|min(ute)?)\s?(rest|break)

  - kind: DialogComponent
    managedProperties:
      isCustomizable: false

    displayName: Documentation Guidance
    parentBotId: f0a91e13-4b2f-f111-88b4-000d3a37eba2
    shareContext: {}
    state: Active
    status: Active
    publisherUniqueName: DefaultPublisherorg3353a370
    schemaName: template-content.topic.DocumentationGuidance
    dialog:
      modelDescription: Use this topic when a therapist asks what information is needed for a PT, OT, or ST note, how to write skilled SNF documentation, what makes a note compliant, what format to use, or how to document specific therapy situations. Answer using the agent's configured knowledge sources for documentation standards, compliance guidance, formatting conventions, and approved examples. Keep answers concise, direct, and clinician-friendly. Prefer knowledge-based guidance over tool use unless the user explicitly wants an actual note, audit, parse, or handoff generated.
      beginDialog:
        kind: OnRecognizedIntent
        id: main
        intent: {}
        actions:
          - kind: SendActivity
            id: sendActivity_QVdjkP
            activity: |-
              Here are SNF therapy documentation standards to guide your clinical notes:

              **Cueing Levels** — Document the level of verbal or tactile cues provided:
              • Independent (I): No cues needed
              • Supervision (S): Stand-by, no hands-on
              • Modified Independent (ModI): Uses device/compensation, no assist
              • Contact Guard Assist (CGA): Therapist hand contact, no force
              • Minimal Assist (MinA): Patient performs 75%+ of task
              • Moderate Assist (ModA): Patient performs 50–74% of task
              • Maximum Assist (MaxA): Patient performs 25–49% of task
              • Total Assist (TA): Patient performs less than 25%

              **Skilled Language Requirements** — Every note must include:
              • Clinical reason skilled therapy is required (not maintenance)
              • Patient response to treatment and measurable progress
              • Functional goals with objective baselines and targets
              • Safety considerations or precautions addressed
              • Plan and frequency of continued treatment

              **What to avoid:** Unskilled language (e.g., "patient tolerated well"), non-measurable progress, missing assist levels, or absent functional connection.

              Would you like me to draft, revise, or audit a specific note using these standards?

      inputType: {}
      outputType: {}

  - kind: KnowledgeSourceComponent
    managedProperties:
      isCustomizable: false

    displayName: ASHA Speech-Language Pathology Practice Standards and Guidelines
    parentBotId: f0a91e13-4b2f-f111-88b4-000d3a37eba2
    description: "Use this source for ASHA speech-language pathology clinical practice guidelines, dysphagia management standards, cognitive-communication frameworks, and AAC resources applicable to SNF settings. Reference when answering questions about SLP documentation, swallowing assessments, voice disorders, and skilled speech therapy justification. Do not use for PT or OT clinical standards. | Version: 2026.1 | Specialty: ST | Category: Clinical Practice Guidelines"
    shareContext: {}
    category: Authoritative
    state: Active
    status: Active
    publisherUniqueName: DefaultPublisherorg3353a370
    schemaName: template-content.knowledge.ASHASpeechLanguagePathologyPracticeStandardsandGuidelines
    configuration:
      source:
        kind: PublicSiteSearchSource
        triggerCondition: true
        site: https://www.asha.org/practice

  - kind: BotSettingsComponent
