    status: Active
    publisherUniqueName: DefaultPublisherorg3353a370
    schemaName: template-content.topic.FormatPreference
    dialog:
      modelDescription: Use this topic when a therapist asks for concise narrative format, lightly labeled SOAP-style format, Net Health or Rehab Optima-style wording, or wants the agent to adjust how output is structured. Explain the available documentation styles briefly and help the user choose the best fit for SNF therapy documentation. Keep answers concise and practical. Do not generate the final note here unless the user clearly shifts into a note-generation request.
      beginDialog:
        kind: OnRecognizedIntent
        id: main
        intent: {}
        actions:
          - kind: SendActivity
            id: sendActivity_v9f9BN
            activity: |-
              TheraDoc supports the following documentation formats:

              • Narrative (default): Full paragraph format with clinical reasoning, ideal for evaluations and complex notes.
              • SOAP Note: Structured Subjective, Objective, Assessment, Plan format.
              • DAP Note: Data, Assessment, Plan format common in behavioral and rehab settings.
              • Bullet summary: Concise bullet points for quick review or MDS support documentation.

              To request a specific format, simply include it in your request. For example: "Write this as a SOAP note" or "Give me a bullet summary."

              All formats are AI-generated drafts. Always review and modify before EHR entry.

      inputType: {}
      outputType: {}

