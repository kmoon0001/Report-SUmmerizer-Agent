        actions:
          - kind: SendActivity
            id: sendActivity_FTkL32
            activity: |-
              I'm sorry, it looks like something went wrong or the request timed out. This can happen with longer documentation requests.

              Here's what you can do:
              • Try rephrasing your request with less detail and submit again.
              • Break your request into smaller steps (e.g., complete one discipline at a time).
              • Refresh and start a new session if the issue persists.

              All AI-generated content requires clinical review before EHR entry. Your previous input was not saved — please re-enter when ready.

      inputType: {}
      outputType: {}

