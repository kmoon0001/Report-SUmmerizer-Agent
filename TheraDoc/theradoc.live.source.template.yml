      isCustomizable: false

    displayName: Compliance Help
    parentBotId: 2c20b02f-61e6-4435-837d-90654a04353c
    shareContext: {}
    state: Active
    status: Active
    publisherUniqueName: DefaultPublisherorgbd048f00
    schemaName: template-content.topic.ComplianceHelp
    dialog:
      modelDescription: Use this topic when a therapist asks why wording may not be skilled, what is missing for medical necessity, what compliance risks exist in a therapy note, or how to strengthen measurable function and therapist skill in SNF documentation. Answer using the configured compliance and documentation knowledge sources first. Explain the practical risk and the missing skilled elements clearly and concisely. If the user provides an actual note and wants a structured review, the agent should prefer the Audit Note tool instead of answering only with guidance.
      beginDialog:
        kind: OnRecognizedIntent
        id: main
        intent: {}
        actions:
          - kind: SendActivity
            id: sendActivity_lhfeLK
            activity: |-
              SNF therapy documentation must meet Medicare Part A and MDS compliance standards. Key requirements include:

              • Skilled need justification: Every note must clearly state why skilled therapy is required (e.g., complexity, safety risk, patient inability to self-instruct).
              • Functional baseline and progress: Document measurable functional status and progress toward goals using objective data.
              • Plan of care alignment: Therapy provided must align with the certified plan of care, frequency, and duration.
              • Medical necessity: Notes must support continued skilled need or justify maintenance therapy per Medicare guidelines.
              • Defensible documentation: Avoid vague language. Use measurable terms and clinical reasoning.

              For note-specific auditing, use the Audit Existing Note feature. For drafting compliant notes, use the appropriate Daily Note or Evaluation topic.

      inputType: {}
      outputType: {}

