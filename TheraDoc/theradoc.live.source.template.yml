  - kind: DialogComponent
    managedProperties:
      isCustomizable: false

    displayName: Progress Note Intake
    parentBotId: 2c20b02f-61e6-4435-837d-90654a04353c
    shareContext: {}
    state: Active
    status: Active
    publisherUniqueName: DefaultPublisherorgbd048f00
    schemaName: template-content.topic.ProgressNoteIntake
    dialog:
      modelDescription: Collects patient information for progress note documentation across PT, OT, and ST disciplines. Gathers patient name, therapy goals, session activities, and response to treatment, then calls the Generate Progress Note tool.
      beginDialog:
        kind: OnRecognizedIntent
        id: main
        intent: {}
        actions:
          - kind: Question
            id: question_3NJBJg
            interruptionPolicy:
              allowInterruption: true

            variable: init:Topic.patientName
            prompt: What is the patient's name?
            entity: StringPrebuiltEntity

          - kind: SendActivity
            id: sendActivity_iziDCA
            activity: Thank you. I'll help you create the progress note documentation.

          - kind: Question
            id: question_lQ6JdB
            interruptionPolicy:
              allowInterruption: true

            variable: init:Topic.therapyGoals
            prompt: What are the patient's current therapy goals?
            entity: StringPrebuiltEntity

          - kind: Question
            id: question_PlEWtD
            interruptionPolicy:
              allowInterruption: true

            variable: init:Topic.sessionActivities
            prompt: What activities or interventions were performed during this session?
            entity: StringPrebuiltEntity

          - kind: Question
            id: question_MpmsBZ
            interruptionPolicy:
              allowInterruption: true

            variable: Topic.patientResponse
            prompt: How did the patient respond to the session?
            entity:
              kind: EmbeddedEntity
              definition:
                kind: ClosedListEntity
                items:
                  - id: Tolerated well
                    displayName: Tolerated well

                  - id: Cooperative
                    displayName: Cooperative

                  - id: Fatigued
                    displayName: Fatigued

                  - id: Resistant
                    displayName: Resistant

                  - id: Other
                    displayName: Other

              displayName: EmbeddedEntity-YYrnLW

          - kind: ConditionGroup
            id: conditionGroup_tc5c3U
            conditions:
              - id: conditionItem_swQ3xM
                condition: =Topic.patientResponse = 'template-content.topic.ProgressNoteIntake.main.question_MpmsBZ'.Other
                actions:
                  - kind: Question
                    id: question_AlcjNX
                    interruptionPolicy:
                      allowInterruption: true

                    variable: Topic.patientResponseOtherDetail
                    prompt: Please briefly describe the patient's response.
                    entity:
                      kind: StringPrebuiltEntity
                      sensitivityLevel: None

          - kind: Question
            id: question_q9VPT0
            interruptionPolicy:
              allowInterruption: true

            variable: init:Topic.progressUpdateStatus
            prompt: How is the patient progressing toward therapy goals?
            entity:
              kind: EmbeddedEntity
              definition:
                kind: ClosedListEntity
                items:
                  - id: Progressing
                    displayName: Progressing

                  - id: Maintained
                    displayName: Maintained

                  - id: Regressed
                    displayName: Regressed

                  - id: Other
                    displayName: Other

              displayName: EmbeddedEntity-i5fXd8

          - kind: ConditionGroup
            id: conditionGroup_AhecFG
            conditions:
              - id: conditionItem_fIQgVA
                condition: =Topic.progressUpdateStatus = 'template-content.topic.ProgressNoteIntake.main.question_q9VPT0'.Regressed
                actions:
                  - kind: Question
                    id: question_UCls0U
                    interruptionPolicy:
                      allowInterruption: true

                    variable: init:Topic.progressUpdateDetail
                    prompt: Briefly describe the regression or barriers noted.
                    entity: StringPrebuiltEntity

              - id: conditionItem_x3w1FJ
                condition: =Topic.progressUpdateStatus = 'template-content.topic.ProgressNoteIntake.main.question_q9VPT0'.Other
                actions:
                  - kind: Question
                    id: question_SprxeG
                    interruptionPolicy:
                      allowInterruption: true

                    variable: init:Topic.progressUpdateDetailOther
                    prompt: Briefly describe the patient's progress.
                    entity: StringPrebuiltEntity

          - kind: Question
            id: question_niNfTR
            interruptionPolicy:
              allowInterruption: true

            variable: init:Topic.clinicianPlan
            prompt: What is your plan or recommendation for the next session?
            entity: StringPrebuiltEntity

          - kind: Question
            id: question_pB7H6z
            interruptionPolicy:
              allowInterruption: true

            variable: init:Topic.additionalNotes
            prompt: Are there any additional notes or comments you'd like to include in the progress note?
            entity: StringPrebuiltEntity

          - kind: BeginDialog
            id: znUtHz
            input:
              binding:
                text: "=Concatenate(\"Patient: \", Topic.patientName, \" | Therapy Goals: \", Topic.therapyGoals, \" | Session Activities: \", Topic.sessionActivities, \" | Clinician Plan: \", Topic.clinicianPlan, \" | Additional Notes: \", Topic.additionalNotes)"

            dialog: template-content.action.TheraDocPTGenerateNote
            output:
              binding:
                generatednote: Topic.generatednote

          - kind: SendActivity
            id: sendActivity_1ywoow
            activity: "{Topic.generatednote}"

      inputType: {}
      outputType: {}

  - kind: DialogComponent
    managedProperties:
      isCustomizable: false

    displayName: Format Preference
    parentBotId: 2c20b02f-61e6-4435-837d-90654a04353c
    shareContext: {}
    state: Active
    status: Active
    publisherUniqueName: DefaultPublisherorgbd048f00
    schemaName: template-content.topic.FormatPreference
    dialog:
      modelDescription: Use this topic when a therapist asks for concise narrative format, lightly labeled SOAP-style format, Net Health or Rehab Optima-style wording, or wants the agent to adjust how output is structured. Explain the available documentation styles briefly and help the user choose the best fit for SNF therapy documentation. Keep answers concise and practical. Do not generate the final note here unless the user clearly shifts into a note-generation request.
      beginDialog:
        kind: OnRecognizedIntent
        id: main
        intent: {}
        actions:
          - kind: SendActivity
            id: sendActivity_v9f9BN
            activity: |-
              TheraDoc supports the following documentation formats:

              • Narrative (default): Full paragraph format with clinical reasoning, ideal for evaluations and complex notes.
              • SOAP Note: Structured Subjective, Objective, Assessment, Plan format.
              • DAP Note: Data, Assessment, Plan format common in behavioral and rehab settings.
              • Bullet summary: Concise bullet points for quick review or MDS support documentation.

              To request a specific format, simply include it in your request. For example: "Write this as a SOAP note" or "Give me a bullet summary."

              All formats are AI-generated drafts. Always review and modify before EHR entry.

      inputType: {}
      outputType: {}

  - kind: DialogComponent
    managedProperties:
      isCustomizable: false

    displayName: OT Daily Note Card
