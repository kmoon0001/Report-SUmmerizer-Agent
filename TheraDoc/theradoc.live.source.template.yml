                    "type": "Input.ChoiceSet",
                    "id": "assistLevel",
                    "label": "Assist Level per Task",
                    "isRequired": true,
                    "errorMessage": "Assist level is required",
                    "choices": [
                      {
                        "title": "Independent",
                        "value": "Independent"
                      },
                      {
                        "title": "Supervision",
                        "value": "Supervision"
                      },
                      {
                        "title": "SBA (Standby Assist)",
                        "value": "SBA"
                      },
                      {
                        "title": "CGA (Contact Guard Assist)",
                        "value": "CGA"
                      },
                      {
                        "title": "Min A (Minimal Assist 25%)",
                        "value": "Min A"
                      },
                      {
                        "title": "Mod A (Moderate Assist 50%)",
                        "value": "Mod A"
                      },
                      {
                        "title": "Max A (Maximum Assist 75%)",
                        "value": "Max A"
                      },
                      {
                        "title": "Total Assist (Dependent)",
                        "value": "Total Assist"
                      }
                    ]
                  },
                  {
                    "type": "Input.Text",
                    "id": "fimScore",
                    "label": "FIM / Section GG Score",
                    "placeholder": "FIM: 4/7 for dressing"
                  },
                  {
                    "type": "Input.Number",
                    "id": "setsTrials",
                    "label": "Sets / Trials",
                    "isRequired": true,
                    "errorMessage": "Sets/trials count is required"
                  },
                  {
                    "type": "Input.Text",
                    "id": "safetyAwareness",
                    "label": "Safety Awareness Observations",
                    "isMultiline": true,
                    "placeholder": "Patient demonstrates..."
                  },
                  {
                    "type": "Input.Text",
                    "id": "cognitivePerceptual",
                    "label": "Cognitive / Perceptual Observations",
                    "isMultiline": true,
                    "placeholder": "BIMS score, attention, sequencing..."
                  },
                  {
                    "type": "Input.Text",
                    "id": "responseToTreatment",
                    "label": "Response to Treatment",
                    "isMultiline": true,
                    "isRequired": true,
                    "errorMessage": "Response to treatment is required"
                  },
                  {
                    "type": "Input.Text",
                    "id": "progressTowardGoals",
                    "label": "Progress Toward Goals",
                    "isMultiline": true,
                    "placeholder": "Patient is progressing toward LTG..."
                  },
                  {
                    "type": "Input.Text",
                    "id": "planForNextSession",
                    "label": "Plan for Next Session",
                    "isMultiline": true
                  },
                  {
                    "type": "Input.Text",
                    "id": "therapistName",
                    "label": "Therapist Name & Credentials",
