                actions:
                  - kind: SendActivity
                    id: SendActivity_GbrWS5
                    activity: Redirecting to PT Evaluation topic...

              - id: ConditionItem_7eqgmc
                condition: =Topic.Discipline = NoteIntakeDisciplineOptions.PT && Topic.NoteType = NoteIntakeNoteTypeOptions.Discharge
                actions:
                  - kind: SendActivity
                    id: SendActivity_vR6AZF
                    activity: Redirecting to PT Discharge topic...

              - id: ConditionItem_h5DHCC
