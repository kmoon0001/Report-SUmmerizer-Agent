                    "weight": "Bolder",
                    "size": "Large",
                    "wrap": true
                  },
                  {
                    "type": "Input.Date",
                    "id": "dateOfService",
                    "label": "Date of Service",
                    "isRequired": true,
                    "errorMessage": "Date of service is required"
                  },
                  {
                    "type": "Input.Number",
                    "id": "treatmentDuration",
                    "label": "Treatment Duration (minutes)",
                    "isRequired": true,
                    "errorMessage": "Treatment duration is required"
                  },
                  {
                    "type": "Input.Text",
                    "id": "adlTasks",
                    "label": "ADL Task(s) Performed",
                    "placeholder": "Dressing, bathing, grooming",
