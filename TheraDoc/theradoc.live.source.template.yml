    displayName: Evaluation Assessment Intake
    parentBotId: 2c20b02f-61e6-4435-837d-90654a04353c
    shareContext: {}
    state: Active
    status: Active
    publisherUniqueName: DefaultPublisherorgbd048f00
    schemaName: template-content.topic.EvaluationAssessmentIntake
    dialog:
      modelDescription: Collects patient information for evaluation and assessment intake across SLP, OT, and PT disciplines. Gathers patient name, evaluation date, and therapy type to initiate the assessment workflow.
      beginDialog:
        kind: OnRecognizedIntent
        id: main
        intent: {}
        actions:
          - kind: Question
            id: question_h4NpWb
            interruptionPolicy:
              allowInterruption: true

            variable: Topic.patientName
            prompt: What is the patient's name?
            entity:
              kind: StringPrebuiltEntity
              sensitivityLevel: None

          - kind: Question
            id: question_RvOsHM
            interruptionPolicy:
              allowInterruption: true

            variable: init:Topic.evaluationDate
            prompt: What is the evaluation date?
            entity: StringPrebuiltEntity

          - kind: Question
            id: question_ayZy0o
            interruptionPolicy:
              allowInterruption: true

            variable: init:Topic.therapyType
            prompt: What type of therapy evaluation is this?
            entity:
              kind: ClosedListEntityReference
              entityId: template-content.entity.Discipline

          - kind: ConditionGroup
            id: conditionGroup_Dwnhog
            conditions:
              - id: conditionItem_bQEUFl
                condition: =Topic.therapyType = 'template-content.entity.Discipline'.iNfx28
                actions:
                  - kind: SendActivity
                    id: sendActivity_5jICPJ
                    activity: "Understood — generating your OT Evaluation note. Using the information provided, here is the structured evaluation:"

                  - kind: BeginDialog
                    id: q5V5pZ
                    input:
                      binding:
                        text: "=\"Generate a Medicare-compliant SNF therapy evaluation/assessment note.\\nPatient: \" & Topic.patientName & \"\\nEvaluation Date: \" & Topic.evaluationDate & \"\\nTherapy Discipline: \" & Text(Topic.therapyType)"

                    dialog: template-content.action.TheraDocPTGenerateNote
                    output:
                      binding:
                        generatednote: Topic.generatednote

              - id: conditionItem_JtwKhe
                condition: =Topic.therapyType = 'template-content.entity.Discipline'.DuzBe7
                actions:
                  - kind: SendActivity
                    id: sendActivity_4AwdhG
                    activity: |-
                      Understood — generating your SLP Evaluation note. Using the information provided, here is the structured SLP Evaluation documentation:

                      ⚠️ CLINICAL REVIEW REQUIRED – Review and verify all content before entering into the EHR.

                  - kind: BeginDialog
                    id: bxwRTT
                    input:
                      binding:
                        text: |-
                          =Concatenate("You are a Medicare-compliant SLP (Speech-Language Pathology) documentation specialist for skilled nursing facilities. Generate a gold-standard ST Evaluation using ONLY the clinical data provided. Do NOT invent, assume, or hallucinate any clinical details.

                          PATIENT INFORMATION:
                          Patient Name: ", Topic.patientName, "
                          Evaluation Date: ", Topic.evaluationDate, "
                          Therapy Type: Speech-Language Pathology

                          GENERATE THE ST EVALUATION WITH THESE EXACT SECTIONS:

                          1. REASON FOR REFERRAL / DIAGNOSIS: Primary diagnosis (dysphagia, aphasia, cognitive-communication, dysarthria, etc.) and reason ST was ordered.

                          2. PRIOR LEVEL OF FUNCTION (PLOF): Patient's communication, swallowing, and cognitive-communication status prior to current illness.

                          3. SUBJECTIVE: Patient/caregiver report of current communication, swallowing difficulties, goals, and concerns.

                          4. ORAL MECHANISM EXAM:
                             - Oral Structure/Function: [lips, tongue, palate, dentition]
                             - Vocal Quality: [WNL, hoarse, wet, breathy]
                             - Resonance: [WNL, hypo/hypernasal]

                          5. COMMUNICATION ASSESSMENT:
                             - Language (Receptive): [comprehension of commands, yes/no reliability]
                             - Language (Expressive): [naming, sentence production, word retrieval]
                             - Speech Intelligibility: [percentage, contextual factors]
                             - Voice: [pitch, loudness, quality]
                             - Fluency: [WNL or describe disfluencies]
                             - Cognitive-Communication: [orientation, memory, attention, executive function]

                          6. DYSPHAGIA ASSESSMENT:
                             - Current Diet Level (IDDSI): [level 0-7]
                             - Current Liquid Level (IDDSI): [level 0-4]
                             - Clinical Swallow Evaluation Findings: [oral, pharyngeal, esophageal phases]
                             - Signs/Symptoms of Aspiration: [present/absent]
                             - Compensatory Strategies Trialed: [list]

                          7. STANDARDIZED TESTING: [e.g., BDAE, SLUMS, MoCA, FEES/MBS results — include scores]

                          8. ASSESSMENT: Skilled ST justification — safety risks, rehab potential, barriers, and medical necessity for continued ST.

                          9. PLAN OF CARE:
                             - Frequency and Duration: [e.g., 5x/week x 4 weeks]
                             - Short-Term Goals (2 weeks): [measurable, functional goals]
                             - Long-Term Goals (4-6 weeks): [discharge-level goals]
                             - Interventions: [list planned ST interventions]

                          STRICT RULES:
                          - Use only data from the patient information above
                          - Where clinical data is not provided, indicate [To be assessed]
                          - Every section must be clinically meaningful and support Medicare skilled level of care
                          - Do not include any preamble or explanation — output the evaluation only")

                    dialog: template-content.action.TheraDocPTGenerateNote
                    output:
                      binding:
                        generatednote: Topic.generatednote

              - id: conditionItem_izoBxC
                condition: =Topic.therapyType = 'template-content.entity.Discipline'.dxugsW
                actions:
                  - kind: SendActivity
                    id: sendActivity_Dr9Kfk
                    activity: |-
                      Understood — generating your PT Evaluation note. Using the information provided, here is the structured PT Evaluation documentation:

                      ⚠️ CLINICAL REVIEW REQUIRED – Review and verify all content before entering into the EHR.

                  - kind: BeginDialog
                    id: y7igjG
                    input:
                      binding:
                        text: |-
                          =Concatenate("You are a Medicare-compliant PT (Physical Therapy) documentation specialist for skilled nursing facilities. Generate a gold-standard PT Evaluation using ONLY the clinical data provided. Do NOT invent, assume, or hallucinate any clinical details.

                          PATIENT INFORMATION:
                          Patient Name: ", Topic.patientName, "
                          Evaluation Date: ", Topic.evaluationDate, "
                          Therapy Type: Physical Therapy

                          GENERATE THE PT EVALUATION WITH THESE EXACT SECTIONS:

                          1. REASON FOR REFERRAL / DIAGNOSIS: Primary diagnosis, relevant comorbidities, and reason PT was ordered.

                          2. PRIOR LEVEL OF FUNCTION (PLOF): Patient's functional status before the current illness/injury.

                          3. SUBJECTIVE: Patient/caregiver report of current complaints, pain, goals, and concerns.

                          4. OBJECTIVE:
                             - Cognition/Cooperation: [orientation, ability to follow commands]
                             - Pain: [location, intensity 0-10, behavior]
                             - ROM: [active/passive ROM for relevant joints]
                             - Strength (MMT): [relevant muscle groups and grades]
                             - Sensation: [intact/impaired, areas affected]
                             - Bed Mobility: [performance level with assist level]
                             - Transfers: [supine-sit, sit-stand, level with assist]
                             - Gait: [distance, device, assist level, gait deviations]
                             - Balance: [static/dynamic sitting/standing]
                             - Functional Mobility: [stairs, community ambulation if applicable]

                          5. STANDARDIZED TESTING: [e.g., TUG, Berg Balance Scale, 10MWT, 30-sec STS — include scores if available]

                          6. ASSESSMENT: Skilled PT justification — patient's rehab potential, barriers to progress, medical necessity, and why skilled PT is required.

                          7. PLAN OF CARE:
                             - Frequency and Duration: [e.g., 5x/week x 4 weeks]
                             - Short-Term Goals (2 weeks): [measurable, functional goals]
                             - Long-Term Goals (4-6 weeks): [discharge-level functional goals]
                             - Interventions: [list planned PT interventions]

                          STRICT RULES:
                          - Use only data from the patient information above
                          - Where clinical data is not provided, indicate [To be assessed]
                          - Every section must be clinically meaningful and support Medicare skilled level of care
                          - Do not include any preamble or explanation — output the evaluation only")

                    dialog: template-content.action.TheraDocPTGenerateNote
                    output:
                      binding:
                        generatednote: Topic.generatednote

            elseActions:
              - kind: SendActivity
                id: sendActivity_320n0N
                activity: |-
                  Understood — generating your OT Evaluation note. Using the information provided, here is the structured OT Evaluation documentation:

                  ⚠️ CLINICAL REVIEW REQUIRED – Review and verify all content before entering into the EHR.

          - kind: SendActivity
            id: sendActivity_OqAVYX
            activity: |-
              Thank you for providing the evaluation information. I'll help you create your evaluation assessment documentation.
              ⚠️ DRAFT ONLY — Review and edit this note before entering into the EHR. Do not include PHI or patient identifiers in any feedback.

      inputType: {}
      outputType: {}

