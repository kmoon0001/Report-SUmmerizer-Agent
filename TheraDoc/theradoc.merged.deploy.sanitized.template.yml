                  displayName: Strengthening
                - id: ROM
                  displayName: Range of motion
                - id: Therapeutic activities
                  displayName: Therapeutic activities
                - id: Modalities
                  displayName: Modalities
        - id: condition_ot
          condition: =Topic.therapyDiscipline = 'pcca_agent.topic.SessionClose.main.question_discipline'.OT
          actions:
          - kind: Question
            id: question_otTask
