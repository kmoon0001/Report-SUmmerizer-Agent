  displayName: Parse Brain Dump
  parentBotId: 855c7dda-ad19-4734-a8cd-df366c48f3d2
  shareContext: {}
  state: Active
  status: Active
  publisherUniqueName: DefaultPublisherorg3353a370
  schemaName: template-content.topic.ParseBrainDump
  dialog:
    modelDescription: Use this topic when a therapist provides messy, shorthand, or
      free-text session notes and wants them normalized into structured clinical fields.
      This topic should collect or confirm only the minimum missing context, such
      as discipline if needed, and then hand off to the configured Parse Brain Dump
      tool. The goal is to preserve clinical meaning, flag uncertainty, and reduce
      therapist typing. Keep follow-up questions focused and one at a time.
    beginDialog:
      kind: OnRecognizedIntent
      id: main
      intent: {}
      actions:
      - kind: Question
        id: question_0AYgig
        interruptionPolicy:
          allowInterruption: true
        variable: Topic.var_rawNote
        prompt: 'Please paste your full unstructured therapy note below. I will extract
          key clinical information and structure it into a defensible SNF therapy
          documentation format.


          Note: Do not include patient names, MRNs, or other PHI. Use placeholders
          like [Patient] if needed.'
        entity:
          kind: StringPrebuiltEntity
          sensitivityLevel: None
      - kind: BeginDialog
        id: cryAx3
        input:
          binding:
            text: =Topic.var_rawNote
        dialog: template-content.action.Untitled1
        output:
          binding:
            parseddata: Topic.parseddata
      - kind: SendActivity
        id: sendActivity_PM4QPH
        activity: '{Topic.parseddata}This is an AI-generated draft. Please review
          all extracted information carefully before entering into the EHR. Verify:
          patient functional status, treatment interventions, goals, and plan. Modify
          as needed to accurately reflect your clinical reasoning and skilled care.'
    inputType: {}
    outputType: {}
