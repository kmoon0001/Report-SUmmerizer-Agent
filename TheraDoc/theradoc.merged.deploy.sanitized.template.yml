            - id: Supervision
              displayName: Supervision
            - id: Min assist
              displayName: Min assist
            - id: Mod assist
              displayName: Mod assist
            - id: Max assist
              displayName: Max assist
            - id: Total assist
              displayName: Total assist
          displayName: SessionAssistLevel
      - kind: Question
        id: question_patientResponse
        interruptionPolicy:
          allowInterruption: true
        variable: init:Topic.patientResponse
        prompt: How did the patient respond?
        entity:
          kind: EmbeddedEntity
          sensitivityLevel: Sensitive
          definition:
            kind: ClosedListEntity
            items:
            - id: Tolerated well
              displayName: Tolerated well
            - id: Good participation
              displayName: Good participation
            - id: Moderate fatigue
              displayName: Moderate fatigue
            - id: Some resistance
              displayName: Some resistance
            - id: Significant fatigue
              displayName: Significant fatigue
            - id: Non-responsive
              displayName: Non-responsive
          displayName: PatientResponse
      - kind: Question
        id: question_goalProgress
        interruptionPolicy:
          allowInterruption: true
        variable: init:Topic.goalProgress
        prompt: How is the patient progressing toward goals?
        entity:
          kind: EmbeddedEntity
          sensitivityLevel: Sensitive
          definition:
            kind: ClosedListEntity
            items:
