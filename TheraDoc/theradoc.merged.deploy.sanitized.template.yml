                items:
                - id: Dressing
                  displayName: Dressing
                - id: Bathing
                  displayName: Bathing
                - id: Toileting
                  displayName: Toileting
                - id: Feeding
                  displayName: Feeding
                - id: Functional mobility
                  displayName: Functional mobility
                - id: Kitchen tasks
                  displayName: Kitchen/IADLs
                - id: Bed mobility
                  displayName: Bed mobility
        - id: condition_st
