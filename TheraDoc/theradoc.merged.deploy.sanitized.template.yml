      intent: {}
      actions:
      - kind: SendActivity
        id: sendActivity_FTkL32
        activity: "I'm sorry, it looks like something went wrong or the request timed\
          \ out. This can happen with longer documentation requests.\n\nHere's what\
          \ you can do:\n\u2022 Try rephrasing your request with less detail and submit\
          \ again.\n\u2022 Break your request into smaller steps (e.g., complete one\
          \ discipline at a time).\n\u2022 Refresh and start a new session if the\
          \ issue persists.\n\nAll AI-generated content requires clinical review before\
          \ EHR entry. Your previous input was not saved \u2014 please re-enter when\
          \ ready."
    inputType: {}
    outputType: {}
