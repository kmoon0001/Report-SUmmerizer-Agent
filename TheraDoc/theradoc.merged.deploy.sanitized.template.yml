- kind: DialogComponent
  managedProperties:
    isCustomizable: false
  displayName: Plan Of Care Generation
  parentBotId: 855c7dda-ad19-4734-a8cd-df366c48f3d2
  description: Elite clinical intelligence module specialized in [PlanOfCareGeneration].
    Executes high-precision data analysis grounded in CMS Chapter 15 and Ensign Services
    Ironclad Standards. Optimized for Dynamic Chaining.
  shareContext: {}
  state: Active
  status: Active
  publisherUniqueName: DefaultPublisherorg3353a370
  schemaName: template-content.topic.Plan Of Care Generation
  dialog:
    kind: AdaptiveDialog
    modeldescription: Elite clinical intelligence module specialized in [PlanOfCareGeneration].
      Executes high-precision data analysis grounded in CMS Chapter 15 and Ensign
      Services Ironclad Standards. Optimized for Dynamic Chaining.
    beginDialog:
      kind: OnRecognizedIntent
      id: main
      intent:
        displayName: Plan Of Care Generation
        includeInOnSelectIntent: true
        triggerQueries:
        - plan of care
        - generate plan of care
        - update plan of care
        - treatment plan
      actions:
      - kind: Question
        id: question_source
        alwaysPrompt: true
        variable: init:Topic.SourceChoice
        prompt: What is the plan of care based on?
        entity:
          kind: DynamicClosedListEntity
          items:
          - DisplayName: Evaluation / assessment
            Value: Evaluation
          - DisplayName: Recertification
            Value: Recertification
      - kind: Question
        id: question_discipline
        alwaysPrompt: true
        variable: init:Topic.DisciplineChoice
        prompt: Which discipline is this plan of care for?
        entity:
          kind: DynamicClosedListEntity
          items:
          - DisplayName: PT
            Value: PT
          - DisplayName: OT
            Value: OT
          - DisplayName: ST
            Value: ST
      - kind: Question
        id: question_goal_direction
        alwaysPrompt: true
        variable: init:Topic.GoalDirectionChoice
        prompt: What should the plan primarily emphasize?
        entity:
          kind: DynamicClosedListEntity
          items:
          - DisplayName: Functional mobility
            Value: FunctionalMobility
          - DisplayName: ADLs / UE / safety
            Value: ADLUESafety
          - DisplayName: Cognition / communication / swallow
            Value: CognitionCommunicationSwallow
          - DisplayName: Safety and discharge readiness
            Value: SafetyDischarge
          - DisplayName: Maintenance skilled therapy
            Value: Maintenance
      - kind: Question
        id: question_frequency
        alwaysPrompt: true
        variable: init:Topic.FrequencyChoice
        prompt: What frequency direction best fits?
        entity:
          kind: DynamicClosedListEntity
          items:
          - DisplayName: Standard skilled therapy frequency
            Value: Standard
          - DisplayName: Increased intensity needed
            Value: Increased
          - DisplayName: Taper toward discharge
            Value: Taper
          - DisplayName: Maintenance frequency
            Value: Maintenance
      - kind: Question
        id: question_plan_details
        alwaysPrompt: true
        variable: init:Topic.PlanDetailText
        prompt: Enter the custom plan-of-care details only, such as problem list,
          measurable goals, recommended frequency and duration, precautions, caregiver
          training, or discharge planning needs.
        entity: StringPrebuiltEntity
      - kind: InvokeFlowAction
        id: invoke_generate_plan_of_care
        input:
          binding:
            text: '=Concatenate("Workflow: Plan of Care Generation", "\nSource: ",
              Text(Topic.SourceChoice), "\nDiscipline: ", Text(Topic.DisciplineChoice),
              "\nGoal Direction: ", Text(Topic.GoalDirectionChoice), "\nFrequency
              Direction: ", Text(Topic.FrequencyChoice), "\nPlan Details: ", Topic.PlanDetailText)'
        output:
          binding:
            generatednote: Topic.GeneratedNote
        flowId: 58fc66ed-762f-f111-88b4-000d3a37eba2
      - kind: SetVariable
        id: set_last_generated_note
        variable: Global.LastGeneratedNote
        value: =Topic.GeneratedNote
      - kind: SendActivity
        id: send_generated_plan_of_care
        activity: '{Topic.GeneratedNote}'
    inputType: {}
    outputType: {}
