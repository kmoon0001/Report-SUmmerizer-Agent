        id: send_confirmation
        activity: "\u2705 Session note generated. \u26A0\uFE0F DRAFT ONLY \u2014 Review\
          \ and edit before entering into the EHR.\n\n{Topic.generatednote}"
      - kind: BeginDialog
        id: audit_option
        dialog: pcca_agent.topic.AuditExistingNote
