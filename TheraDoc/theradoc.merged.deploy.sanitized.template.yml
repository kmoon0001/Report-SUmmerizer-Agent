              displayName: Completed as planned
            - id: Partial - patient fatigue
              displayName: Partial - patient fatigue
            - id: Partial - medical appointment
              displayName: Partial - medical appointment
            - id: Cancelled - no show
              displayName: Cancelled - no show
            - id: Cancelled - family
              displayName: Cancelled - family
