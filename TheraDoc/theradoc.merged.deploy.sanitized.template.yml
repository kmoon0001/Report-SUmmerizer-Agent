              displayName: On track
            - id: Progressing slowly
              displayName: Progressing slowly
            - id: Not progressing / plateau
              displayName: Not progressing / plateau
            - id: Goal met
              displayName: Goal met
            - id: Regressed
              displayName: Regressed
      - kind: Question
        id: question_pqADAv
        interruptionPolicy:
          allowInterruption: true
        variable: init:Topic.certPeriodWeek
        prompt: Which week of the certification period does this visit fall in?
        entity:
          kind: EmbeddedEntity
          sensitivityLevel: Sensitive
          definition:
            kind: ClosedListEntity
            items:
            - id: Week 1
              displayName: Week 1
            - id: Week 2
              displayName: Week 2
            - id: Week 3
              displayName: Week 3
            - id: Week 4
              displayName: Week 4
            - id: Week 5+
              displayName: Week 5+
            - id: End of cert / recert due
              displayName: End of cert / recert due
      - kind: ConditionGroup
        id: validation_check
        conditions:
        - id: validation_passed
          condition: =And(!IsBlank(Topic.primaryMobilityTask), !IsBlank(Topic.assistLevel),
            !IsBlank(Topic.goalStatus), !IsBlank(Topic.certPeriodWeek))
          displayName: allRequiredFieldsPresent
          actions:
          - kind: SearchAndSummarizeContent
            id: BYx599
            userInput: "=Concatenate(\"You are a clinical documentation specialist\
              \ generating SNF therapy notes that meet the GOLD STANDARD for PT Daily\
              \ Note. REQUIRED SECTIONS \u2014 include ALL of the following, in this\
              \ order, every time: 1. Discipline/Date/Therapist header 2. Diagnosis\
              \ (treatment diagnosis only \u2014 NOT long-term goals or cert dates)\
              \ 3. Subjective: Patient report of pain (0-10), tolerance, complaints\
              \ 4. Objective: Treatment performed (specific interventions, reps, sets,\
              \ weight, distance, time), Assist level with descriptor, Skilled interventions\
              \ used (cueing, guarding, hands-on facilitation) 5. Assessment: Patient\
              \ response to treatment, Skilled justification for continued PT, Progress\
              \ toward functional goal (measurable, referenced to baseline) 6. Plan:\
              \ Next session plan, frequency confirmation, any precautions 7. Therapist\
              \ signature line STRICT RULES: NEVER include plan of care goals, certification\
              \ dates, frequency/duration of the episode, or diagnoses lists. NEVER\
              \ include evaluation-level content (PLOF, rehab potential, LTG/STG).\
              \ EVERY section must be populated with patient-specific data from the\
              \ intake variables \u2014 never leave a section generic or as a placeholder.\
              \ Assist levels must follow standard terminology: Dependent, Max A,\
              \ Mod A, Min A, Supervision/Contact Guard, Modified Independent, Independent\
              \ \u2014 always include cueing type. Pain must be rated 0-10 NRS scale.\
              \ All interventions must be named specifically (not 'exercises performed').\
              \ Skilled justification must appear in the Assessment \u2014 one sentence\
              \ minimum explaining why skilled therapy is medically necessary today.\
              \ Output the note as clean, readable plain text. No markdown headers.\
              \ Patient data: Primary mobility task: \", Text(Topic.primaryMobilityTask),\
              \ \". Assist level: \", Text(Topic.assistLevel), \". Goal status: \"\
              , Text(Topic.goalStatus), \". Cert period week: \", Text(Topic.certPeriodWeek),\
              \ \".\")"
          - kind: SendActivity
            id: sendActivity_tUY0Ag
            activity: "\u26A0\uFE0F DRAFT ONLY \u2014 Review and edit this note before\
              \ entering into the EHR. Do not include PHI or patient identifiers in\
              \ any feedback.\n\nNote: Your context has been preserved. You can:\n\
              \u2022 Retry: Say 'try again' to regenerate\n\u2022 Edit manually: Say\
              \ 'edit' to modify specific sections\n\u2022 Start over: Say 'start\
              \ over' to begin a new note\n\u2022 Continue: Say 'continue' to proceed\
              \ to audit"
          - kind: BeginDialog
            id: M4puPD
            input:
              binding:
                incomingDiscipline: ="PT"
                incomingDocumentType: ="Daily Note"
            dialog: pcca_agent.topic.AuditExistingNote
        - id: validation_failed
          condition: =Or(IsBlank(Topic.primaryMobilityTask), IsBlank(Topic.assistLevel),
            IsBlank(Topic.goalStatus), IsBlank(Topic.certPeriodWeek))
          displayName: missingRequiredFields
          actions:
          - kind: SendActivity
            id: sendActivity_validationError
            activity: "Some required information is missing. Your progress has been\
              \ saved.\n\nPlease provide the missing details:\n\u2022 Primary mobility\
              \ task\n\u2022 Assist level\n\u2022 Goal status\n\u2022 Certification\
              \ period week\n\nOr say 'start over' to begin a new note."
