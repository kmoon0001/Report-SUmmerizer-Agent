- kind: DialogComponent
  managedProperties:
    isCustomizable: false
  displayName: ST Daily Note Intake
  parentBotId: 855c7dda-ad19-4734-a8cd-df366c48f3d2
  description: Elite clinical intelligence module specialized in [STDailyNoteIntake].
    Executes high-precision data analysis grounded in CMS Chapter 15 and Ensign Services
    Ironclad Standards. Optimized for Dynamic Chaining.
  shareContext: {}
  state: Active
  status: Active
  publisherUniqueName: DefaultPublisherorg3353a370
  schemaName: template-content.topic.ST Daily Note Intake
  dialog:
    kind: AdaptiveDialog
    modeldescription: Elite clinical intelligence module specialized in [STDailyNoteIntake].
      Executes high-precision data analysis grounded in CMS Chapter 15 and Ensign
      Services Ironclad Standards. Optimized for Dynamic Chaining.
    beginDialog:
      kind: OnRecognizedIntent
      id: main
      intent: {}
      actions:
      - kind: Question
        id: question_SOdqr0
        interruptionPolicy:
          allowInterruption: true
        variable: init:Topic.primarySpeechConcern
        prompt: Which speech, swallowing, or cognitive-communication area was the
          primary focus today?
        entity:
          kind: EmbeddedEntity
          sensitivityLevel: Sensitive
          definition:
            kind: ClosedListEntity
            items:
            - id: Dysphagia
              displayName: Dysphagia (swallowing)
            - id: Aphasia
              displayName: Aphasia (language)
            - id: Cognitive-communication
              displayName: Cognitive-communication
            - id: Voice
              displayName: Voice
            - id: Fluency
              displayName: Fluency/stuttering
            - id: Articulation
              displayName: Articulation/phonology
            - id: Memory
              displayName: Memory/processing
            - id: Other
              displayName: Other
          displayName: PrimarySpeechConcern
      - kind: Question
        id: question_pDXCGV
        interruptionPolicy:
          allowInterruption: true
        variable: Topic.sessionDetails
        prompt: 'Briefly describe: what specific tasks were practiced, patient''s
          response, cueing level needed, and any functional gains or observations.'
        entity:
          kind: StringPrebuiltEntity
          sensitivityLevel: None
      - kind: BeginDialog
        id: jIcYp1
        input:
          binding:
            text: "=Concatenate(\"You are a Medicare-compliant SLP (Speech-Language\
              \ Pathology) documentation specialist for skilled nursing facilities.\
              \ Generate a gold-standard ST Daily Note using ONLY the clinical data\
              \ provided. Do NOT invent, assume, or hallucinate any clinical details.\n\
              \nCLINICAL SESSION DATA:\nPrimary Speech/Communication Concern: \",\
              \ Topic.primarySpeechConcern, \"\nSession description: Elite clinical\
              \ intelligence module specialized in [STDailyNoteIntake]. Executes high-precision\
              \ data analysis grounded in CMS Chapter 15 and Ensign Services Ironclad\
              \ Standards. Optimized for Dynamic Chaining.\n\nGENERATE THE ST DAILY\
              \ NOTE WITH THESE EXACT SECTIONS:\n\n1. SKILLED SERVICE: State the skilled\
              \ ST service provided and medical necessity.\n\n2. SUBJECTIVE: Patient/caregiver\
              \ report on communication, swallowing, cognition, or participation.\n\
              \n3. OBJECTIVE:\n   - Primary Treatment Area: [speech/language/swallowing/cognition]\n\
              \   - Specific Tasks Practiced: [list tasks from session]\n   - Performance\
              \ Level/Accuracy: [percentage or descriptive level]\n   - Diet/Liquid\
              \ Level (if applicable): [IDDSI level or 'N/A']\n   - Compensatory Strategies\
              \ Used: [list or 'none']\n   - Cueing Required: [type and amount]\n\n\
              4. ASSESSMENT: Skilled justification \u2014 document progress toward\
              \ goals, clinical reasoning, safety considerations, and medical necessity\
              \ for continued ST.\n\n5. PLAN: Next session focus, home program recommendations,\
              \ family/caregiver training, and goal updates.\n\nSTRICT RULES:\n- Use\
              \ only data from the session description above\n- Every section must\
              \ be clinically meaningful and specific\n- Never use vague filler language\n\
              - Note must justify Medicare skilled level of care\n- Do not include\
              \ any preamble or explanation \u2014 output the note only\")"
        dialog: pcca_agent.action.TheraDoc-PTGenerateNote
        output:
          binding:
            generatednote: Topic.generatednote
      - kind: SendActivity
        id: sendActivity_3Kw6JO
        activity: "{Topic.generatednote}Thank you. Your ST daily note intake is complete.\
          \ Your responses have been recorded and will be used to generate the speech-language\
          \ pathology documentation. \u26A0\uFE0F DRAFT ONLY \u2014 Review and edit\
          \ this note before entering into the EHR. Do not include PHI or patient\
          \ identifiers in any feedback."
    inputType: {}
    outputType: {}
