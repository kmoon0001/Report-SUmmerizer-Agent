  schemaName: template-content.topic.EvaluationAssessmentIntake
  dialog:
    modelDescription: Collects patient information for evaluation and assessment intake
      across SLP, OT, and PT disciplines. Gathers patient name, evaluation date, and
      therapy type to initiate the assessment workflow.
    beginDialog:
      kind: OnRecognizedIntent
      id: main
      intent: {}
      actions:
      - kind: Question
        id: question_h4NpWb
        interruptionPolicy:
          allowInterruption: true
        variable: Topic.patientName
        prompt: What is the patient's name?
        entity:
          kind: StringPrebuiltEntity
          sensitivityLevel: None
      - kind: Question
        id: question_RvOsHM
        interruptionPolicy:
          allowInterruption: true
        variable: init:Topic.evaluationDate
        prompt: What is the evaluation date?
        entity: StringPrebuiltEntity
      - kind: Question
        id: question_ayZy0o
        interruptionPolicy:
          allowInterruption: true
        variable: init:Topic.therapyType
        prompt: What type of therapy evaluation is this?
        entity:
          kind: ClosedListEntityReference
          entityId: template-content.entity.Discipline
      - kind: ConditionGroup
        id: conditionGroup_Dwnhog
        conditions:
        - id: conditionItem_bQEUFl
          condition: =Topic.therapyType = 'template-content.entity.Discipline'.iNfx28
          actions:
          - kind: SendActivity
            id: sendActivity_5jICPJ
            activity: "Understood \u2014 generating your OT Evaluation note. Using\
              \ the information provided, here is the structured evaluation:"
          - kind: BeginDialog
            id: q5V5pZ
            input:
              binding:
                text: '="Generate a Medicare-compliant SNF therapy evaluation/assessment
                  note.\nPatient: " & Topic.patientName & "\nEvaluation Date: " &
                  Topic.evaluationDate & "\nTherapy Discipline: " & Text(Topic.therapyType)'
            dialog: template-content.action.TheraDocPTGenerateNote
            output:
              binding:
                generatednote: Topic.generatednote
        - id: conditionItem_JtwKhe
          condition: =Topic.therapyType = 'template-content.entity.Discipline'.DuzBe7
          actions:
          - kind: SendActivity
            id: sendActivity_4AwdhG
            activity: "Understood \u2014 generating your SLP Evaluation note. Using\
              \ the information provided, here is the structured SLP Evaluation documentation:\n\
              \n\u26A0\uFE0F CLINICAL REVIEW REQUIRED \u2013 Review and verify all\
              \ content before entering into the EHR."
          - kind: BeginDialog
            id: bxwRTT
            input:
              binding:
                text: "=Concatenate(\"You are a Medicare-compliant SLP (Speech-Language\
                  \ Pathology) documentation specialist for skilled nursing facilities.\
                  \ Generate a gold-standard ST Evaluation using ONLY the clinical\
                  \ data provided. Do NOT invent, assume, or hallucinate any clinical\
                  \ details.\n\nPATIENT INFORMATION:\nPatient Name: \", Topic.patientName,\
                  \ \"\nEvaluation Date: \", Topic.evaluationDate, \"\nTherapy Type:\
                  \ Speech-Language Pathology\n\nGENERATE THE ST EVALUATION WITH THESE\
                  \ EXACT SECTIONS:\n\n1. REASON FOR REFERRAL / DIAGNOSIS: Primary\
                  \ diagnosis (dysphagia, aphasia, cognitive-communication, dysarthria,\
                  \ etc.) and reason ST was ordered.\n\n2. PRIOR LEVEL OF FUNCTION\
                  \ (PLOF): Patient's communication, swallowing, and cognitive-communication\
                  \ status prior to current illness.\n\n3. SUBJECTIVE: Patient/caregiver\
                  \ report of current communication, swallowing difficulties, goals,\
                  \ and concerns.\n\n4. ORAL MECHANISM EXAM:\n   - Oral Structure/Function:\
                  \ [lips, tongue, palate, dentition]\n   - Vocal Quality: [WNL, hoarse,\
                  \ wet, breathy]\n   - Resonance: [WNL, hypo/hypernasal]\n\n5. COMMUNICATION\
                  \ ASSESSMENT:\n   - Language (Receptive): [comprehension of commands,\
                  \ yes/no reliability]\n   - Language (Expressive): [naming, sentence\
                  \ production, word retrieval]\n   - Speech Intelligibility: [percentage,\
                  \ contextual factors]\n   - Voice: [pitch, loudness, quality]\n\
                  \   - Fluency: [WNL or describe disfluencies]\n   - Cognitive-Communication:\
                  \ [orientation, memory, attention, executive function]\n\n6. DYSPHAGIA\
                  \ ASSESSMENT:\n   - Current Diet Level (IDDSI): [level 0-7]\n  \
                  \ - Current Liquid Level (IDDSI): [level 0-4]\n   - Clinical Swallow\
                  \ Evaluation Findings: [oral, pharyngeal, esophageal phases]\n \
                  \  - Signs/Symptoms of Aspiration: [present/absent]\n   - Compensatory\
                  \ Strategies Trialed: [list]\n\n7. STANDARDIZED TESTING: [e.g.,\
                  \ BDAE, SLUMS, MoCA, FEES/MBS results \u2014 include scores]\n\n\
                  8. ASSESSMENT: Skilled ST justification \u2014 safety risks, rehab\
                  \ potential, barriers, and medical necessity for continued ST.\n\
                  \n9. PLAN OF CARE:\n   - Frequency and Duration: [e.g., 5x/week\
                  \ x 4 weeks]\n   - Short-Term Goals (2 weeks): [measurable, functional\
                  \ goals]\n   - Long-Term Goals (4-6 weeks): [discharge-level goals]\n\
                  \   - Interventions: [list planned ST interventions]\n\nSTRICT RULES:\n\
                  - Use only data from the patient information above\n- Where clinical\
                  \ data is not provided, indicate [To be assessed]\n- Every section\
                  \ must be clinically meaningful and support Medicare skilled level\
                  \ of care\n- Do not include any preamble or explanation \u2014 output\
                  \ the evaluation only\")"
            dialog: template-content.action.TheraDocPTGenerateNote
            output:
              binding:
                generatednote: Topic.generatednote
        - id: conditionItem_izoBxC
          condition: =Topic.therapyType = 'template-content.entity.Discipline'.dxugsW
          actions:
          - kind: SendActivity
            id: sendActivity_Dr9Kfk
            activity: "Understood \u2014 generating your PT Evaluation note. Using\
              \ the information provided, here is the structured PT Evaluation documentation:\n\
              \n\u26A0\uFE0F CLINICAL REVIEW REQUIRED \u2013 Review and verify all\
              \ content before entering into the EHR."
          - kind: BeginDialog
            id: y7igjG
            input:
              binding:
                text: "=Concatenate(\"You are a Medicare-compliant PT (Physical Therapy)\
                  \ documentation specialist for skilled nursing facilities. Generate\
                  \ a gold-standard PT Evaluation using ONLY the clinical data provided.\
                  \ Do NOT invent, assume, or hallucinate any clinical details.\n\n\
                  PATIENT INFORMATION:\nPatient Name: \", Topic.patientName, \"\n\
                  Evaluation Date: \", Topic.evaluationDate, \"\nTherapy Type: Physical\
                  \ Therapy\n\nGENERATE THE PT EVALUATION WITH THESE EXACT SECTIONS:\n\
                  \n1. REASON FOR REFERRAL / DIAGNOSIS: Primary diagnosis, relevant\
                  \ comorbidities, and reason PT was ordered.\n\n2. PRIOR LEVEL OF\
                  \ FUNCTION (PLOF): Patient's functional status before the current\
                  \ illness/injury.\n\n3. SUBJECTIVE: Patient/caregiver report of\
                  \ current complaints, pain, goals, and concerns.\n\n4. OBJECTIVE:\n\
                  \   - Cognition/Cooperation: [orientation, ability to follow commands]\n\
                  \   - Pain: [location, intensity 0-10, behavior]\n   - ROM: [active/passive\
                  \ ROM for relevant joints]\n   - Strength (MMT): [relevant muscle\
                  \ groups and grades]\n   - Sensation: [intact/impaired, areas affected]\n\
                  \   - Bed Mobility: [performance level with assist level]\n   -\
                  \ Transfers: [supine-sit, sit-stand, level with assist]\n   - Gait:\
                  \ [distance, device, assist level, gait deviations]\n   - Balance:\
                  \ [static/dynamic sitting/standing]\n   - Functional Mobility: [stairs,\
                  \ community ambulation if applicable]\n\n5. STANDARDIZED TESTING:\
                  \ [e.g., TUG, Berg Balance Scale, 10MWT, 30-sec STS \u2014 include\
                  \ scores if available]\n\n6. ASSESSMENT: Skilled PT justification\
                  \ \u2014 patient's rehab potential, barriers to progress, medical\
                  \ necessity, and why skilled PT is required.\n\n7. PLAN OF CARE:\n\
                  \   - Frequency and Duration: [e.g., 5x/week x 4 weeks]\n   - Short-Term\
                  \ Goals (2 weeks): [measurable, functional goals]\n   - Long-Term\
                  \ Goals (4-6 weeks): [discharge-level functional goals]\n   - Interventions:\
                  \ [list planned PT interventions]\n\nSTRICT RULES:\n- Use only data\
                  \ from the patient information above\n- Where clinical data is not\
                  \ provided, indicate [To be assessed]\n- Every section must be clinically\
                  \ meaningful and support Medicare skilled level of care\n- Do not\
                  \ include any preamble or explanation \u2014 output the evaluation\
                  \ only\")"
            dialog: template-content.action.TheraDocPTGenerateNote
            output:
              binding:
                generatednote: Topic.generatednote
        elseActions:
        - kind: SendActivity
          id: sendActivity_320n0N
          activity: "Understood \u2014 generating your OT Evaluation note. Using the\
            \ information provided, here is the structured OT Evaluation documentation:\n\
            \n\u26A0\uFE0F CLINICAL REVIEW REQUIRED \u2013 Review and verify all content\
            \ before entering into the EHR."
      - kind: SendActivity
        id: sendActivity_OqAVYX
        activity: "Thank you for providing the evaluation information. I'll help you\
          \ create your evaluation assessment documentation.\n\u26A0\uFE0F DRAFT ONLY\
          \ \u2014 Review and edit this note before entering into the EHR. Do not\
          \ include PHI or patient identifiers in any feedback."
    inputType: {}
    outputType: {}
