- kind: DialogComponent
  managedProperties:
    isCustomizable: false
  displayName: Audit Existing Note
  parentBotId: 855c7dda-ad19-4734-a8cd-df366c48f3d2
  shareContext: {}
  state: Active
  status: Active
  publisherUniqueName: DefaultPublisherorg3353a370
  schemaName: template-content.topic.AuditExistingNote
  dialog:
    modelDescription: Use this topic when a therapist wants an existing PT, OT, or
      ST note reviewed for skilled language, clarity, completeness, measurable function,
      and compliance risk. This topic should collect the note text and only the minimum
      missing context, such as discipline if needed, then hand off to the configured
      Audit Note tool. Keep intake concise and do not ask redundant questions.
    beginDialog:
      kind: OnRecognizedIntent
      id: main
      intent: {}
      actions:
      - kind: Question
        id: question_QXTtJv
        interruptionPolicy:
          allowInterruption: true
        variable: Topic.incomingDiscipline
        prompt: What therapy discipline wrote this note? (Select one)
        entity: StringPrebuiltEntity
      - kind: ConditionGroup
        id: conditionGroup_4WLBs7
        conditions:
        - id: conditionItem_3ne3za
          condition: =Topic.incomingDiscipline = "PT"
        - id: conditionItem_AxMk7H
          condition: =Topic.incomingDiscipline = "OT"
        - id: conditionItem_TYoRes
          condition: =Topic.incomingDiscipline = "SLP"
        - id: conditionItem_mWFwXl
          condition: =Topic.incomingDiscipline = "PT"
      - kind: Question
        id: question_fqTOVO
        interruptionPolicy:
          allowInterruption: true
        variable: Topic.incomingDocumentType
        prompt: What type of note is this? (Select one)
        entity: StringPrebuiltEntity
      - kind: ConditionGroup
        id: conditionGroup_iwM7Fj
        conditions:
        - id: conditionItem_Gzoq18
          condition: =Topic.incomingDocumentType = "Daily Note"
        - id: conditionItem_dRxQsb
          condition: =Topic.incomingDocumentType = "Progress Note"
        - id: conditionItem_IWRW7l
          condition: =Topic.incomingDocumentType = "Evaluation"
        - id: conditionItem_7tty11
          condition: =Topic.incomingDocumentType = "Recertification"
        - id: conditionItem_qk5OS3
          condition: =Topic.incomingDocumentType = "Discharge Summary"
      - kind: Question
        id: question_TUFd0X
        interruptionPolicy:
          allowInterruption: true
        variable: Topic.existingNoteText
        prompt: 'Please paste the SNF therapy note you would like audited for compliance
          risk. Note: Do not include patient names, MRNs, or other PHI. Use placeholders
          like [Patient] if needed.'
        entity:
          kind: StringPrebuiltEntity
          sensitivityLevel: None
      - kind: BeginDialog
        id: DAT0JQ
        input:
          binding:
            text: =Text(Topic.existingNoteText)
            text_1: =Topic.incomingDocumentType
            text_2: =Topic.incomingDiscipline
        dialog: template-content.action.Untitled
        output:
          binding:
            auditresult: Topic.auditresult
      - kind: SendActivity
        id: sendActivity_xasWpa
        activity: '{Topic.auditresult}

          This is an AI-generated compliance audit. Review all flagged items carefully.
          Final compliance determination must be made by a qualified clinician or
          compliance officer.'
    inputType:
      properties:
        incomingDiscipline:
          displayName: incomingDiscipline
          type: String
        incomingDocumentType:
          displayName: incomingDocumentType
          type: String
    outputType:
      properties:
        existingNoteText:
          displayName: existingNoteText
          type:
            kind: String
            sensitivityLevel: Sensitive
- kind: DialogComponent
  managedProperties:
    isCustomizable: false
  displayName: Documentation Guidance
  parentBotId: 855c7dda-ad19-4734-a8cd-df366c48f3d2
  shareContext: {}
  state: Active
  status: Active
  publisherUniqueName: DefaultPublisherorg3353a370
  schemaName: template-content.topic.DocumentationGuidance
  dialog:
    modelDescription: Use this topic when a therapist asks what information is needed
      for a PT, OT, or ST note, how to write skilled SNF documentation, what makes
      a note compliant, what format to use, or how to document specific therapy situations.
      Answer using the agent's configured knowledge sources for documentation standards,
      compliance guidance, formatting conventions, and approved examples. Keep answers
      concise, direct, and clinician-friendly. Prefer knowledge-based guidance over
      tool use unless the user explicitly wants an actual note, audit, parse, or handoff
      generated.
    beginDialog:
      kind: OnRecognizedIntent
      id: main
      intent: {}
      actions:
      - kind: SendActivity
        id: sendActivity_QVdjkP
        activity: "Here are SNF therapy documentation standards to guide your clinical\
          \ notes:\n\n**Cueing Levels** \u2014 Document the level of verbal or tactile\
          \ cues provided:\n\u2022 Independent (I): No cues needed\n\u2022 Supervision\
          \ (S): Stand-by, no hands-on\n\u2022 Modified Independent (ModI): Uses device/compensation,\
          \ no assist\n\u2022 Contact Guard Assist (CGA): Therapist hand contact,\
          \ no force\n\u2022 Minimal Assist (MinA): Patient performs 75%+ of task\n\
          \u2022 Moderate Assist (ModA): Patient performs 50\u201374% of task\n\u2022\
          \ Maximum Assist (MaxA): Patient performs 25\u201349% of task\n\u2022 Total\
          \ Assist (TA): Patient performs less than 25%\n\n**Skilled Language Requirements**\
          \ \u2014 Every note must include:\n\u2022 Clinical reason skilled therapy\
          \ is required (not maintenance)\n\u2022 Patient response to treatment and\
          \ measurable progress\n\u2022 Functional goals with objective baselines\
          \ and targets\n\u2022 Safety considerations or precautions addressed\n\u2022\
          \ Plan and frequency of continued treatment\n\n**What to avoid:** Unskilled\
          \ language (e.g., \"patient tolerated well\"), non-measurable progress,\
          \ missing assist levels, or absent functional connection.\n\nWould you like\
          \ me to draft, revise, or audit a specific note using these standards?"
    inputType: {}
    outputType: {}
