              ", Text(Topic.primaryTask), ". Assist level: ", Text(Topic.assistLevel),
              ". Patient response: ", Text(Topic.patientResponse), ". Goal progress:
              ", Text(Topic.goalProgress), ". Notes: ", Topic.sessionNotes)'
        dialog: pcca_agent.action.TheraDoc-PTGenerateNote
        output:
          binding:
            generatednote: Topic.generatednote
