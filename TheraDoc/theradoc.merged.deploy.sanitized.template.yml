      - kind: Question
        id: question_7PmBEP
        interruptionPolicy:
          allowInterruption: true
        variable: Topic.assistLevel
        prompt: What was the patient's assist level during the primary task?
        entity:
          kind: EmbeddedEntity
          sensitivityLevel: Sensitive
          definition:
            kind: ClosedListEntity
            items:
            - id: Independent
              displayName: Independent
            - id: Modified independent
              displayName: Modified independent
            - id: Supervision / setup assist
              displayName: Supervision / setup assist
            - id: Minimum assist (75%+ effort)
              displayName: Minimum assist (75%+ effort)
            - id: Moderate assist (50-74% effort)
              displayName: Moderate assist (50-74% effort)
            - id: Maximum assist (25-49% effort)
              displayName: Maximum assist (25-49% effort)
            - id: Total assist / dependent
              displayName: Total assist / dependent
      - kind: Question
        id: question_YWNyE0
        interruptionPolicy:
          allowInterruption: true
        variable: init:Topic.goalStatus
        prompt: How is the patient progressing toward goals this visit?
        entity:
          kind: EmbeddedEntity
          sensitivityLevel: Sensitive
          definition:
            kind: ClosedListEntity
            items:
