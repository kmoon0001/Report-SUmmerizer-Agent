        id: combine_task
        conditions:
        - id: combine_pt
          condition: =Topic.therapyDiscipline = 'pcca_agent.topic.SessionClose.main.question_discipline'.PT
          actions:
          - kind: SetVariable
            id: set_primaryTask
            variable: Topic.primaryTask
            value: =Topic.primaryTaskPT
        - id: combine_ot
          condition: =Topic.therapyDiscipline = 'pcca_agent.topic.SessionClose.main.question_discipline'.OT
          actions:
          - kind: SetVariable
            id: set_primaryTask_ot
