            kind: ClosedListEntity
            items:
            - id: Daily Note
              displayName: Daily Note
            - id: Progress Note
              displayName: Progress Note
            - id: Evaluation
              displayName: Evaluation
            - id: Discharge
              displayName: Discharge
          displayName: SessionNoteType
      - kind: Question
        id: question_sessionOutcome
        interruptionPolicy:
          allowInterruption: true
        variable: init:Topic.sessionOutcome
        prompt: How did the session go?
        entity:
          kind: EmbeddedEntity
          sensitivityLevel: Sensitive
          definition:
