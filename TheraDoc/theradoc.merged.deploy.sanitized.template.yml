    beginDialog:
      kind: OnRecognizedIntent
      id: main
      intent: {}
      actions:
      - kind: Question
        id: question_3NJBJg
        interruptionPolicy:
          allowInterruption: true
        variable: init:Topic.patientName
        prompt: What is the patient's name?
        entity: StringPrebuiltEntity
      - kind: SendActivity
        id: sendActivity_iziDCA
        activity: Thank you. I'll help you create the progress note documentation.
      - kind: Question
        id: question_lQ6JdB
        interruptionPolicy:
          allowInterruption: true
        variable: init:Topic.therapyGoals
        prompt: What are the patient's current therapy goals?
        entity: StringPrebuiltEntity
      - kind: Question
        id: question_PlEWtD
        interruptionPolicy:
          allowInterruption: true
        variable: init:Topic.sessionActivities
        prompt: What activities or interventions were performed during this session?
        entity:
          kind: EmbeddedEntity
          sensitivityLevel: Sensitive
          definition:
            kind: ClosedListEntity
            items:
            - id: Gait training
              displayName: Gait training
            - id: Transfer training
              displayName: Transfer training
            - id: Balance activities
              displayName: Balance activities
            - id: Strengthening exercises
              displayName: Strengthening exercises
            - id: Range of motion
              displayName: Range of motion
            - id: Therapeutic activities
              displayName: Therapeutic activities
            - id: ADL training
              displayName: ADL training
            - id: Modalities
              displayName: Modalities
            - id: Other
              displayName: Other
          displayName: SessionActivities
      - kind: Question
        id: question_MpmsBZ
        interruptionPolicy:
          allowInterruption: true
        variable: Topic.patientResponse
        prompt: How did the patient respond to the session?
        entity:
          kind: EmbeddedEntity
          definition:
            kind: ClosedListEntity
            items:
            - id: Tolerated well
              displayName: Tolerated well
            - id: Cooperative
              displayName: Cooperative
            - id: Fatigued
              displayName: Fatigued
            - id: Resistant
              displayName: Resistant
            - id: Other
              displayName: Other
          displayName: EmbeddedEntity-YYrnLW
      - kind: ConditionGroup
        id: conditionGroup_tc5c3U
        conditions:
        - id: conditionItem_swQ3xM
          condition: =Topic.patientResponse = 'pcca_agent.topic.ProgressNoteIntake.main.question_MpmsBZ'.Other
          actions:
          - kind: Question
            id: question_AlcjNX
            interruptionPolicy:
              allowInterruption: true
            variable: Topic.patientResponseOtherDetail
            prompt: Please briefly describe the patient's response.
            entity:
              kind: StringPrebuiltEntity
              sensitivityLevel: None
      - kind: Question
        id: question_q9VPT0
        interruptionPolicy:
          allowInterruption: true
        variable: init:Topic.progressUpdateStatus
        prompt: How is the patient progressing toward therapy goals?
        entity:
          kind: EmbeddedEntity
          definition:
            kind: ClosedListEntity
            items:
            - id: Progressing
              displayName: Progressing
            - id: Maintained
              displayName: Maintained
            - id: Regressed
              displayName: Regressed
            - id: Other
              displayName: Other
          displayName: EmbeddedEntity-i5fXd8
      - kind: ConditionGroup
        id: conditionGroup_AhecFG
        conditions:
        - id: conditionItem_fIQgVA
          condition: =Topic.progressUpdateStatus = 'pcca_agent.topic.ProgressNoteIntake.main.question_q9VPT0'.Regressed
          actions:
          - kind: Question
            id: question_UCls0U
            interruptionPolicy:
              allowInterruption: true
            variable: init:Topic.progressUpdateDetail
            prompt: Briefly describe the regression or barriers noted.
            entity: StringPrebuiltEntity
        - id: conditionItem_x3w1FJ
          condition: =Topic.progressUpdateStatus = 'pcca_agent.topic.ProgressNoteIntake.main.question_q9VPT0'.Other
          actions:
          - kind: Question
            id: question_SprxeG
            interruptionPolicy:
              allowInterruption: true
            variable: init:Topic.progressUpdateDetailOther
            prompt: Briefly describe the patient's progress.
            entity: StringPrebuiltEntity
      - kind: Question
        id: question_niNfTR
        interruptionPolicy:
          allowInterruption: true
        variable: init:Topic.clinicianPlan
        prompt: What is your plan or recommendation for the next session?
        entity: StringPrebuiltEntity
      - kind: Question
        id: question_goalPercent
        interruptionPolicy:
          allowInterruption: true
        variable: Topic.goalProgressPercent
        prompt: What percentage of goal completion best reflects this session? (0-100)
        entity:
          kind: NumberPrebuiltEntity
      - kind: ConditionGroup
        id: conditionGroup_goalBar
        conditions:
        - id: conditionItem_goalBarHigh
          condition: =Topic.goalProgressPercent >= 80
          actions:
          - kind: SetTextVariable
            id: setTextVariable_goalBarHigh
            variable: Topic.goalProgressBar
            value: "=\"\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\
              \""
        - id: conditionItem_goalBarMedium
          condition: =Topic.goalProgressPercent >= 50
          actions:
          - kind: SetTextVariable
            id: setTextVariable_goalBarMedium
            variable: Topic.goalProgressBar
            value: "=\"\u2588\u2588\u2588\u2588\u2588\u2588\u2591\u2591\u2591\u2591\
              \""
        - id: conditionItem_goalBarLow
          condition: =Topic.goalProgressPercent >= 25
          actions:
          - kind: SetTextVariable
            id: setTextVariable_goalBarLow
            variable: Topic.goalProgressBar
            value: "=\"\u2588\u2588\u2588\u2591\u2591\u2591\u2591\u2591\u2591\u2591\
              \""
        elseActions:
        - kind: SetTextVariable
          id: setTextVariable_goalBarVeryLow
          variable: Topic.goalProgressBar
          value: "=\"\u2588\u2591\u2591\u2591\u2591\u2591\u2591\u2591\u2591\u2591\""
      - kind: Question
        id: question_pB7H6z
        interruptionPolicy:
          allowInterruption: true
        variable: init:Topic.additionalNotes
        prompt: Are there any additional notes or comments you'd like to include in
          the progress note?
        entity: StringPrebuiltEntity
      - kind: BeginDialog
        id: znUtHz
        input:
          binding:
            text: '=Concatenate("Patient: ", Topic.patientName, " | Therapy Goals:
              ", Topic.therapyGoals, " | Session Activities: ", Topic.sessionActivities,
              " | Clinician Plan: ", Topic.clinicianPlan, " | Additional Notes: ",
              Topic.additionalNotes)'
        dialog: pcca_agent.action.TheraDoc-PTGenerateNote
        output:
          binding:
            generatednote: Topic.generatednote
      - kind: SendActivity
        id: sendActivity_1ywoow
        activity: '{Topic.generatednote}'
      - kind: SendActivity
        id: sendActivity_goalVisualizer
        activity: 'Goal Progress Visualizer

          {Topic.goalProgressBar}  {Topic.goalProgressPercent}%

          This percentage is clinician-entered and should be verified against objective
          measures.'
    inputType: {}
    outputType: {}
