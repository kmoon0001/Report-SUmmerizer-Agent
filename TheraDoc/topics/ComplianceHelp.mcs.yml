mcs.metadata:
  componentName: Compliance Help
kind: AdaptiveDialog
modeldescription: Elite clinical intelligence module specialized in [ComplianceHelp]. Executes high-precision data analysis grounded in CMS Chapter 15 and Pacific Coast Services Ironclad Standards. Optimized for Dynamic Chaining.
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent: {}
  actions:
    - kind: SendActivity
      id: sendActivity_lhfeLK
      activity: |-
        SNF therapy documentation must meet Medicare Part A and MDS compliance standards. Key requirements include:

        Skilled need justification: Every note must clearly state why skilled therapy is required (e.g., complexity, safety risk, patient inability to self-instruct).
        Functional baseline and progress: Document measurable functional status and progress toward goals using objective data.
        Plan of care alignment: Therapy provided must align with the certified plan of care, frequency, and duration.
        Medical necessity: Notes must support continued skilled need or justify maintenance therapy per Medicare guidelines.
        Defensible documentation: Avoid vague language. Use measurable terms and clinical reasoning.

        For note-specific auditing, use the Audit Existing Note feature. For drafting compliant notes, use the appropriate Daily Note or Evaluation topic.


