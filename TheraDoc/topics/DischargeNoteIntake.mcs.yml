mcs.metadata:
  componentName: Discharge Note Intake
  description: Elite clinical intelligence module specialized in [DischargeNoteIntake]. Executes high-precision data analysis grounded in CMS Chapter 15 and Pacific Coast Services Ironclad Standards. Optimized for Dynamic Chaining.
  guardrails:
    - Always use closed-list choices for discipline, note type, interventions, assist level, goal status, and cert period
    - Only use free text for patient identifier, date, specific metrics, and custom clinical details
    - Add validation before calling action to ensure all required variables are populated
    - Check contract: action inputs must match flow parameters exactly
    - On failure: preserve context and offer retry/manual continue/start over
kind: AdaptiveDialog
modeldescription: Elite clinical intelligence module specialized in [DischargeNoteIntake]. Executes high-precision data analysis grounded in CMS Chapter 15 and Pacific Coast Services Ironclad Standards. Optimized for Dynamic Chaining.
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent: {}
  actions:
    - kind: Question
      id: question_7xIA7j
      interruptionPolicy:
        allowInterruption: true

      variable: init:Topic.patientName
      prompt: What is the patient's name?
      entity: StringPrebuiltEntity

    - kind: Question
      id: question_GL8u45
      interruptionPolicy:
        allowInterruption: true

      variable: init:Topic.therapyDiscipline
      prompt: What therapy discipline is performing this discharge?
      entity:
        kind: ClosedListEntityReference
        entityId: pcca_agent.entity.Discipline

    - kind: ConditionGroup
      id: conditionGroup_foPwWg
      conditions:
        - id: conditionItem_byPNaG
          condition: =Topic.therapyDiscipline = 'pcca_agent.entity.Discipline'.DuzBe7
          displayName: disciplineIsSLP
          actions:
            - kind: SendActivity
              id: sendActivity_vIkRlN
              activity: Understood Ă˘â¬â generating your SLP Discharge Note. Please provide the following details.

        - id: conditionItem_6mR6sA
          condition: =Topic.therapyDiscipline = 'pcca_agent.entity.Discipline'.iNfx28
          displayName: disciplineIsOT
          actions:
            - kind: SendActivity
              id: sendActivity_almObs
              activity: Understood Ă˘â¬â generating your OT Discharge Note. Please provide the following details.

        - id: conditionItem_4EpbHC
          condition: =Topic.therapyDiscipline = 'pcca_agent.entity.Discipline'.dxugsW
          displayName: disciplineIsPT
          actions:
            - kind: SendActivity
              id: sendActivity_kw4FOB
              activity: Understood Ă˘â¬â generating your PT Discharge Note. Please provide the following details.

    # Discharge reason - structured for phone with quick buttons
    - kind: Question
      id: question_bP6AK7
      interruptionPolicy:
        allowInterruption: true
      variable: init:Topic.dischargeReason
      prompt: What is the reason for discharge?
      entity:
        kind: EmbeddedEntity
        sensitivityLevel: Sensitive
        definition:
          kind: ClosedListEntity
          items:
            - id: Goals met
              displayName: Goals met

            - id: Goals partially met
              displayName: Goals partially met

            - id: Medical complexity
              displayName: Medical complexity/change in condition

            - id: Patient request
              displayName: Patient/family request

            - id: Physician order
              displayName: Physician discharge order

            - id: Acute hospitalization
              displayName: Acute hospitalization

            - id: Death
              displayName: Death

            - id: Other
              displayName: Other

        displayName: DischargeReason

    # Functional status at discharge - structured for quick entry
    - kind: Question
      id: question_KPNB3i
      interruptionPolicy:
        allowInterruption: true
      variable: init:Topic.functionalStatus
      prompt: What is the patient's functional status at discharge?
      entity:
        kind: EmbeddedEntity
        sensitivityLevel: Sensitive
        definition:
          kind: ClosedListEntity
          items:
            - id: Independent
              displayName: Independent for all mobility

            - id: Supervision
              displayName: Supervision for mobility

            - id: Standby assist
              displayName: Standby assist

            - id: Min assist
              displayName: Minimum assist (1 person)

            - id: Mod assist
              displayName: Moderate assist (1-2 persons)

            - id: Max assist
              displayName: Maximum assist (2 persons)

            - id: Total dependent
              displayName: Total dependent

            - id: Improved from baseline
              displayName: Improved from baseline

            - id: Declined from baseline
              displayName: Declined from baseline

            - id: Unknown
              displayName: Unknown

        displayName: FunctionalStatus

    - kind: Question
      id: question_Y5jUVJ
      interruptionPolicy:
        allowInterruption: true

      variable: init:Topic.goalStatus
      prompt: What is the patient's goal status at discharge?
      entity:
        kind: EmbeddedEntity
        definition:
          kind: ClosedListEntity
          items:
            - id: Met
              displayName: Met

            - id: Partially Met
              displayName: Partially Met

            - id: Not Met
              displayName: Not Met

    - kind: ConditionGroup
      id: conditionGroup_dMeutZ
      conditions:
        - id: conditionItem_1tc7b2
          condition: =Topic.goalStatus = 'pcca_agent.topic.DischargeNoteIntake.main.question_Y5jUVJ'.Met
          displayName: goalMet

        - id: conditionItem_wI1oRU
          condition: =Topic.goalStatus = 'pcca_agent.topic.DischargeNoteIntake.main.question_Y5jUVJ'.'Partially Met'
          displayName: goalPartiallyMet

        - id: conditionItem_9kgXLF
          condition: =Topic.goalStatus = 'pcca_agent.topic.DischargeNoteIntake.main.question_Y5jUVJ'.'Not Met'
          displayName: goalNotMet

    - kind: Question
      id: question_ov87Ow
      interruptionPolicy:
        allowInterruption: true

      variable: init:Topic.educationProvided
      prompt: Was caregiver or patient education provided at discharge?
      entity:
        kind: EmbeddedEntity
        definition:
          kind: ClosedListEntity
          items:
            - id: Yes
              displayName: Yes

            - id: No
              displayName: No

    - kind: ConditionGroup
      id: conditionGroup_XBtyJX
      conditions:
        - id: conditionItem_uj4p6X
          condition: =Topic.educationProvided = 'pcca_agent.topic.DischargeNoteIntake.main.question_ov87Ow'.Yes
          displayName: educationWasProvided

        - id: conditionItem_1410OR
          condition: =Topic.educationProvided = 'pcca_agent.topic.DischargeNoteIntake.main.question_ov87Ow'.No
          displayName: educationNotProvided

    # Remaining limitations - free text but with guidance
    - kind: Question
      id: question_iQyf35
      interruptionPolicy:
        allowInterruption: true
      variable: init:Topic.remainingLimitations
      prompt: "Briefly describe any remaining limitations, precautions, or safety concerns at discharge."
      entity: StringPrebuiltEntity

    # Equipment/safety recommendations - structured
    - kind: Question
      id: question_jT1OkR
      interruptionPolicy:
        allowInterruption: true
      variable: init:Topic.equipmentSafetyRecs
      prompt: Are there any equipment or safety recommendations for the patient?
      entity:
        kind: EmbeddedEntity
        sensitivityLevel: Sensitive
        definition:
          kind: ClosedListEntity
          items:
            - id: None needed
              displayName: None needed

            - id: Walker
              displayName: Walker

            - id: Cane
              displayName: Cane

            - id: Wheelchair
              displayName: Wheelchair

            - id: Transfer board
              displayName: Transfer board

            - id: Bed rail
              displayName: Bed rail

            - id: Home exercise program
              displayName: Home exercise program

            - id: Family/caregiver training
              displayName: Family/caregiver training needed

            - id: Other
              displayName: Other

        displayName: EquipmentSafetyRecs

    - kind: Question
      id: question_gYxePS
      interruptionPolicy:
        allowInterruption: true

      variable: init:Topic.dischargeDisposition
      prompt: What is the patient's discharge disposition?
      entity:
        kind: EmbeddedEntity
        definition:
          kind: ClosedListEntity
          items:
            - id: Home
              displayName: Home

            - id: Skilled Nursing Facility (SNF)
              displayName: Skilled Nursing Facility (SNF)

            - id: Acute Hospital
              displayName: Acute Hospital

            - id: Assisted Living Facility
              displayName: Assisted Living Facility

            - id: Outpatient Therapy
              displayName: Outpatient Therapy

            - id: Hospice
              displayName: Hospice

            - id: Other
              displayName: Other

        displayName: EmbeddedEntity-FoaSl6

    - kind: ConditionGroup
      id: conditionGroup_7WuW0U
      conditions:
        - id: conditionItem_RDKa5n
          condition: =Topic.dischargeDisposition = 'pcca_agent.topic.DischargeNoteIntake.main.question_gYxePS'.'Skilled Nursing Facility (SNF)'

        - id: conditionItem_vkdj8A
          condition: =Topic.dischargeDisposition = 'pcca_agent.topic.DischargeNoteIntake.main.question_gYxePS'.'Acute Hospital'

        - id: conditionItem_lvHi1x
          condition: =Topic.dischargeDisposition = 'pcca_agent.topic.DischargeNoteIntake.main.question_gYxePS'.'Assisted Living Facility'

        - id: conditionItem_YUcl2p
          condition: =Topic.dischargeDisposition = 'pcca_agent.topic.DischargeNoteIntake.main.question_gYxePS'.'Outpatient Therapy'

        - id: conditionItem_NHxsJo
          condition: =Topic.dischargeDisposition = 'pcca_agent.topic.DischargeNoteIntake.main.question_gYxePS'.Hospice

        - id: conditionItem_UGWxgM
          condition: =Topic.dischargeDisposition = 'pcca_agent.topic.DischargeNoteIntake.main.question_gYxePS'.Other

    - kind: BeginDialog
      id: 5lalG2
      input:
        binding:
          text: "=\"Generate a Medicare-compliant SNF therapy discharge note.\\nPatient: \" & Topic.patientName & \"\\nDiscipline: \" & Text(Topic.therapyDiscipline) & \"\\nDischarge Disposition: \" & Text(Topic.dischargeDisposition) & \"\\nDischarge Reason: \" & Topic.dischargeReason & \"\\nFunctional Status at Discharge: \" & Topic.functionalStatus & \"\\nEducation Provided: \" & Text(Topic.educationProvided) & \"\\nEquipment/Safety Recs: \" & Topic.equipmentSafetyRecs"

      dialog: pcca_agent.action.TheraDoc-PTGenerateNote
      output:
        binding:
          generatednote: Topic.generatednote

    - kind: SendActivity
      id: sendActivity_COfDKa
      activity: Thank you. The discharge note intake is complete. Your responses have been recorded and will be used to generate the discharge documentation.

inputType: {}
outputType: {}






