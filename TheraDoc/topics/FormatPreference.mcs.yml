    - kind: SendActivity
      id: sendActivity_v9f9BN
      activity: |-
        TheraDoc supports the following documentation formats:

        • Narrative (default): Full paragraph format with clinical reasoning, ideal for evaluations and complex notes.
        • SOAP Note: Structured Subjective, Objective, Assessment, Plan format.
        • DAP Note: Data, Assessment, Plan format common in behavioral and rehab settings.
        • Bullet summary: Concise bullet points for quick review or MDS support documentation.

        To request a specific format, simply include it in your request. For example: "Write this as a SOAP note" or "Give me a bullet summary."

        All formats are AI-generated drafts. Always review and modify before EHR entry.

