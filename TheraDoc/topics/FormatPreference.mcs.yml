# Platinum Format Preference Manager
mcs.metadata:
  componentName: FormatPreference
kind: AdaptiveDialog
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    displayName: Format Preference
  actions:
    - kind: Question
      id: q_format
      variable: Topic.PreferredFormat
      prompt: "How would you like your notes formatted?"
      entity:
        kind: EmbeddedEntity
        definition:
          kind: ClosedListEntity
          items:
            - id: SOAP
              displayName: SOAP Note (Subjective, Objective, Assessment, Plan)
            - id: Narrative
              displayName: Narrative (Paragraph style)
            - id: Checklist
              displayName: Checklist (Bullet points)
