mcs.metadata:
  componentName: Generate Documentation
kind: AdaptiveDialog
modeldescription: Elite clinical intelligence module specialized in [GenerateNoteOrchestration]. Executes high-precision data analysis grounded in CMS Chapter 15 and Pacific Coast Services Ironclad Standards. Optimized for Dynamic Chaining.
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent: {}
  actions:
    - kind: InvokeAction
      id: invoke_auditLogAtStart
      action: pcca_agent.action.TheraDoc-CrossAgentAuditLog
      input:
        AuditMissionType: ="GenerateNoteStart"
        AuditTimestampIn: Text(Now(), DateTimeFormat.UTC)

    - kind: Question
      id: question_BjBCKR
      interruptionPolicy:
        allowInterruption: true

      variable: Topic.disciplineSelection
      prompt: Which therapy discipline are you documenting for?
      entity:
        kind: EmbeddedEntity
        sensitivityLevel: None
        definition:
          kind: ClosedListEntity
          items:
            - id: PT
              displayName: PT

            - id: OT
              displayName: OT

            - id: ST
              displayName: ST

        displayName: EmbeddedEntity-tyOIfT

    - kind: Question
      id: question_Lg9zAA
      interruptionPolicy:
        allowInterruption: true

      variable: init:Topic.documentTypeSelection
      prompt: What type of documentation do you need?
      entity:
        kind: EmbeddedEntity
        definition:
          kind: ClosedListEntity
          items:
            - id: Daily Note
              displayName: Daily Note

            - id: Progress Note
              displayName: Progress Note

            - id: Evaluation Note
              displayName: Evaluation Note

            - id: Discharge Note
              displayName: Discharge Note

            - id: Recertification Note
              displayName: Recertification Note

    - kind: ConditionGroup
      id: conditionGroup_2R6zi5
      conditions:
        - id: conditionItem_8niqXF
          condition: =Topic.documentTypeSelection = 'pcca_agent.topic.GenerateNoteOrchestration.main.question_Lg9zAA'.'Daily Note'
          actions:
            - kind: ConditionGroup
              id: conditionGroup_wxMcBS
              conditions:
                - id: conditionItem_iLXhv2
                  condition: =Topic.disciplineSelection = 'pcca_agent.topic.GenerateNoteOrchestration.main.question_BjBCKR'.PT
                  actions:
                    - kind: BeginDialog
                      id: QboQD9
                      dialog: pcca_agent.topic.PTDailyNoteCard

              elseActions:
                - kind: ConditionGroup
                  id: conditionGroup_DZ2DkO
                  conditions:
                    - id: conditionItem_21oV9Q
                      condition: =Topic.disciplineSelection = 'pcca_agent.topic.GenerateNoteOrchestration.main.question_BjBCKR'.OT
                      actions:
                        - kind: BeginDialog
                          id: 0rIyKU
                          dialog: pcca_agent.topic.OTDailyNoteCard

                  elseActions:
                    - kind: BeginDialog
                      id: sPR4BF
                      dialog: pcca_agent.topic.SLPDailyNoteCard

        - id: conditionItem_n1u2en
          condition: =Topic.documentTypeSelection = 'pcca_agent.topic.GenerateNoteOrchestration.main.question_Lg9zAA'.'Progress Note'
          actions:
            - kind: ConditionGroup
              id: conditionGroup_RYVmjG
              conditions:
                - id: conditionItem_vNT1DO
                  condition: =Topic.disciplineSelection = 'pcca_agent.topic.GenerateNoteOrchestration.main.question_BjBCKR'.PT
                  actions:
                    - kind: BeginDialog
                      id: YIxUhX
                      dialog: pcca_agent.topic.ProgressNoteIntake

              elseActions:
                - kind: ConditionGroup
                  id: conditionGroup_IshxYf
                  conditions:
                    - id: conditionItem_KMQ0Es
                      condition: =Topic.disciplineSelection = 'pcca_agent.topic.GenerateNoteOrchestration.main.question_BjBCKR'.OT
                      actions:
                        - kind: BeginDialog
                          id: JdJmli
                          dialog: pcca_agent.topic.ProgressNoteIntake

                  elseActions:
                    - kind: BeginDialog
                      id: 2Ghc7M
                      dialog: pcca_agent.topic.ProgressNoteIntake

        - id: conditionItem_d4YboC
          condition: =Topic.documentTypeSelection = 'pcca_agent.topic.GenerateNoteOrchestration.main.question_Lg9zAA'.'Evaluation Note'
          actions:
            - kind: BeginDialog
              id: opDV3i
              dialog: pcca_agent.topic.EvaluationAssessmentIntake

        - id: conditionItem_KoTdpj
          condition: =Topic.documentTypeSelection = 'pcca_agent.topic.GenerateNoteOrchestration.main.question_Lg9zAA'.'Discharge Note'
          actions:
            - kind: BeginDialog
              id: Hpc9sJ
              dialog: pcca_agent.topic.DischargeNoteIntake

        - id: conditionItem_PySttg
          condition: =Topic.documentTypeSelection = 'pcca_agent.topic.GenerateNoteOrchestration.main.question_Lg9zAA'.'Recertification Note'
          actions:
            - kind: BeginDialog
              id: wYz3wZ
              dialog: pcca_agent.topic.RecertificationDischargeCard

      elseActions:
        - kind: SendActivity
          id: sendActivity_EKjGkP
          activity: "I'm sorry, I didn't recognize that document type. Please choose from: Daily Note, Progress Note, Evaluation Note, Discharge Note, or Recertification Note."



inputType: {}
outputType: {}









