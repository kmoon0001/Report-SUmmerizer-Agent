mcs.metadata:
  componentName: Greeting
  description: Elite clinical intelligence module specialized in [Greeting]. Executes high-precision data analysis grounded in CMS Chapter 15 and Ensign Services Ironclad Standards. Optimized for Dynamic Chaining.
kind: AdaptiveDialog
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    displayName: Greeting
    includeInOnSelectIntent: false
    triggerQueries:
      - Good afternoon
      - Good morning
      - Hello
      - Hey
      - Hi

  actions:
    - kind: SendActivity
      id: sendMessage_abmysR
      activity:
        text:
          - |-
            👋 Welcome to TheraDoc!
            Your AI-powered documentation assistant for SNF therapy teams.

            ⚠️ HIPAA: Use initials or room numbers only — no full names or MRNs.

            Tap a button below to get started:
        speak:
          - "Hello, I'm TheraDoc, your clinical documentation assistant for therapy workflows. I can help you create or revise skilled therapy documentation, including daily notes, evaluation intake, discharge note intake, recertification, nursing handoff, and documentation guidance. To get started, tell me what you want to work on, for example: \"Start ST daily note intake,\" \"Help me document a progress note,\" or \"Audit an existing note.\" Please avoid entering PHI such as patient names or identifiers."

    - kind: Question
      id: question_vct0Ze
      interruptionPolicy:
        allowInterruption: true

      variable: init:Topic.selectedWorkflow
      prompt: What would you like to do?
      entity:
        kind: EmbeddedEntity
        definition:
          kind: ClosedListEntity
          items:
            - id: 📝 Write a daily note
              displayName: 📝 Write a daily note

            - id: 📋 Create an evaluation
              displayName: 📋 Create an evaluation

            - id: 📝 Generate progress note
              displayName: 📝 Generate progress note

            - id: 🏥 Complete a discharge note intake
              displayName: 🏥 Complete a discharge note intake

            - id: 📄 Write a recertification note
              displayName: 📄 Write a recertification note

            - id: 🤝 Generate a nursing handoff
              displayName: 🤝 Generate a nursing handoff

            - id: 🔍 Audit an existing note
              displayName: 🔍 Audit an existing note

    - kind: ConditionGroup
      id: conditionGroup_zklXmJ
      conditions:
        - id: conditionItem_cR7JfM
          condition: =Topic.selectedWorkflow = 'pcca_agent.topic.Greeting.main.question_vct0Ze'.'📝 Write a daily note'

        - id: conditionItem_YGLugP
          condition: =Topic.selectedWorkflow = 'pcca_agent.topic.Greeting.main.question_vct0Ze'.'📋 Create an evaluation'

        - id: conditionItem_iDRmB2
          condition: =Topic.selectedWorkflow = 'pcca_agent.topic.Greeting.main.question_vct0Ze'.'📝 Generate progress note'

        - id: conditionItem_aEaTzZ
          condition: =Topic.selectedWorkflow = 'pcca_agent.topic.Greeting.main.question_vct0Ze'.'🏥 Complete a discharge note intake'
          actions:
            - kind: BeginDialog
              id: 1rN4iS
              dialog: pcca_agent.topic.DischargeNoteIntake

        - id: conditionItem_Kjiq3i
          condition: =Topic.selectedWorkflow = 'pcca_agent.topic.Greeting.main.question_vct0Ze'.'📄 Write a recertification note'
          actions:
            - kind: BeginDialog
              id: OierPd
              dialog: pcca_agent.topic.RecertificationIntake

        - id: conditionItem_OYhkIu
          condition: =Topic.selectedWorkflow = 'pcca_agent.topic.Greeting.main.question_vct0Ze'.'🤝 Generate a nursing handoff'
          actions:
            - kind: BeginDialog
              id: pjTk4F
              dialog: pcca_agent.topic.NursingHandoff

        - id: conditionItem_7om3uT
          condition: =Topic.selectedWorkflow = 'pcca_agent.topic.Greeting.main.question_vct0Ze'.'🔍 Audit an existing note'
          actions:
            - kind: BeginDialog
              id: SgRqPC
              dialog: pcca_agent.topic.AuditExistingNote

    - kind: CancelAllDialogs
      id: cancelAllDialogs_01At22
      displayName: End all topics




