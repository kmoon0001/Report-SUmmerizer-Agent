# Microsoft Learn Platinum Standard Instructions:
# **Grounding**: Refer to src/KnowledgeBase/GLOBAL_CMS_COMPLIANCE.md.

mcs.metadata:
  componentName: Greeting
kind: AdaptiveDialog
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    displayName: Greeting
    includeInOnSelectIntent: false
  actions:
    - kind: SendActivity
      id: sendMessage_abmysR
      activity:
        text:
          - |-
            Welcome to TheraDoc!
            Your AI-powered documentation assistant for SNF therapy teams.

            HIPAA: Use initials or room numbers only. No full names or MRNs.

            Tap a button below to get started:
        speak:
          - "Hello, I'm TheraDoc, your clinical documentation assistant."

    - kind: Question
      id: question_vct0Ze
      variable: init:Topic.selectedWorkflow
      prompt: What would you like to do?
      entity:
        kind: EmbeddedEntity
        definition:
          kind: ClosedListEntity
          items:
            - id: Write a daily note
              displayName: Write a daily note
            - id: Create an evaluation
              displayName: Create an evaluation
            - id: Audit an existing note
              displayName: Audit an existing note
        displayName: SelectedWorkflow

    - kind: ConditionGroup
      id: conditionGroup_zklXmJ
      conditions:
        - id: cond_daily
          condition: =Topic.selectedWorkflow = "Write a daily note"
          actions:
            - kind: BeginDialog
              id: bd_daily
              dialog: pcca_agent.topic.PTDailyNoteIntake
        - id: cond_eval
          condition: =Topic.selectedWorkflow = "Create an evaluation"
          actions:
            - kind: BeginDialog
              id: bd_eval
              dialog: pcca_agent.topic.EvaluationAssessmentIntake
        - id: cond_audit
          condition: =Topic.selectedWorkflow = "Audit an existing note"
          actions:
            - kind: BeginDialog
              id: bd_audit
              dialog: pcca_agent.topic.AuditExistingNote

    - kind: CancelAllDialogs
      id: cancelAllDialogs_01At22
      displayName: End all topics

