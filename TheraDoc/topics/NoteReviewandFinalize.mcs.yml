mcs.metadata:
  componentName: NoteReviewandFinalize
kind: AdaptiveDialog
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    triggerQueries:
    - review my notes
    - finalize notes
    - check my note summary
    - edit and approve notes
    - go over my notes
    - complete note review
    - finish reviewing notes
    - confirm final version of notes
    - look at my draft notes
  actions:
  - kind: SetVariable
    id: setVariable_Sw8qzw
    variable: Global.GeneratedNote
    value: '""'
  - kind: SendActivity
    id: sendActivity_qST4U2
    activity: 'Here is your generated note:

      {Global.GeneratedNote}'
  - kind: Question
    id: Question_y1pJiK
    variable: Topic.NoteApproval
    prompt: Does this note look good?
    entity:
      kind: EmbeddedEntity
      definition:
        kind: ClosedListEntity
        optionSetName: NoteApprovalOptions
        items:
        - id: finalize
          displayName: Finalize note
        - id: revise
          displayName: Revise note
  - kind: ConditionGroup
    id: ConditionGroup_5r7qUy
    conditions:
    - id: ConditionItem_ab4zXy
      condition: =Topic.NoteApproval = NoteApprovalOptions.finalize
      actions:
      - kind: SendActivity
        id: SendActivity_ygi2nc
        activity: Success! The note is finalized and ready to copy and use.
    elseActions:
    - kind: Question
      id: Question_HbqAYM
      variable: Topic.NoteRevisionDetails
      prompt: What specific changes do you need?
      entity: StringPrebuiltEntity
    - kind: SendActivity
      id: SendActivity_01yfXp
      activity: Please describe your changes. The note will be regenerated.
    - kind: SendActivity
      id: SendActivity_TyWjMV
      activity: Redirecting to end topic so the calling topic can handle regeneration.
inputType: {}
outputType: {}



