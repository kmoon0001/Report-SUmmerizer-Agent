mcs.metadata:
  componentName: Nursing Handoff
kind: AdaptiveDialog
modeldescription: Elite clinical intelligence module specialized in [NursingHandoff]. Executes high-precision data analysis grounded in CMS Chapter 15 and Ensign Services Ironclad Standards. Optimized for Dynamic Chaining.
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent: {}
  actions:
    - kind: Question
      id: question_MHKs0V
      interruptionPolicy:
        allowInterruption: true

      variable: init:Topic.therapySummary
      prompt: "Please provide the patient's therapy summary for the handoff: include the discipline (PT/OT/ST), functional status, recent progress, active precautions, and any nursing communication needs."
      entity: StringPrebuiltEntity

    - kind: BeginDialog
      id: VUAsvW
      input:
        binding:
          text: =Topic.therapySummary

      dialog: pcca_agent.action.TheraDoc-PTGenerateNote
      output:
        binding:
          generatednote: Topic.generatednote

    - kind: SendActivity
      id: sendActivity_BbohBM
      activity: "{Topic.generatednote}"

inputType: {}
outputType: {}




