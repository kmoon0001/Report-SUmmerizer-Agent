mcs.metadata:
  componentName: OT Daily Note Card
kind: AdaptiveDialog
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent: {}
  actions:
    - kind: AdaptiveCardPrompt
      id: kbtIMb
      card: |-
        {
          "type": "AdaptiveCard",
          "$schema": "https://adaptivecards.io/schemas/adaptive-card.json",
          "version": "1.5",
          "body": [
            {
              "type": "TextBlock",
              "text": "OT Daily / Progress Note",
              "weight": "Bolder",
              "size": "Large",
              "wrap": true
            },
            {
              "type": "Input.Date",
              "id": "dateOfService",
              "label": "Date of Service",
              "isRequired": true,
              "errorMessage": "Date of service is required"
            },
            {
              "type": "Input.Number",
              "id": "treatmentDuration",
              "label": "Treatment Duration (minutes)",
              "isRequired": true,
              "errorMessage": "Treatment duration is required"
            },
            {
              "type": "Input.Text",
              "id": "adlTasks",
              "label": "ADL Task(s) Performed",
              "placeholder": "Dressing, bathing, grooming",
              "isRequired": true,
              "errorMessage": "ADL tasks are required"
            },
            {
              "type": "Input.ChoiceSet",
              "id": "assistLevel",
              "label": "Assist Level per Task",
              "isRequired": true,
              "errorMessage": "Assist level is required",
              "choices": [
                {
                  "title": "Independent",
                  "value": "Independent"
                },
                {
                  "title": "Supervision",
                  "value": "Supervision"
                },
                {
                  "title": "SBA (Standby Assist)",
                  "value": "SBA"
                },
                {
                  "title": "CGA (Contact Guard Assist)",
                  "value": "CGA"
                },
                {
                  "title": "Min A (Minimal Assist 25%)",
                  "value": "Min A"
                },
                {
                  "title": "Mod A (Moderate Assist 50%)",
                  "value": "Mod A"
                },
                {
                  "title": "Max A (Maximum Assist 75%)",
                  "value": "Max A"
                },
                {
                  "title": "Total Assist (Dependent)",
                  "value": "Total Assist"
                }
              ]
            },
            {
              "type": "Input.Text",
              "id": "fimScore",
              "label": "FIM / Section GG Score",
              "placeholder": "FIM: 4/7 for dressing"
            },
            {
              "type": "Input.Number",
              "id": "setsTrials",
              "label": "Sets / Trials",
              "isRequired": true,
              "errorMessage": "Sets/trials count is required"
            },
            {
              "type": "Input.Text",
              "id": "safetyAwareness",
              "label": "Safety Awareness Observations",
              "isMultiline": true,
              "placeholder": "Patient demonstrates..."
            },
            {
              "type": "Input.Text",
              "id": "cognitivePerceptual",
              "label": "Cognitive / Perceptual Observations",
              "isMultiline": true,
              "placeholder": "BIMS score, attention, sequencing..."
            },
            {
              "type": "Input.Text",
              "id": "responseToTreatment",
              "label": "Response to Treatment",
              "isMultiline": true,
              "isRequired": true,
              "errorMessage": "Response to treatment is required"
            },
            {
              "type": "Input.Text",
              "id": "progressTowardGoals",
              "label": "Progress Toward Goals",
              "isMultiline": true,
              "placeholder": "Patient is progressing toward LTG..."
            },
            {
              "type": "Input.Text",
              "id": "planForNextSession",
              "label": "Plan for Next Session",
              "isMultiline": true
            },
            {
              "type": "Input.Text",
              "id": "therapistName",
              "label": "Therapist Name & Credentials",
              "placeholder": "Jane Smith, OTR/L",
              "isRequired": true,
              "errorMessage": "Therapist name is required"
            }
          ],
          "actions": [
            {
              "type": "Action.Submit",
              "title": "Generate OT Note"
            }
          ]
        }
      output:
        binding:
          actionSubmitId: Topic.actionSubmitId
          adlTasks: Topic.adlTasks
          assistLevel: Topic.assistLevel
          cognitivePerceptual: Topic.cognitivePerceptual
          dateOfService: Topic.dateOfService
          fimScore: Topic.fimScore
          planForNextSession: Topic.planForNextSession
          progressTowardGoals: Topic.progressTowardGoals
          responseToTreatment: Topic.responseToTreatment
          safetyAwareness: Topic.safetyAwareness
          setsTrials: Topic.setsTrials
          therapistName: Topic.therapistName
          treatmentDuration: Topic.treatmentDuration

      outputType:
        properties:
          actionSubmitId: String
          adlTasks: String
          assistLevel: String
          cognitivePerceptual: String
          dateOfService: Date
          fimScore: String
          planForNextSession: String
          progressTowardGoals: String
          responseToTreatment: String
          safetyAwareness: String
          setsTrials: Number
          therapistName: String
          treatmentDuration: Number

inputType: {}
outputType: {}





