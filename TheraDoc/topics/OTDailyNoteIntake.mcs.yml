# Microsoft Learn Platinum Standard Instructions:
# **Grounding**: Refer to src/KnowledgeBase/GLOBAL_CMS_COMPLIANCE.md.
# **Patterns**: Implement src/KnowledgeBase/PLATINUM_PROMPT_PATTERNS.md for few-shot reasoning.
# **Self-Correction**: If the output involves clinical judgment, invoke the ComplianceAuditor gate.

mcs.metadata:
  componentName: OT Daily Note Intake
kind: AdaptiveDialog
modeldescription: Elite clinical intelligence module specialized in [OTDailyNoteIntake]. Executes high-precision data analysis grounded in CMS Chapter 15 and Pacific Coast Services Ironclad Standards. Optimized for Dynamic Chaining.
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent: {}
  actions:
    - kind: Question
      id: question_cqEGRF
      interruptionPolicy:
        allowInterruption: true
      variable: init:Topic.primaryADLTask
      prompt: Which ADL or functional task was the primary focus today?
      entity:
        kind: EmbeddedEntity
        definition:
          kind: ClosedListEntity
          items:
            - id: Dressing
              displayName: Dressing (upper body)
            - id: Dressing lower body
              displayName: Dressing (lower body)
            - id: Bathing
              displayName: Bathing
            - id: Toileting
              displayName: Toileting
            - id: Feeding/eating
              displayName: Feeding/eating
            - id: Grooming
              displayName: Grooming
            - id: Functional mobility
              displayName: Functional mobility
            - id: Kitchen tasks
              displayName: Kitchen tasks/IADLs
            - id: Bed mobility
              displayName: Bed mobility
            - id: Wheelchair mobility
              displayName: Wheelchair mobility
            - id: Other
              displayName: Other
        displayName: PrimaryADLTask

    - kind: Question
      id: question_Sz0gRY
      interruptionPolicy:
        allowInterruption: true
      variable: Topic.sessionDetails
      prompt: "Briefly describe: specific activities practiced, patient's assist level required, response to treatment, and any progress toward goals."
      entity:
        kind: StringPrebuiltEntity
        sensitivityLevel: None

    - kind: BeginDialog
      id: wH8yCc
      input:
        binding:
          text: |-
            ="Generate a Medicare-compliant OT Daily Note.
            Task: " & Topic.primaryADLTask & "
            Details: " & Topic.sessionDetails
      dialog: pcca_agent.action.TheraDoc-PTGenerateNote
      output:
        binding:
          generatednote: Topic.generatednote

    - kind: SendActivity
      id: sendActivity_zQeeYU
      activity: |-
        Review and edit before entering into the EHR.

        {Topic.generatednote}

inputType: {}
outputType: {}

