# Microsoft Learn Platinum Standard OnError
# Unified Swarm Audit & Recovery
mcs.metadata:
  componentName: On Error
kind: AdaptiveDialog
beginDialog:
  kind: OnError
  id: main
  actions:
    - kind: InvokeAction
      id: invoke_auditLogOnError
      action: pcca_agent.action.TheraDoc-CrossAgentAuditLog
      input:
        AuditMissionType: ="ErrorEscalation"
        AuditTimestampIn: Text(Now(), DateTimeFormat.UTC)


    - kind: SendActivity
      id: sendMessage_error
      activity: |-
        **TheraDoc - System Error**
        An unexpected error occurred.
        Reference ID: {System.Conversation.Id}
        Error Code: {System.Error.Code}

    - kind: CancelAllDialogs
      id: cancel_all
