mcs.metadata:
  componentName: PT Daily Note Card
kind: AdaptiveDialog
modeldescription: Elite clinical intelligence module specialized in [PTDailyNoteCard]. Executes high-precision data analysis grounded in CMS Chapter 15 and Pacific Coast Services Ironclad Standards. Optimized for Dynamic Chaining.
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent: {}
  actions:
    - kind: AdaptiveCardPrompt
      id: M39foN
      card: |-
        {
          "type": "AdaptiveCard",
          "$schema": "https://adaptivecards.io/schemas/adaptive-card.json",
          "version": "1.5",
          "body": [
            {
              "type": "TextBlock",
              "text": "PT Daily / Progress Note",
              "weight": "Bolder",
              "size": "Large",
              "wrap": true
            },
            {
              "type": "Input.Date",
              "id": "dateOfService",
              "label": "Date of Service",
              "isRequired": true,
              "errorMessage": "Date of service is required"
            },
            {
              "type": "Input.Text",
              "id": "cptCodes",
              "label": "CPT Code(s)",
              "placeholder": "97110, 97530"
            },
            {
              "type": "Input.Number",
              "id": "treatmentDuration",
              "label": "Treatment Duration (minutes)",
              "placeholder": "45",
              "isRequired": true,
              "errorMessage": "Treatment duration is required"
            },
            {
              "type": "Input.Number",
              "id": "painScale",
              "label": "Pain Scale 0-10",
              "min": 0,
              "max": 10,
              "placeholder": "0-10",
              "isRequired": true,
              "errorMessage": "Pain scale is required"
            },
            {
              "type": "Input.Text",
              "id": "walkingDistance",
              "label": "Walking Distance",
              "placeholder": "150 feet",
              "isRequired": true,
              "errorMessage": "Walking distance is required"
            },
            {
              "type": "Input.Number",
              "id": "sets",
              "label": "Number of Sets",
              "placeholder": "3",
              "isRequired": true,
              "errorMessage": "Number of sets is required"
            },
            {
              "type": "Input.Number",
              "id": "reps",
              "label": "Number of Reps",
              "placeholder": "10",
              "isRequired": true,
              "errorMessage": "Number of reps is required"
            },
            {
              "type": "Input.Text",
              "id": "restPeriod",
              "label": "Rest Period Between Sets",
              "placeholder": "2 minutes",
              "isRequired": true,
              "errorMessage": "Rest period is required"
            },
            {
              "type": "Input.ChoiceSet",
              "id": "assistLevel",
              "label": "Assist Level",
              "isRequired": true,
              "errorMessage": "Assist level is required",
              "choices": [
                {
                  "title": "Independent",
                  "value": "Independent"
                },
                {
                  "title": "Supervision",
                  "value": "Supervision"
                },
                {
                  "title": "SBA (Standby Assist)",
                  "value": "SBA"
                },
                {
                  "title": "CGA (Contact Guard Assist)",
                  "value": "CGA"
                },
                {
                  "title": "Min A (Minimal Assist 25%)",
                  "value": "Min A"
                },
                {
                  "title": "Mod A (Moderate Assist 50%)",
                  "value": "Mod A"
                },
                {
                  "title": "Max A (Maximum Assist 75%)",
                  "value": "Max A"
                },
                {
                  "title": "Total Assist (Dependent)",
                  "value": "Total Assist"
                }
              ]
            },
            {
              "type": "Input.Text",
              "id": "verbalCuePercentage",
              "label": "Verbal Cue Percentage",
              "placeholder": "25%"
            },
            {
              "type": "Input.Text",
              "id": "spo2",
              "label": "SpO2 at Rest / Exertion",
              "placeholder": "98% / 94%"
            },
            {
              "type": "Input.Text",
              "id": "heartRate",
              "label": "Heart Rate at Rest / Exertion",
              "placeholder": "72 / 98 bpm"
            },
            {
              "type": "Input.Text",
              "id": "responseToTreatment",
              "label": "Response to Treatment",
              "isMultiline": true,
              "isRequired": true,
              "errorMessage": "Response to treatment is required",
              "placeholder": "Patient tolerated treatment well..."
            },
            {
              "type": "Input.Text",
              "id": "skilledJustification",
              "label": "Skilled Justification",
              "isMultiline": true,
              "isRequired": true,
              "errorMessage": "Skilled justification is required",
              "placeholder": "Skilled PT is medically necessary to..."
            },
            {
              "type": "Input.Text",
              "id": "planForNextVisit",
              "label": "Plan for Next Visit",
              "isMultiline": true,
              "placeholder": "Continue therapeutic exercises..."
            },
            {
              "type": "Input.Text",
              "id": "therapistName",
              "label": "Therapist Name & Credentials",
              "placeholder": "Jane Smith, PT, DPT",
              "isRequired": true,
              "errorMessage": "Therapist name is required"
            }
          ],
          "actions": [
            {
              "type": "Action.Submit",
              "title": "Generate PT Note"
            }
          ]
        }
      output:
        binding:
          actionSubmitId: Topic.actionSubmitId
          assistLevel: Topic.assistLevel
          cptCodes: Topic.cptCodes
          dateOfService: Topic.dateOfService
          heartRate: Topic.heartRate
          painScale: Topic.painScale
          planForNextVisit: Topic.planForNextVisit
          reps: Topic.reps
          responseToTreatment: Topic.responseToTreatment
          restPeriod: Topic.restPeriod
          sets: Topic.sets
          skilledJustification: Topic.skilledJustification
          spo2: Topic.spo2
          therapistName: Topic.therapistName
          treatmentDuration: Topic.treatmentDuration
          verbalCuePercentage: Topic.verbalCuePercentage
          walkingDistance: Topic.walkingDistance

      outputType:
        properties:
          actionSubmitId: String
          assistLevel: String
          cptCodes: String
          dateOfService: Date
          heartRate: String
          painScale: Number
          planForNextVisit: String
          reps: Number
          responseToTreatment: String
          restPeriod: String
          sets: Number
          skilledJustification: String
          spo2: String
          therapistName: String
          treatmentDuration: Number
          verbalCuePercentage: String
          walkingDistance: String

inputType: {}
outputType: {}






