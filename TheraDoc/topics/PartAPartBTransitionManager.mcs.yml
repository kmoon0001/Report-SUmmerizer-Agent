# Microsoft Learn Platinum Standard Instructions:
# **Grounding**: GLOBAL_CMS_COMPLIANCE.md + CMS MBPM Ch.15 Part A/B Transition.

mcs.metadata:
  componentName: PartAPartBTransitionManager
  description: >
    Medicare Part A to Part B Transition Manager. Guides clinicians and DORs
    through the clinical and documentation changes required when a SNF resident
    transitions from Medicare Part A (SNF benefit) to Medicare Part B (outpatient).
kind: AdaptiveDialog
modeldescription: >
  Platinum Medicare Part A to Part B Transition Manager for Pacific Coast Therapy Hub.
  Detects when a resident is at risk of exhausting the Part A benefit and guides the
  clinical team through: benefit day calculation, transition criteria evaluation,
  documentation format change requirements, notice requirements (NOMNC/DENC),
  and Part B eligibility assessment. Grounded in CMS Medicare Benefit Policy
  Manual Chapter 15 and SNF Consolidated Billing rules.
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    displayName: Part A to Part B Transition Manager
    triggerQueries:
      - part a to part b
      - medicare benefit exhausted
      - transitioning to part b
      - snf benefit ending
      - 100 days ending
      - switching to outpatient
      - part b transition
      - medicare days running out
      - non-covered days
      - skilled level not met

  actions:
    - kind: SendActivity
      id: sendActivity_intro
      activity: |-
        **Medicare Part A to Part B Transition Manager**
        I will guide you through the transition process to ensure documentation compliance, proper notice issuance, and continuity of care.

    - kind: ConditionGroup
      id: conditionGroup_context
      conditions:
        - id: conditionItem_hasContext
          condition: =!IsBlank(Global.MPC_PatientName)
          actions:
            - kind: SendActivity
              id: sendActivity_contextLoaded
              activity: " Managing transition for: **{Global.MPC_PatientName}**"
      elseActions:
        - kind: Question
          id: question_name
          variable: Global.MPC_PatientName
          prompt: What is the patient's name?
          entity: PersonNamePrebuiltEntity

    - kind: Question
      id: question_benefitDaysUsed
      variable: Topic.TransBenefitDaysUsed
      prompt: How many Medicare Part A benefit days has this patient used in the current benefit period? (Maximum 100 days; days 1-20 are fully covered; days 21-100 require a copay)
      entity: NumberPrebuiltEntity

    - kind: Question
      id: question_transitionReason
      variable: Topic.TransReason
      prompt: What is the primary reason for the transition?
      entity:
        kind: EmbeddedEntity
        definition:
          kind: ClosedListEntity
          items:
            - id: BenefitExhausted
              displayName: 100 benefit days exhausted
            - id: SkilledNeedEnded
              displayName: Skilled level of care no longer required
            - id: PatientChoice
              displayName: Resident/family request to end Part A
            - id: GoalsMet
              displayName: All therapy goals achieved  discharge eligible
            - id: PlannerDecision
              displayName: Insurance/managed care plan decision

    - kind: Question
      id: question_continuingTherapy
      variable: Topic.TransContinuingTherapy
      prompt: Will therapy services continue under Part B (outpatient) after the transition?
      entity: BooleanPrebuiltEntity

    - kind: Question
      id: question_activeTherapyDisciplines
      variable: Topic.TransActiveDisciplines
      prompt: Which disciplines will continue under Part B?
      entity:
        kind: EmbeddedEntity
        definition:
          kind: ClosedListEntity
          items:
            - id: PT
              displayName: Physical Therapy (PT)
            - id: OT
              displayName: Occupational Therapy (OT)
            - id: SLP
              displayName: Speech-Language Pathology (SLP)
            - id: PT_OT
              displayName: PT and OT
            - id: All
              displayName: PT, OT, and SLP
            - id: None
              displayName: No therapy continuation

    - kind: SendActivity
      id: sendActivity_checklistHeader
      activity: " **Transition Compliance Checklist**  Generating required actions..."

    - kind: BeginDialog
      id: beginDialog_transitionPlan
      input:
        binding:
          text: |-
            =Concatenate(
              "### MEDICARE PART A TO PART B TRANSITION PLAN ###\n\n",
              "Patient: ", Global.MPC_PatientName, "\n",
              "Primary Diagnosis: ", Global.MPC_PrimaryDiagnosis, "\n",
              "Benefit Days Used: ", Text(Topic.TransBenefitDaysUsed), " of 100\n",
              "Transition Reason: ", Topic.TransReason, "\n",
              "Therapy Continuing Under Part B: ", Text(Topic.TransContinuingTherapy), "\n",
              "Active Disciplines: ", Topic.TransActiveDisciplines, "\n\n",
              "GENERATE THE FOLLOWING:\n\n",
              "1. TIMELINE SUMMARY: Calculate remaining Part A days, coinsurance trigger day, and recommended transition date.\n\n",
              "2. NOTICE REQUIREMENTS:\n",
              "   - Is a NOMNC (Notice of Medicare Non-Coverage) required? If yes, when must it be issued?\n",
              "   - Is a DENC (Detailed Explanation of Non-Coverage) required?\n",
              "   - When does the Fast Appeal deadline occur?\n\n",
              "3. DOCUMENTATION CHANGES: What documentation format changes are required?\n",
              "   - Part A: Therapy minutes, daily treatment notes, 30-day progress notes\n",
              "   - Part B: Outpatient therapy notes, 30-day functional re-assessments, AT modifier requirements\n\n",
              "4. PART B ELIGIBILITY CHECK: What criteria must be met for Part B coverage?\n",
              "   - Physician order requirements\n",
              "   - Maintenance therapy standard (Jimmo v. Sebelius)\n",
              "   - Functional improvement expectation\n\n",
              "5. CONSOLIDATED BILLING WARNING: Flag any services that remain under SNF consolidated billing after transition.\n\n",
              "6. TRANSITION SUMMARY LETTER: Draft a brief, plain-language summary for the resident/family.\n\n",
              "Ground all guidance in CMS Medicare Benefit Policy Manual Chapter 15 and SNF Conditions of Participation."
            )
      dialog: pcca_agent.action.TheraDoc-PTGenerateNote
      output:
        binding:
          generatednote: Topic.TransOutput

    - kind: SendActivity
      id: sendActivity_transitionOutput
      activity: |-
        ###  Part A  Part B Transition Plan

        {Topic.TransOutput}

        ---
        ** Next Steps**: Route this to your Business Office, Social Worker, and MDS Coordinator.
        ** Disclaimer**: AI-generated guidance. Verify with your facility's billing compliance officer.

inputType: {}
outputType:
  properties:
    Trans_Output:
      displayName: Trans_Output
      type: String




