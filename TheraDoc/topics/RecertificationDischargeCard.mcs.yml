mcs.metadata:
  componentName: Recertification Discharge Card
kind: AdaptiveDialog
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent: {}
  actions:
    - kind: AdaptiveCardPrompt
      id: 9dlp31
      card: |-
        {
          "type": "AdaptiveCard",
          "$schema": "https://adaptivecards.io/schemas/adaptive-card.json",
          "version": "1.5",
          "body": [
            {
              "type": "TextBlock",
              "text": "Recertification / Discharge Note",
              "weight": "Bolder",
              "size": "Large",
              "wrap": true
            },
            {
              "type": "Input.Date",
              "id": "date",
              "label": "Date",
              "isRequired": true,
              "errorMessage": "Required"
            },
            {
              "type": "Input.ChoiceSet",
              "id": "discipline",
              "label": "Discipline",
              "isRequired": true,
              "errorMessage": "Required",
              "choices": [
                {
                  "title": "PT (Physical Therapy)",
                  "value": "PT"
                },
                {
                  "title": "OT (Occupational Therapy)",
                  "value": "OT"
                },
                {
                  "title": "SLP (Speech-Language Pathology)",
                  "value": "SLP"
                }
              ]
            },
            {
              "type": "Input.ChoiceSet",
              "id": "noteType",
              "label": "Note Type",
              "isRequired": true,
              "errorMessage": "Required",
              "choices": [
                {
                  "title": "Recertification",
                  "value": "Recertification"
                },
                {
                  "title": "Discharge Summary",
                  "value": "Discharge Summary"
                }
              ]
            },
            {
              "type": "Input.Text",
              "id": "reasonsContinuedSkilledNeed",
              "label": "Reasons for Continued Skilled Need",
              "isMultiline": true,
              "isRequired": true,
              "errorMessage": "Required"
            },
            {
              "type": "Input.Text",
              "id": "estimatedRemainingTime",
              "label": "Estimated Remaining Time in SNF",
              "placeholder": "2 weeks"
            },
            {
              "type": "Input.Text",
              "id": "updatedGoalsProgress",
              "label": "Updated Goals with Progress Toward Each",
              "isMultiline": true,
              "isRequired": true,
              "errorMessage": "Required"
            },
            {
              "type": "Input.Text",
              "id": "planForHomeCare",
              "label": "Plan for Home Care if Applicable",
              "isMultiline": true
            },
            {
              "type": "Input.Toggle",
              "id": "physicianSignatureObtained",
              "title": "Physician / NPP Signature Obtained",
              "valueOn": "Yes",
              "valueOff": "No"
            },
            {
              "type": "Input.Text",
              "id": "modifiedPoc",
              "label": "Modified POC if Applicable",
              "isMultiline": true
            },
            {
              "type": "Input.Text",
              "id": "therapistName",
              "label": "Therapist Name & Credentials",
              "isRequired": true,
              "errorMessage": "Required"
            }
          ],
          "actions": [
            {
              "type": "Action.Submit",
              "title": "Generate Recert/Discharge Note"
            }
          ]
        }
      output:
        binding:
          actionSubmitId: Topic.actionSubmitId
          date: Topic.date
          discipline: Topic.discipline
          estimatedRemainingTime: Topic.estimatedRemainingTime
          modifiedPoc: Topic.modifiedPoc
          noteType: Topic.noteType
          physicianSignatureObtained: Topic.physicianSignatureObtained
          planForHomeCare: Topic.planForHomeCare
          reasonsContinuedSkilledNeed: Topic.reasonsContinuedSkilledNeed
          therapistName: Topic.therapistName
          updatedGoalsProgress: Topic.updatedGoalsProgress

      outputType:
        properties:
          actionSubmitId: String
          date: Date
          discipline: String
          estimatedRemainingTime: String
          modifiedPoc: String
          noteType: String
          physicianSignatureObtained: String
          planForHomeCare: String
          reasonsContinuedSkilledNeed: String
          therapistName: String
          updatedGoalsProgress: String

inputType: {}
outputType: {}







