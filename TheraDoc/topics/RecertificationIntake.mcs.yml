mcs.metadata:
  componentName: Recertification Intake
kind: AdaptiveDialog
modeldescription: Elite clinical intelligence module specialized in [RecertificationIntake]. Executes high-precision data analysis grounded in CMS Chapter 15 and Ensign Services Ironclad Standards. Optimized for Dynamic Chaining.
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent: {}
  actions:
    - kind: Question
      id: question_stUz2j
      interruptionPolicy:
        allowInterruption: true

      variable: init:Topic.Var1
      prompt: "Please briefly describe the recertification context: What discipline, what is the new certification period, what is the continued skilled need, and has there been functional progress or is this a maintenance scenario?"
      entity: StringPrebuiltEntity

    - kind: BeginDialog
      id: 0eKV6G
      input:
        binding:
          text: =Topic.Var1

      dialog: pcca_agent.action.TheraDoc-PTGenerateNote
      output:
        binding:
          generatednote: Topic.generatednote

    - kind: SendActivity
      id: sendActivity_iTDz5G
      activity: |-
        {Topic.generatednote}
        This is an AI-generated draft. Please review carefully before entering into the EHR.

inputType: {}
outputType: {}




