mcs.metadata:
  componentName: SLPProgressNoteIntake
modelDescription: 'This tool can handle queries like these: slp progress note intake,
  start slp progress note, begin speech therapy progress note, speech language pathology
  intake, create slp progress note'
kind: AdaptiveDialog
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    triggerQueries:
    - slp progress note intake
    - start slp progress note
    - begin speech therapy progress note
    - speech language pathology intake
    - create slp progress note
    - new slp intake form
    - fill out slp progress note
    - enter speech therapy session details
    - document slp session
  actions:
