mcs.metadata:
  componentName: ST Daily Note Intake
  description: Elite clinical intelligence module specialized in [STDailyNoteIntake]. Executes high-precision data analysis grounded in CMS Chapter 15 and Pacific Coast Services Ironclad Standards. Optimized for Dynamic Chaining.
  guardrails:
    - Always use closed-list choices for discipline, note type, interventions, assist level, goal status, and cert period
    - Only use free text for patient identifier, date, specific metrics, and custom clinical details
    - Add validation before calling action to ensure all required variables are populated
    - Check contract: action inputs must match flow parameters exactly
    - On failure: preserve context and offer retry/manual continue/start over
kind: AdaptiveDialog
modeldescription: Elite clinical intelligence module specialized in [STDailyNoteIntake]. Executes high-precision data analysis grounded in CMS Chapter 15 and Pacific Coast Services Ironclad Standards. Optimized for Dynamic Chaining.
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent: {}
  actions:
    # Primary speech concern - closed list as buttons for phone
    - kind: Question
      id: question_SOdqr0
      interruptionPolicy:
        allowInterruption: true
      variable: init:Topic.primarySpeechConcern
      prompt: Which speech, swallowing, or cognitive-communication area was the primary focus today?
      entity:
        kind: EmbeddedEntity
        sensitivityLevel: Sensitive
        definition:
          kind: ClosedListEntity
          items:
            - id: Dysphagia
              displayName: Dysphagia (swallowing)

            - id: Aphasia
              displayName: Aphasia (language)

            - id: Cognitive-communication
              displayName: Cognitive-communication

            - id: Voice
              displayName: Voice

            - id: Fluency
              displayName: Fluency/stuttering

            - id: Articulation
              displayName: Articulation/phonology

            - id: Memory
              displayName: Memory/processing

            - id: Other
              displayName: Other

        displayName: PrimarySpeechConcern

    # Session details - still free text but with guidance
    - kind: Question
      id: question_pDXCGV
      interruptionPolicy:
        allowInterruption: true
      variable: Topic.sessionDetails
      prompt: "Briefly describe: what specific tasks were practiced, patient's response, cueing level needed, and any functional gains or observations."
      entity:
        kind: StringPrebuiltEntity
        sensitivityLevel: None

    - kind: BeginDialog
      id: jIcYp1
      input:
        binding:
          text: |-
            =Concatenate("You are a Medicare-compliant SLP (Speech-Language Pathology) documentation specialist for skilled nursing facilities. Generate a gold-standard ST Daily Note using ONLY the clinical data provided. Do NOT invent, assume, or hallucinate any clinical details.

            CLINICAL SESSION DATA:
            Primary Speech/Communication Concern: ", Topic.primarySpeechConcern, "
            Session description: Elite clinical intelligence module specialized in [STDailyNoteIntake]. Executes high-precision data analysis grounded in CMS Chapter 15 and Pacific Coast Services Ironclad Standards. Optimized for Dynamic Chaining.

            GENERATE THE ST DAILY NOTE WITH THESE EXACT SECTIONS:

            1. SKILLED SERVICE: State the skilled ST service provided and medical necessity.

            2. SUBJECTIVE: Patient/caregiver report on communication, swallowing, cognition, or participation.

            3. OBJECTIVE:
               - Primary Treatment Area: [speech/language/swallowing/cognition]
               - Specific Tasks Practiced: [list tasks from session]
               - Performance Level/Accuracy: [percentage or descriptive level]
               - Diet/Liquid Level (if applicable): [IDDSI level or 'N/A']
               - Compensatory Strategies Used: [list or 'none']
               - Cueing Required: [type and amount]

            4. ASSESSMENT: Skilled justification Ă˘â¬â document progress toward goals, clinical reasoning, safety considerations, and medical necessity for continued ST.

            5. PLAN: Next session focus, home program recommendations, family/caregiver training, and goal updates.

            STRICT RULES:
            - Use only data from the session description above
            - Every section must be clinically meaningful and specific
            - Never use vague filler language
            - Note must justify Medicare skilled level of care
            - Do not include any preamble or explanation Ă˘â¬â output the note only")

      dialog: pcca_agent.action.TheraDoc-PTGenerateNote
      output:
        binding:
          generatednote: Topic.generatednote

    - kind: SendActivity
      id: sendActivity_3Kw6JO
      activity: "{Topic.generatednote}Thank you. Your ST daily note intake is complete. Your responses have been recorded and will be used to generate the speech-language pathology documentation. Ă˘ĹˇÂ ĂŻÂ¸Â DRAFT ONLY Ă˘â¬â Review and edit this note before entering into the EHR. Do not include PHI or patient identifiers in any feedback."

