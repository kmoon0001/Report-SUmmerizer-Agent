mcs.metadata:
  componentName: STRecertificationIntake
kind: AdaptiveDialog
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    triggerQueries:
    - start st recertification
    - recertify st
    - st recertification intake
    - begin st recert process
    - help with st recertification
    - renew my st certification
    - intake for st recertification
    - how do I recertify for st?
    - st renewal application
  actions:
  - kind: Question
    id: Question_y84wt4
    variable: Topic.PatientName
    prompt: What is the patient's name?
    entity: PersonNamePrebuiltEntity
  - kind: Question
    id: Question_g8NTaA
    variable: Topic.PrimarySLPDiagnosis
    prompt: What is the primary SLP diagnosis?
    entity: StringPrebuiltEntity
  - kind: Question
    id: Question_o2x7OR
    variable: Topic.FunctionalStatus
    prompt: Describe the patient's current communication and/or swallowing functional
      status.
    entity: StringPrebuiltEntity
  - kind: Question
    id: Question_U98nYl
    variable: Topic.IDDSILevel
    prompt: What is the current diet texture and liquid consistency (IDDSI level)?
    entity: StringPrebuiltEntity
  - kind: Question
    id: Question_caTiEg
    variable: Topic.Goals
    prompt: What goals have been achieved since the last certification, and what are
      the new goals for the next certification period?
    entity: StringPrebuiltEntity
  - kind: Question
    id: Question_tsCTxN
    variable: Topic.SkilledNecessity
    prompt: Please provide justification for continued skilled SLP necessity (why
      does the patient still require skilled speech therapy)?
    entity: StringPrebuiltEntity
  - kind: Question
    id: Question_ND8ckN
    variable: Topic.AssessmentScores
    prompt: Enter standardized assessment scores if applicable (e.g., MASA, FOIS,
      ASHA NOMS).
    entity: StringPrebuiltEntity
  - kind: Question
    id: Question_3iCeAX
    variable: Topic.RehabPotential
    prompt: What is the patient's rehab potential?
    entity: StringPrebuiltEntity
  - kind: Question
    id: Question_h6GT70
    variable: Topic.FrequencyDuration
    prompt: What is the recommended frequency and duration of continued treatment?
    entity: StringPrebuiltEntity
  - kind: Question
    id: Question_ZLjTUS
    variable: Topic.Barriers
    prompt: Are there any barriers to progress?
    entity: StringPrebuiltEntity
  - kind: SendActivity
    id: SendActivity_k74rjs
    activity:
      attachments:
      - kind: AdaptiveCardTemplate
        cardContent: '={ type: "AdaptiveCard", body: [ { type: "TextBlock", size:
          "Medium", weight: "Bolder", text: "SLP Recertification Note" }, { type:
          "FactSet", facts: [ { title: "Patient Name", value: Text(Topic.PatientName)
          }, { title: "Primary SLP Diagnosis", value: Text(Topic.PrimarySLPDiagnosis)
          }, { title: "Functional Status", value: Text(Topic.FunctionalStatus) },
          { title: "IDDSI Level", value: Text(Topic.IDDSILevel) }, { title: "Goals
          (Achieved/New)", value: Text(Topic.Goals) }, { title: "Skilled Necessity",
          value: Text(Topic.SkilledNecessity) }, { title: "Assessment Scores", value:
          Text(Topic.AssessmentScores) }, { title: "Rehab Potential", value: Text(Topic.RehabPotential)
          }, { title: "Frequency/Duration", value: Text(Topic.FrequencyDuration) },
          { title: "Barriers", value: Text(Topic.Barriers) } ] } ], ''$schema'': "http://adaptivecards.io/schemas/adaptive-card.json",
          version: "1.5" }'
  - kind: Question
    id: Question_8UEktK
    variable: Topic.FinalizeOrRevise
    prompt: Would you like to finalize this note or revise it?
    entity:
      kind: EmbeddedEntity
      definition:
        kind: ClosedListEntity
        optionSetName: FinalizeOrReviseOptions
        items:
        - id: finalize
          displayName: Finalize
        - id: revise
          displayName: Revise
inputType: {}
outputType: {}





